title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0191 — Shadow Copy Deletion (avoslocker)'
id: 48c755fd-65a0-5dd2-bae0-e510921bb61e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with avoslocker ransomware.
  Incident: dragnet-ransomware-2021-0191
  Ransomware victim claim by avoslocker: Moorfields NHS UK & Dubai; sector: Healthcare
  First observed: 2021-09-01.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
