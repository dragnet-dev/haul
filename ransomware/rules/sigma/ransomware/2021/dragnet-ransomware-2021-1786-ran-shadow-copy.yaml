title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1786 — Shadow Copy Deletion (suncrypt)'
id: 34e1999e-faf4-5268-aa25-c24cf72ff52a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with suncrypt ransomware.
  Incident: dragnet-ransomware-2021-1786
  Ransomware victim claim by suncrypt: PRP diagnostic imaging; sector: Healthcare
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
