title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0583 — Shadow Copy Deletion (everest)'
id: 8ebf4200-b0ac-52b6-bb22-d6d0457bcbce
status: deprecated
description: |
  Detects shadow copy deletion commands associated with everest ransomware.
  Incident: dragnet-ransomware-2021-0583
  Ransomware victim claim by everest: Argentina GOV; sector: Public Sector
  First observed: 2021-11-23.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
