title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0662 — Shadow Copy Deletion (karma)'
id: bcab70f5-4bb0-508a-985a-c79968daa4a6
status: deprecated
description: |
  Detects shadow copy deletion commands associated with karma ransomware.
  Incident: dragnet-ransomware-2021-0662
  Ransomware victim claim by karma: YASH Technologies. Part 1.; sector: Technology
  First observed: 2021-10-04.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
