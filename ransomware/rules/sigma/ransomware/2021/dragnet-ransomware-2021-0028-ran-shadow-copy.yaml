title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0028 — Shadow Copy Deletion (astroteam)'
id: 52dc711a-bdfc-5309-a2d4-94b2e1dd52b3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with astroteam ransomware.
  Incident: dragnet-ransomware-2021-0028
  Ransomware victim claim by astroteam: Hoya Vision Care US/Optical Labs; country: US; sector: Manufacturing
  First observed: 2021-04-05.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
