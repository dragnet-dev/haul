title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1358 — Shadow Copy Deletion (pysa)'
id: ae066f19-9cfd-5c36-b7f4-43a170169a6c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with pysa ransomware.
  Incident: dragnet-ransomware-2021-1358
  Ransomware victim claim by pysa: Eagle Eye Produce; sector: Agriculture and Food Production
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
