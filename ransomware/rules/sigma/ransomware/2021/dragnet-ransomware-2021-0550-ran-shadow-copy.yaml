title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0550 — Shadow Copy Deletion (dispossessor)'
id: bc586f9b-8a03-5c5e-86c9-b99131518f5a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2021-0550
  Ransomware victim claim by dispossessor: brault.us; country: US; sector: Healthcare
  First observed: 2021-06-07.
references:
  - https://dispossessor.com/blogs/204
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
