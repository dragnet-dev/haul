title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0510 — Shadow Copy Deletion (darkleakmarket)'
id: 30565acf-7e09-51a0-88c5-22cf8236b815
status: deprecated
description: |
  Detects shadow copy deletion commands associated with darkleakmarket ransomware.
  Incident: dragnet-ransomware-2021-0510
  Ransomware victim claim by darkleakmarket: AirIndia breach information of 4.5 million custome; sector: Transportation/Logistics
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
