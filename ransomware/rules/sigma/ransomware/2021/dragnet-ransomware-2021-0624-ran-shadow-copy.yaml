title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0624 — Shadow Copy Deletion (groove)'
id: 89bb0a00-9c85-521e-bca6-569db9bdf89d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with groove ransomware.
  Incident: dragnet-ransomware-2021-0624
  Ransomware victim claim by groove: Запатченные fortinet точки входа; sector: Not Found
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
