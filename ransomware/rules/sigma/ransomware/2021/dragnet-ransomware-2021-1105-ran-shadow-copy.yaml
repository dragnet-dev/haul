title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1105 — Shadow Copy Deletion (lorenz)'
id: a92a915b-e087-50f5-a0db-23f9e240c8d3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lorenz ransomware.
  Incident: dragnet-ransomware-2021-1105
  Ransomware victim claim by lorenz: Challenge Manufacturing Company; sector: Business Services
  First observed: 2021-05-11.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
