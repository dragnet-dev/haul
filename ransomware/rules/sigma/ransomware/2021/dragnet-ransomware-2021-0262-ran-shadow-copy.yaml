title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0262 — Shadow Copy Deletion (blackmatter)'
id: 7241a473-b4f9-5940-afe1-37c7b5f55270
status: deprecated
description: |
  Detects shadow copy deletion commands associated with blackmatter ransomware.
  Incident: dragnet-ransomware-2021-0262
  Ransomware victim claim by blackmatter: Bumper to Bumper Autoparts; sector: Consumer Services
  First observed: 2021-09-21.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
