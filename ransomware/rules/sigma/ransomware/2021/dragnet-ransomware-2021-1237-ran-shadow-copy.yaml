title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1237 — Shadow Copy Deletion (nefilim)'
id: 3f8fa51e-f59b-528a-8582-6f39f77d5e6b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with nefilim ransomware.
  Incident: dragnet-ransomware-2021-1237
  Ransomware victim claim by nefilim: Tegut. Part 1.; sector: Consumer Services
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
