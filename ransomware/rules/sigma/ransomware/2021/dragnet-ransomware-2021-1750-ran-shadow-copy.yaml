title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1750 — Shadow Copy Deletion (spook)'
id: 1ca94ea5-2891-5324-8531-3f8bcd46b289
status: deprecated
description: |
  Detects shadow copy deletion commands associated with spook ransomware.
  Incident: dragnet-ransomware-2021-1750
  Ransomware victim claim by spook: Grupo Vía; sector: Transportation/Logistics
  First observed: 2021-10-18.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
