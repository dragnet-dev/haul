title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0023 — Shadow Copy Deletion (arvinclub)'
id: e2c96699-40ae-538c-b801-d5cb6c56a824
status: deprecated
description: |
  Detects shadow copy deletion commands associated with arvinclub ransomware.
  Incident: dragnet-ransomware-2021-0023
  Ransomware victim claim by arvinclub: Leiden University Hacked; sector: Education
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
