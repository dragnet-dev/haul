title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0297 — Shadow Copy Deletion (blacktor)'
id: ef4b5861-bfd9-5bf6-9934-df2abfe465ac
status: deprecated
description: |
  Detects shadow copy deletion commands associated with blacktor ransomware.
  Incident: dragnet-ransomware-2021-0297
  Ransomware victim claim by blacktor: unexca-edu-ve; sector: Education
  First observed: 2021-12-30.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
