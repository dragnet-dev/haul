title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0616 — Shadow Copy Deletion (grief)'
id: 956c6db0-bc36-51b3-91d9-d3ccd0b9f05c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with grief ransomware.
  Incident: dragnet-ransomware-2021-0616
  Ransomware victim claim by grief: Booneville School District; country: US; sector: Education
  First observed: 2021-06-30.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
