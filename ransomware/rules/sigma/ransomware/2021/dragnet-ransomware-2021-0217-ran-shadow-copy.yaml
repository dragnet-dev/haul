title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0217 — Shadow Copy Deletion (babuk)'
id: e0279ad6-375f-5e54-8cf6-392bed049a9a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with babuk ransomware.
  Incident: dragnet-ransomware-2021-0217
  Ransomware victim claim by babuk: Houston Rockets NBA Team; country: US; sector: Hospitality and Tourism
  First observed: 2021-04-01.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
