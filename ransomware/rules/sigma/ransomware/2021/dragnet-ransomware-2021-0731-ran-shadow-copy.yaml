description: |
  Detects shadow copy deletion commands associated with lockbit2 ransomware.
  Incident: dragnet-ransomware-2021-0731
  Ransomware victim claim by lockbit2: centerspacehome...; sector: Construction
  First observed: 2021-11-23.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
