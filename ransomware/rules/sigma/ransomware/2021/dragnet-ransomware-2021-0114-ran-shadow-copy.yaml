title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0114 — Shadow Copy Deletion (avaddon)'
id: 235e59b0-c87f-5a6d-9ed8-9f26762e3ff3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with avaddon ransomware.
  Incident: dragnet-ransomware-2021-0114
  Ransomware victim claim by avaddon: JetSJ; sector: Not Found
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
