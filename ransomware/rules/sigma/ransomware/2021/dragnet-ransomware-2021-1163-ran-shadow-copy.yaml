title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1163 — Shadow Copy Deletion (marketo)'
id: be11df9c-10c9-5738-a700-4fad042bde63
status: deprecated
description: |
  Detects shadow copy deletion commands associated with marketo ransomware.
  Incident: dragnet-ransomware-2021-1163
  Ransomware victim claim by marketo: Sandhills Center; sector: Healthcare
  First observed: 2021-12-07.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
