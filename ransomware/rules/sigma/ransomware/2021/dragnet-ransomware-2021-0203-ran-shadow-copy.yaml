title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0203 — Shadow Copy Deletion (azroteam)'
id: acefeb9a-21c8-594a-b648-49c0240a1f61
status: deprecated
description: |
  Detects shadow copy deletion commands associated with azroteam ransomware.
  Incident: dragnet-ransomware-2021-0203
  Ransomware victim claim by azroteam: HOYA Corporation; country: JP; sector: Technology
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
