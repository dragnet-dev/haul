description: |
  Detects shadow copy deletion commands associated with atomsilo ransomware.
  Incident: dragnet-ransomware-2021-0029
  Ransomware victim claim by atomsilo: Cristália - Indústria Farmacêutica; country: BR; sector: Healthcare
  First observed: 2021-12-21.
references:
