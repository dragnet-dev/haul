title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0293 — Shadow Copy Deletion (blackshadow)'
id: de4c2b8d-0646-59bd-a0bc-31cddaef8e5a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with blackshadow ransomware.
  Incident: dragnet-ransomware-2021-0293
  Associated with Agrius.
  Ransomware victim claim by blackshadow: Shirbit Insurance Company; sector: Financial Services
  First observed: 2021-12-18.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.agrius
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
