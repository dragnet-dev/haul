title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0622 — Shadow Copy Deletion (groove)'
id: db911134-ae19-5e7b-a9da-82c2563e8bba
status: deprecated
description: |
  Detects shadow copy deletion commands associated with groove ransomware.
  Incident: dragnet-ransomware-2021-0622
  Ransomware victim claim by groove: Я не пью виски но с ним бы выпил; sector: Not Found
  First observed: 2021-10-30.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
