title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1808 — Shadow Copy Deletion (xinglocker)'
id: 6d340d14-3e62-5339-aafc-549d1dcad5c2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with xinglocker ransomware.
  Incident: dragnet-ransomware-2021-1808
  Ransomware victim claim by xinglocker: Solen A.S; sector: Not Found
  First observed: 2021-05-14.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
