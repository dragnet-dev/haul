title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0627 — Shadow Copy Deletion (groove)'
id: 8738dac8-6273-548e-9e14-716d4a16ee51
status: deprecated
description: |
  Detects shadow copy deletion commands associated with groove ransomware.
  Incident: dragnet-ransomware-2021-0627
  Ransomware victim claim by groove: robinwoodortho.com; sector: Healthcare
  First observed: 2021-09-13.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
