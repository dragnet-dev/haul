title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0508 — Shadow Copy Deletion (darkleakmarket)'
id: 4fb9fd9a-43c0-563f-8ee5-7693be843bef
status: deprecated
description: |
  Detects shadow copy deletion commands associated with darkleakmarket ransomware.
  Incident: dragnet-ransomware-2021-0508
  Ransomware victim claim by darkleakmarket: Acer.com Leaked Data 100% Fresh; sector: Technology
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
