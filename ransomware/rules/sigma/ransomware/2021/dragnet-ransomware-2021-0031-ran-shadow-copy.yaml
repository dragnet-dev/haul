title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0031 — Shadow Copy Deletion (atomsilo)'
id: 42e60e04-1bfd-5d4d-a56e-a6211290ca05
status: deprecated
description: |
  Detects shadow copy deletion commands associated with atomsilo ransomware.
  Incident: dragnet-ransomware-2021-0031
  Ransomware victim claim by atomsilo: LIGHT CONVERSION; sector: Manufacturing
  First observed: 2021-12-21.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
