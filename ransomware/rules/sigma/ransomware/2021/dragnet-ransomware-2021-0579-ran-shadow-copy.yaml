title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0579 — Shadow Copy Deletion (egregor)'
id: 9fb6e0c7-e10f-5a0e-8fa1-e46e6a6cf14e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with egregor ransomware.
  Incident: dragnet-ransomware-2021-0579
  Ransomware victim claim by egregor: Center Hospitalier de Dax-Côte d’Argent; country: FR; sector: Healthcare
  First observed: 2021-02-08.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
