title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0538 — Shadow Copy Deletion (darkside)'
id: 236681e1-bf83-537f-a121-893a7d5a8e49
status: deprecated
description: |
  Detects shadow copy deletion commands associated with darkside ransomware.
  Incident: dragnet-ransomware-2021-0538
  Ransomware victim claim by darkside: Compucom (MSP); sector: Business Services
  First observed: 2021-02-27.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
