title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1273 — Shadow Copy Deletion (payloadbin)'
id: b2004ff6-7e1b-5bb6-8d95-91d1687bf935
status: deprecated
description: |
  Detects shadow copy deletion commands associated with payloadbin ransomware.
  Incident: dragnet-ransomware-2021-1273
  Ransomware victim claim by payloadbin: www.lockslaw.com; sector: Business Services
  First observed: 2021-10-16.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
