title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0020 — Shadow Copy Deletion (arvinclub)'
id: fb38577a-6c61-5377-be5b-65959544f15c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with arvinclub ransomware.
  Incident: dragnet-ransomware-2021-0020
  Ransomware victim claim by arvinclub: Compilation of Many Breaches (COMB); sector: Not Found
  First observed: 2021-09-10.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
