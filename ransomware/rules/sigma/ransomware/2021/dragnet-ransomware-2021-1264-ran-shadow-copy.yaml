title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1264 — Shadow Copy Deletion (payloadbin)'
id: 72c6bfe6-a2aa-5fa2-b038-3b0f4b80a409
status: deprecated
description: |
  Detects shadow copy deletion commands associated with payloadbin ransomware.
  Incident: dragnet-ransomware-2021-1264
  Ransomware victim claim by payloadbin: Truckcentercompanies.com; sector: Transportation/Logistics
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
