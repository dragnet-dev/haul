title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1100 — Shadow Copy Deletion (lockdata)'
id: bf58225e-c551-55aa-8ed5-faad8930081c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lockdata ransomware.
  Incident: dragnet-ransomware-2021-1100
  Ransomware victim claim by lockdata: [USA] Crary Industries Inc.; sector: Manufacturing
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
