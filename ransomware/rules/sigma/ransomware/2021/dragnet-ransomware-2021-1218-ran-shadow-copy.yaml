title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1218 — Shadow Copy Deletion (mountlocker)'
id: 21f40f5b-4a79-5c71-bba2-513faaffbcad
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mountlocker ransomware.
  Incident: dragnet-ransomware-2021-1218
  Ransomware victim claim by mountlocker: ECU Worldwide; sector: Transportation/Logistics
  First observed: 2021-02-07.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
