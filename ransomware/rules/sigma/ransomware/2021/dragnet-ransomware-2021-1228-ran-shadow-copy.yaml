title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1228 — Shadow Copy Deletion (mountlocker)'
id: 8b2a2cb7-2847-536e-9f85-2e2d734c850c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mountlocker ransomware.
  Incident: dragnet-ransomware-2021-1228
  Ransomware victim claim by mountlocker: MERSEN; sector: Manufacturing
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
