title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0300 — Shadow Copy Deletion (bonacigroup)'
id: c86d3955-68b3-5c81-a058-8db2dc5335f1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with bonacigroup ransomware.
  Incident: dragnet-ransomware-2021-0300
  Ransomware victim claim by bonacigroup: Ward Arcuri Foley & Dwyer | Law Firm; sector: Business Services
  First observed: 2021-10-04.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
