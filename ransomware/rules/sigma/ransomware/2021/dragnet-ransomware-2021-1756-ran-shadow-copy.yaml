title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1756 — Shadow Copy Deletion (spook)'
id: c33d8d45-1897-5e95-bed5-f02fd51db33a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with spook ransomware.
  Incident: dragnet-ransomware-2021-1756
  Ransomware victim claim by spook: MOLNÁRBETON Kft.; sector: Manufacturing
  First observed: 2021-10-06.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
