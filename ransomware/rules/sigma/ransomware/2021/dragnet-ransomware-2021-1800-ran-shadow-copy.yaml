title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1800 — Shadow Copy Deletion (xinglocker)'
id: 767dd11d-64a9-5c82-a00b-9ed42bc47a33
status: deprecated
description: |
  Detects shadow copy deletion commands associated with xinglocker ransomware.
  Incident: dragnet-ransomware-2021-1800
  Ransomware victim claim by xinglocker: Greenwood Fabricating & Plating; sector: Manufacturing
  First observed: 2021-06-03.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
