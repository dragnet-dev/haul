title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1610 — Shadow Copy Deletion (ragnarlocker)'
id: d7e71362-f38e-58d8-9d11-33a5f5290bef
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ragnarlocker ransomware.
  Incident: dragnet-ransomware-2021-1610
  Ransomware victim claim by ragnarlocker: Team Computers Ltd. - Leak; sector: Technology
  First observed: 2021-11-23.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
