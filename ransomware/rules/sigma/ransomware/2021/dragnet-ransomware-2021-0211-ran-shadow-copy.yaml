title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0211 — Shadow Copy Deletion (azroteam)'
id: 5186ad5b-f6a5-57fd-871a-a75d2587f9d9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with azroteam ransomware.
  Incident: dragnet-ransomware-2021-0211
  Ransomware victim claim by azroteam: von Drehle Corporation; sector: Manufacturing
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
