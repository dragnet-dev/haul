title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0539 — Shadow Copy Deletion (darkside)'
id: c09a96c8-b368-57f6-bf4c-623ad249e67e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with darkside ransomware.
  Incident: dragnet-ransomware-2021-0539
  Ransomware victim claim by darkside: Discount Car and Truck Rentals ; country: CA; sector: Transportation/Logistics
  First observed: 2021-02-01.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
