title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1615 — Shadow Copy Deletion (ragnarok)'
id: e51b4471-78cb-5dff-9b1a-a71e4dde295e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ragnarok ransomware.
  Incident: dragnet-ransomware-2021-1615
  Ransomware victim claim by ragnarok: Decrypt; sector: Technology
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
