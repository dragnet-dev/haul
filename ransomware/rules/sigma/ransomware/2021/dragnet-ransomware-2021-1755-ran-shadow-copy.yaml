title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1755 — Shadow Copy Deletion (spook)'
id: a7a4480a-dea5-5241-84f8-2d602b66f5dc
status: deprecated
description: |
  Detects shadow copy deletion commands associated with spook ransomware.
  Incident: dragnet-ransomware-2021-1755
  Ransomware victim claim by spook: Legendary, Inc.; sector: Consumer Services
  First observed: 2021-10-05.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
