title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0546 — Shadow Copy Deletion (dispossessor)'
id: a3c83d08-5ede-523b-9a6c-458feba27d56
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2021-0546
  Ransomware victim claim by dispossessor: aa.com; country: US; sector: Transportation/Logistics
  First observed: 2021-11-20.
references:
  - https://dispossessor.com/blogs/107
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
