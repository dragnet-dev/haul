title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0531 — Shadow Copy Deletion (darkleakmarket)'
id: 7a5762e0-cc03-52d4-89d8-153242d232b2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with darkleakmarket ransomware.
  Incident: dragnet-ransomware-2021-0531
  Ransomware victim claim by darkleakmarket: Summit Credit Union Big Data Leak; sector: Financial Services
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
