description: |
  Detects shadow copy deletion commands associated with rook ransomware.
  Incident: dragnet-ransomware-2021-1701
  Ransomware victim claim by rook: Rossell Techsys(Data will be given tomorrow); sector: Technology
  First observed: 2021-12-18.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
