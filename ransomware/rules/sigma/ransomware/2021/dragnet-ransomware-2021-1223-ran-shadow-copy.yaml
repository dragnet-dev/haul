title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1223 — Shadow Copy Deletion (mountlocker)'
id: b8af946a-2f56-5efb-91d8-2b1cc64b350a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mountlocker ransomware.
  Incident: dragnet-ransomware-2021-1223
  Ransomware victim claim by mountlocker: Gunnebo AB; sector: Manufacturing
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
