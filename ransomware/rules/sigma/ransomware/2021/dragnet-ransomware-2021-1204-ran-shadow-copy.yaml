description: |
  Detects shadow copy deletion commands associated with mosesstaff ransomware.
  Incident: dragnet-ransomware-2021-1204
  Associated with Leviathan.
  Ransomware victim claim by mosesstaff: Ehud Leviathan Engineering; sector: Manufacturing
