title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1660 — Shadow Copy Deletion (revil)'
id: 33f8c7f6-b163-5871-88f0-39962f8440af
status: deprecated
description: |
  Detects shadow copy deletion commands associated with revil ransomware.
  Incident: dragnet-ransomware-2021-1660
  Ransomware victim claim by revil: CEC Vibration Products; sector: Manufacturing
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
