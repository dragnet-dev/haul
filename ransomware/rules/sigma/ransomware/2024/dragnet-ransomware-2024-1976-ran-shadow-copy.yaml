title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1976 — Shadow Copy Deletion (dragonransomware)'
id: f9fb5e71-8f4c-52c5-ab0b-f6a9cd61d04a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dragonransomware ransomware.
  Incident: dragnet-ransomware-2024-1976
  Ransomware victim claim by dragonransomware: www.zawwali.com; country: IN; sector: Business Services
  First observed: 2024-11-10.
references:
  - https://t.me/DragonRansom/371
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
