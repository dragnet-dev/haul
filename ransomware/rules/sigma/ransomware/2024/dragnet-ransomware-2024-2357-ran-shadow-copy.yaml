title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2357 — Shadow Copy Deletion (funksec)'
id: 00ab285b-7e20-54e4-a627-32f406dcd24f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with funksec ransomware.
  Incident: dragnet-ransomware-2024-2357
  Ransomware victim claim by funksec: shoppingcentropioneer.com; country: BR; sector: Business Services
  First observed: 2024-12-28.
references:
  - http://7ixfdvqb4eaju5lzj4gg76kwlrxg4ugqpuog5oqkkmgfyn33h527oyyd.onion/Breach61.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
