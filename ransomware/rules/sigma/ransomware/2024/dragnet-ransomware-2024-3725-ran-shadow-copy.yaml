title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3725 — Shadow Copy Deletion (mallox)'
id: a554f1d9-4f5d-5c7e-bf78-64c93e98935c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mallox ransomware.
  Incident: dragnet-ransomware-2024-3725
  Ransomware victim claim by mallox: Assist Informatica; country: IT; sector: Technology
  First observed: 2024-05-23.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
