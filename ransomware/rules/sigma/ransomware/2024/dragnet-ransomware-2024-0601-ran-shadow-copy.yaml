title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0601 — Shadow Copy Deletion (apos)'
id: 9f7d5673-3efa-5af4-8ce8-b9d15e2ff437
status: deprecated
description: |
  Detects shadow copy deletion commands associated with apos ransomware.
  Incident: dragnet-ransomware-2024-0601
  Ransomware victim claim by apos: Algen Healthcare; country: IN; sector: Healthcare
  First observed: 2024-04-29.
references:
  - https://apos.blog//apos-raas/Algen-Healthcare-d1a417add85448d1959683ac15099417
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
