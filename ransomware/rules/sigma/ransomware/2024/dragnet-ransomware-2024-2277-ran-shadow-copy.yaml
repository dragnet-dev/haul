description: |
  Detects shadow copy deletion commands associated with funksec ransomware.
  Incident: dragnet-ransomware-2024-2277
  Ransomware victim claim by funksec: 2sign.co.il; country: IL; sector: Technology
  First observed: 2024-12-24.
references:
  - http://7ixfdvqb4eaju5lzj4gg76kwlrxg4ugqpuog5oqkkmgfyn33h527oyyd.onion/Breach60.html 
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
