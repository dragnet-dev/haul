description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3623
  Ransomware victim claim by lynx: Gills Onions; country: US; sector: Agriculture and Food Production
  First observed: 2024-12-05.
references:
