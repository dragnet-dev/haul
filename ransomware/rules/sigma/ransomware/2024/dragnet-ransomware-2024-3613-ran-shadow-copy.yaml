title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3613 — Shadow Copy Deletion (lynx)'
id: 993fa05a-ba1c-5f04-9cef-9a65a24a7402
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3613
  Ransomware victim claim by lynx: Equity & Advisory; country: AU; sector: Financial Services
  First observed: 2024-11-19.
references:
  - http://lynxblog.net/leaks/674ecf52e42beed9ed4c003c
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
