title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2400 — Shadow Copy Deletion (handala)'
id: 93861496-72df-5e0b-a12d-83898ae447e2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-2400
  Ransomware victim claim by handala: Handala’s attack on Israeli organizations; country: IL; sector: Public Sector
  First observed: 2024-07-21.
references:
  - https://handala.to/handalas-attack-on-israeli-organizations/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
