title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3621 — Shadow Copy Deletion (lynx)'
id: 13925558-b471-518f-b371-e1efed926355
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3621
  Ransomware victim claim by lynx: futuremetals.com; country: US; sector: Manufacturing
  First observed: 2024-09-04.
references:
  - http://lynxblog.net/leaks/672c78d8dab69e0ba2c7ef49
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
