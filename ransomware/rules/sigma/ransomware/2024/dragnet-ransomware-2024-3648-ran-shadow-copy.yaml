title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3648 — Shadow Copy Deletion (lynx)'
id: f4a3b892-51cb-5e69-97cd-10b552f043d4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3648
  Ransomware victim claim by lynx: LINTEC & LINNHOFF Holdings; country: DE; sector: Manufacturing
  First observed: 2024-12-20.
references:
  - http://lynxblog.net/leaks/67b33ed044fac8dca1099389
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
