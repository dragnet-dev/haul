title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4131 — Shadow Copy Deletion (monti)'
id: 92705945-648c-5236-9e36-bf5a57cbb4cf
status: deprecated
description: |
  Detects shadow copy deletion commands associated with monti ransomware.
  Incident: dragnet-ransomware-2024-4131
  Ransomware victim claim by monti: Phoenix; sector: Not Found
  First observed: 2024-08-22.
references:
  - http://mblogci3rudehaagbryjznltdp33ojwzkq6hn2pckvjq33rycmzczpid.onion/blog/5a53eb10748f0117aaad6cba285ba46741fa0ad62a76966d702b51fad300978a/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
