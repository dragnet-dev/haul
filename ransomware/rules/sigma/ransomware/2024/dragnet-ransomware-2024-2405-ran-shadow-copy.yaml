title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2405 — Shadow Copy Deletion (handala)'
id: 5c1a90b0-26d2-5d59-ba9b-ac3702d324c8
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-2405
  Ransomware victim claim by handala: IIB ( Israeli Industrial Batteries ) Leaked; country: IL; sector: Manufacturing
  First observed: 2024-10-06.
references:
  - https://handala-hack.to/iib-israeli-industrial-batteries-leaked/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
