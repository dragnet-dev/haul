title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3640 — Shadow Copy Deletion (lynx)'
id: ac54ac39-8c5e-5d71-b350-083a0c3cac1c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3640
  Ransomware victim claim by lynx: Jim Thompson; country: TH; sector: Business Services
  First observed: 2024-12-08.
references:
  - http://lynxblog.net/leaks/677d94ae05a779c3d3a8cfc7
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
