title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1822 — Shadow Copy Deletion (dispossessor)'
id: 0b1de177-37e9-529e-97ce-ccab3a70f61c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2024-1822
  Ransomware victim claim by dispossessor: umbrellaproperties.com; country: US; sector: Business Services
  First observed: 2024-05-13.
references:
  - https://dispossessor.com/blogs/1365
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
