title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3688 — Shadow Copy Deletion (lynx)'
id: 7a8083a3-e6ac-578f-9ef7-3a9f1d8195bf
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3688
  Ransomware victim claim by lynx: Textiles Coated International; country: US; sector: Manufacturing
  First observed: 2024-10-31.
references:
  - http://lynxblog.net/leaks/67442c78e42beed9ed2f5162
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
