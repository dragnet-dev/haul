title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3651 — Shadow Copy Deletion (lynx)'
id: 3b9f88bc-99d4-5ff0-8e94-35f8a39e7316
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3651
  Ransomware victim claim by lynx: Mark Thomas; country: US; sector: Construction
  First observed: 2024-10-15.
references:
  - http://lynxblog.net/leaks/6721c531dab69e0ba2b2ce92
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
