title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5729 — Shadow Copy Deletion (safepay)'
id: 7fdff658-a267-5065-965a-c94a966a988e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with safepay ransomware.
  Incident: dragnet-ransomware-2024-5729
  Ransomware victim claim by safepay: tritonsourcing.co.nz; country: NZ; sector: Business Services
  First observed: 2024-10-08.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
