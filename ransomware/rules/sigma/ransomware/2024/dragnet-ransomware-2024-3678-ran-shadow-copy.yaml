title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3678 — Shadow Copy Deletion (lynx)'
id: d1071ef3-ee10-5b7a-8525-3014e933a6c4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3678
  Ransomware victim claim by lynx: Smith Tank & Steel (smith-tank.com); country: US; sector: Manufacturing
  First observed: 2024-12-12.
references:
  - http://lynxblog.net/leaks/6762dc4ae42beed9ed95480c
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
