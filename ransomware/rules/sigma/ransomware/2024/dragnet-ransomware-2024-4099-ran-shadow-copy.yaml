title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4099 — Shadow Copy Deletion (mogilevich)'
id: 7fde17c8-bd7f-5e27-86e7-4ef307f2c52f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mogilevich ransomware.
  Incident: dragnet-ransomware-2024-4099
  Ransomware victim claim by mogilevich: Ireland's Department of Foreign Affairs; country: IE; sector: Public Sector
  First observed: 2024-02-27.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
