title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5795 — Shadow Copy Deletion (shinyhunters)'
id: dfafb601-f918-5f09-a06d-0790078a2557
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2024-5795
  Ransomware victim claim by shinyhunters: Kering (Gucci, Balenciaga, Brioni, AlexMcQ); country: FR; sector: Consumer Services
  First observed: 2024-04-23.
references:
  - https://breachforums.hn//kering.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
