description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3654
  Ransomware victim claim by lynx: Model Die & Mold; country: US; sector: Manufacturing
  First observed: 2024-10-04.
references:
  - http://lynxblog.net/leaks/672a5664dab69e0ba2c3c066
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
