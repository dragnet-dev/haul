title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3703 — Shadow Copy Deletion (lynx)'
id: 8f3e07aa-2046-584b-a7e8-eeb317eec6d1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3703
  Ransomware victim claim by lynx: Wisconsin Lifting Specialists; country: US; sector: Manufacturing
  First observed: 2024-11-22.
references:
  - http://lynxblog.net/leaks/6740e14ae42beed9ed25fef7
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
