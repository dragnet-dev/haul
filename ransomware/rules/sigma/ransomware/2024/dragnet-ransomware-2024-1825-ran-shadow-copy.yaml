title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1825 — Shadow Copy Deletion (dispossessor)'
id: 98b27e98-93a2-5cbc-baaf-de0a9943bac7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2024-1825
  Ransomware victim claim by dispossessor: ventivtech.com; country: GB; sector: Healthcare
  First observed: 2024-03-15.
references:
  - https://dispossessor.com/blogs/101
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
