title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2893 — Shadow Copy Deletion (incransom)'
id: b0a9ac37-45fa-5019-a803-49c7774fb36d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-2893
  Ransomware victim claim by incransom: Washington School For The Deaf; country: US; sector: Education
  First observed: 2024-01-12.
references:
  - http://incapt.blog/blog/leak/14136BB1D6BEC8B0
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
