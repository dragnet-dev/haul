title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2736 — Shadow Copy Deletion (incransom)'
id: 8125a5fc-2cd3-50dc-a406-8383a1c7ea50
status: deprecated
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-2736
  Ransomware victim claim by incransom: Black Butte Coal Co; country: US; sector: Energy
  First observed: 2024-01-29.
references:
  - http://incapt.blog/blog/leak/0E5027DB991293D7
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
