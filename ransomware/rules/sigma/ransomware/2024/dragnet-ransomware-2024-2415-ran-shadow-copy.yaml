title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2415 — Shadow Copy Deletion (handala)'
id: 28045519-c0c4-52b7-9639-41352e7894dc
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-2415
  Ransomware victim claim by handala: Israel largest cyber security college; country: IL; sector: Technology
  First observed: 2024-04-13.
references:
  - https://handala.to/israel-largest-cyber-security-college/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
