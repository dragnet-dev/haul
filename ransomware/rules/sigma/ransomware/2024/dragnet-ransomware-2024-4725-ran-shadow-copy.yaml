description: |
  Detects shadow copy deletion commands associated with qilin ransomware.
  Incident: dragnet-ransomware-2024-4725
  Ransomware victim claim by qilin: Prefeitura do Jaboatão dos Guararapes; country: BR; sector: Public Sector
