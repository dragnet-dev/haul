title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2894 — Shadow Copy Deletion (incransom)'
id: 75afe392-0087-5c8d-9aaf-7a18889eeef6
status: deprecated
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-2894
  Ransomware victim claim by incransom: Waterford Country School Inc; country: US; sector: Education
  First observed: 2024-01-29.
references:
  - http://incapt.blog/blog/leak/837D7A1BA838A2AF
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
