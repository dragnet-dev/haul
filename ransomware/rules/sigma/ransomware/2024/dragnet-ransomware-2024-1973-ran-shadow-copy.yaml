title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1973 — Shadow Copy Deletion (dragonransomware)'
id: 26ab0154-6e8c-5b8e-892d-20aef6e5819f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dragonransomware ransomware.
  Incident: dragnet-ransomware-2024-1973
  Ransomware victim claim by dragonransomware: www.manahotels.in; country: IN; sector: Hospitality and Tourism
  First observed: 2024-10-30.
references:
  - https://t.me/DragonRansom/356
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
