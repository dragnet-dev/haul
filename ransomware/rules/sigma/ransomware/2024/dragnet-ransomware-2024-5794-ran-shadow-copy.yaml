title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5794 — Shadow Copy Deletion (shinyhunters)'
id: a7519cd2-efee-5cc3-abfa-b95fb043e687
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2024-5794
  Ransomware victim claim by shinyhunters: IKEA; country: SE; sector: Consumer Services
  First observed: 2024-09-08.
references:
  - https://breachforums.hn//ikea.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
