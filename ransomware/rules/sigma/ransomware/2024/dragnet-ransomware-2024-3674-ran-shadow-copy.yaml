description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3674
  Ransomware victim claim by lynx: SERGAS Group; country: AE; sector: Energy
  First observed: 2024-12-23.
references:
  - http://lynxblog.net/leaks/6785004f05a779c3d3cc0174
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
