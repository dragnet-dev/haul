title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3675 — Shadow Copy Deletion (lynx)'
id: 6be0e073-14ed-5195-a568-ef87ccb760e9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3675
  Ransomware victim claim by lynx: Siltech (siltechcorp.local); country: CA; sector: Manufacturing
  First observed: 2024-11-09.
references:
  - http://lynxblog.net/leaks/672f3c74dab69e0ba2ce2cbd
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
