title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3646 — Shadow Copy Deletion (lynx)'
id: ab47ea37-2c6c-544d-a05c-40778ac598c2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3646
  Ransomware victim claim by lynx: LifeMine; country: US; sector: Healthcare
  First observed: 2024-09-16.
references:
  - http://lynxblog.net/leaks/6719a479cbfc63d2fb23f665
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
