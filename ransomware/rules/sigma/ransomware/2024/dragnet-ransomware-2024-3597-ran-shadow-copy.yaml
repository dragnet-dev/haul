title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3597 — Shadow Copy Deletion (lynx)'
id: 917ac237-1296-5ff5-8e27-87c44aae5374
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3597
  Ransomware victim claim by lynx: Banco de Fomento Internacional; country: VE; sector: Financial Services
  First observed: 2024-11-06.
references:
  - http://lynxblog.net/leaks/672ad2d8dab69e0ba2c4ab6e
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
