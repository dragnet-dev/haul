description: |
  Detects shadow copy deletion commands associated with chort ransomware.
  Incident: dragnet-ransomware-2024-1450
  Ransomware victim claim by chort: paaf.gov.kw; country: KW; sector: Agriculture and Food Production
  First observed: 2024-11-17.
references:
