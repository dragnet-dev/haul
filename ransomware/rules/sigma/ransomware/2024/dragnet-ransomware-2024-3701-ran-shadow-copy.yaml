title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3701 — Shadow Copy Deletion (lynx)'
id: 946a3199-23ce-5b2b-a05f-e0f90e53eb26
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3701
  Ransomware victim claim by lynx: WimCoCorp; country: US; sector: Education
  First observed: 2024-10-17.
references:
  - http://lynxblog.net/leaks/672f171fdab69e0ba2cdd890
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
