description: |
  Detects shadow copy deletion commands associated with blackbasta ransomware.
  Incident: dragnet-ransomware-2024-1100
  Ransomware victim claim by blackbasta: weberpackaging.com; country: US; sector: Manufacturing
  First observed: 2024-10-08.
references:
  - http://stniiomyjliimcgkvdszvgen3eaaoz55hreqqx6o77yvmpwt7gklffqd.onion/?id=weberpackaging.com
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
