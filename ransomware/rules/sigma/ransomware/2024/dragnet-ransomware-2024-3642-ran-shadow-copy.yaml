title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3642 — Shadow Copy Deletion (lynx)'
id: a6d6fb31-81e8-5d98-b26a-e1cba14ce5af
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3642
  Ransomware victim claim by lynx: Johnson Laschober & Associates; country: US; sector: Business Services
  First observed: 2024-07-23.
references:
  - http://lynxblog.net/leaks/66aaa07be7861ae72f224ac1
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
