title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3614 — Shadow Copy Deletion (lynx)'
id: c7df84ff-1633-568f-9bef-3d9dc6995fc5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3614
  Ransomware victim claim by lynx: Everything Breaks; country: US; sector: Business Services
  First observed: 2024-11-15.
references:
  - http://lynxblog.net/leaks/674476b6e42beed9ed303b54
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
