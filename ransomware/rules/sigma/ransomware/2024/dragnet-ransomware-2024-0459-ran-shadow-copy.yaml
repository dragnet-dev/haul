title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0459 — Shadow Copy Deletion (akira)'
id: 9bcb4429-ea96-58de-96ef-2d420012607b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2024-0459
  Ransomware victim claim by akira: Serfilco, RP Adams, Baron Blakeslee, Pacer, Service Filtration of Canada, Polymar.; country: CA; sector: Manufacturing
  First observed: 2024-04-17.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
