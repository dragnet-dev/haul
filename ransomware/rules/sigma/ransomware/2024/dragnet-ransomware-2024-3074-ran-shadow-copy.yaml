description: |
  Detects shadow copy deletion commands associated with knight ransomware.
  Incident: dragnet-ransomware-2024-3074
  Ransomware victim claim by knight: Chamber of Deputies of Romania (Camera Deputaților din România); country: RO; sector: Public Sector
  First observed: 2024-01-29.
references:
  - http://knight3xppu263m7g4ag3xlit2qxpryjwueobh7vjdc3zrscqlfu3pqd.onion/840f508c-7e15-4dee-a06d-ec3d4d5f2dd0/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
