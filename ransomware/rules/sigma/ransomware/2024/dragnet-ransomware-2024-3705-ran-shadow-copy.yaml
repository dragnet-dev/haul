title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3705 — Shadow Copy Deletion (lynx)'
id: b0809f10-1c5d-5c1c-a7fc-8c4fbd43653e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3705
  Ransomware victim claim by lynx: WPD.WOODPORTDOORS.COM; country: US; sector: Manufacturing
  First observed: 2024-11-27.
references:
  - http://lynxblog.net/leaks/6786469005a779c3d3d2baf2
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
