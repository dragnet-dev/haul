description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-2424
  Ransomware victim claim by handala: Ramat Gan Academic College; country: IL; sector: Education
  First observed: 2024-05-25.
references:
