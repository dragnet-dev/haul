title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1824 — Shadow Copy Deletion (dispossessor)'
id: 46e0960d-aba4-540a-820b-b015748dc851
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2024-1824
  Ransomware victim claim by dispossessor: unidad-de-oftalmologia-y-catarata.negocio.site; country: DO; sector: Healthcare
  First observed: 2024-02-10.
references:
  - https://dispossessor.com/blogs/1348
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
