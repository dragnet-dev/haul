title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3616 — Shadow Copy Deletion (lynx)'
id: 7a1bbece-dc1e-529d-b750-d868b3516aad
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3616
  Ransomware victim claim by lynx: Extra; country: BE; sector: Business Services
  First observed: 2024-11-23.
references:
  - http://lynxblog.net/leaks/674127fee42beed9ed26d298
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
