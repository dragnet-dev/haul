title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3631 — Shadow Copy Deletion (lynx)'
id: 8c4185a6-8893-5b78-b287-27566ea45360
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3631
  Ransomware victim claim by lynx: Hydra-Matic Packing; country: US; sector: Manufacturing
  First observed: 2024-11-15.
references:
  - http://lynxblog.net/leaks/67585d80e42beed9ed6e3ad2
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
