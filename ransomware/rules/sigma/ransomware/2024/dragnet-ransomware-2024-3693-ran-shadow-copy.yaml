title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3693 — Shadow Copy Deletion (lynx)'
id: a96abd51-266b-55cb-b82d-5f987d5fb4e2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3693
  Ransomware victim claim by lynx: Tricon Energy; country: US; sector: Energy
  First observed: 2024-09-29.
references:
  - http://lynxblog.net/leaks/6718c680cbfc63d2fb223219
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
