title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1501 — Shadow Copy Deletion (ciphbit)'
id: c2dfe777-3d6c-5f1a-9ce7-ed4272c7a2d2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ciphbit ransomware.
  Incident: dragnet-ransomware-2024-1501
  Ransomware victim claim by ciphbit: Commerce Dental Group; country: US; sector: Healthcare
  First observed: 2024-04-05.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
