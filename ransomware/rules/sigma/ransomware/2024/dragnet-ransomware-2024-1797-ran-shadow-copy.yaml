title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1797 — Shadow Copy Deletion (dispossessor)'
id: 74d4d34a-1b5f-5b6e-b770-45cc406aa961
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2024-1797
  Ransomware victim claim by dispossessor: hubbell.com; country: US; sector: Manufacturing
  First observed: 2024-04-19.
references:
  - https://dispossessor.com/blogs/97
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
