title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3682 — Shadow Copy Deletion (lynx)'
id: ca2fbc6b-9a48-51fc-9b4f-3b71a424ace7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3682
  Ransomware victim claim by lynx: Suneva Medical(sunevamedical.com); country: US; sector: Healthcare
  First observed: 2024-11-14.
references:
  - http://lynxblog.net/leaks/67362692dab69e0ba2deae3a
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
