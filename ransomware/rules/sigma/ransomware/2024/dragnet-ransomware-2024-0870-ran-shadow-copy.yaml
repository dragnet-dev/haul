  Ransomware victim claim by bianlian: New York Home Healthcare; country: US; sector: Healthcare
  First observed: 2024-03-07.
references:
  - http://bianlianlbc5an4kgnay3opdemgcryg2kpfcbgczopmm3dnbz3uaunad.onion//companies/nyhhc.com
