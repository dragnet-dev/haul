description: |
  Detects shadow copy deletion commands associated with helldown ransomware.
  Incident: dragnet-ransomware-2024-2473
  Ransomware victim claim by helldown: SANJACINTOCOUNY; country: US; sector: Public Sector
  First observed: 2024-10-11.
references:
  - http://onyxcym4mjilrsptk5uo2dhesbwntuban55mvww2olk5ygqafhu3i3yd.onion/c6593ec1.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
