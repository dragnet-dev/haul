description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3609
  Ransomware victim claim by lynx: Denkali; country: IN; sector: Business Services
  First observed: 2024-10-16.
references:
