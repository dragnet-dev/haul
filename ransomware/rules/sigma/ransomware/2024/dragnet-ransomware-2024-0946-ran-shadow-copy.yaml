description: |
  Detects shadow copy deletion commands associated with blackbasta ransomware.
  Incident: dragnet-ransomware-2024-0946
  Ransomware victim claim by blackbasta: bathfitter.com; country: CA; sector: Business Services
  First observed: 2024-12-05.
references:
  - http://stniiomyjliimcgkvdszvgen3eaaoz55hreqqx6o77yvmpwt7gklffqd.onion/?id=bathfitter.com
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
