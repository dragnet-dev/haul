title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3639 — Shadow Copy Deletion (lynx)'
id: f6ae4daf-db4a-5c03-9c9b-f65bf3dde6fe
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3639
  Ransomware victim claim by lynx: Jalaram Produce; country: US; sector: Agriculture and Food Production
  First observed: 2024-11-25.
references:
  - http://lynxblog.net/leaks/679b5ece861630bc7786b4fa
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
