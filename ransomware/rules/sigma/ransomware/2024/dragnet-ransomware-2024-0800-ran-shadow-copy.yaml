description: |
  Detects shadow copy deletion commands associated with bianlian ransomware.
  Incident: dragnet-ransomware-2024-0800
  Ransomware victim claim by bianlian: Delta Pipeline; country: US; sector: Business Services
  First observed: 2024-03-19.
references:
  - http://bianlivemqbawcco4cx4a672k2fip3guyxudzurfqvdszafam3ofqgqd.onion/companies/deltapipeline.com
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
