title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2259 — Shadow Copy Deletion (frag)'
id: 3ab03cef-4b7c-5e26-b4f0-09fbd4feb5ff
status: deprecated
description: |
  Detects shadow copy deletion commands associated with frag ransomware.
  Incident: dragnet-ransomware-2024-2259
  Ransomware victim claim by frag: Ellis Glass and Mirror Ltd; country: GB; sector: Construction
  First observed: 2024-10-22.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
