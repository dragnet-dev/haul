title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3605 — Shadow Copy Deletion (lynx)'
id: 3a8345ce-b524-5072-8c06-7135709aa080
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3605
  Ransomware victim claim by lynx: Conad (conad.lan); country: IT; sector: Consumer Services
  First observed: 2024-11-18.
references:
  - http://lynxblog.net/leaks/678566d205a779c3d3ce1a31
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
