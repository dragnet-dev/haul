references:
  - http://cx5u7zxbvrfyoj6ughw76oa264ucuuizmmzypwum6ear7pct4yc723qd.onion/detail?id=64ec98e222b44511a340cef74ba6445f
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
