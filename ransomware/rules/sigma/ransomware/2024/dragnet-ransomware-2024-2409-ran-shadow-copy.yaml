title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2409 — Shadow Copy Deletion (handala)'
id: a9bed768-05a0-5f8a-bb24-577c8a8673a5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-2409
  Ransomware victim claim by handala: Innovalve 3TB ( $300M ); sector: Healthcare
  First observed: 2024-07-26.
references:
  - https://handala-hack.to/innovalve-3tb-data-leak-300m/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
