title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3632 — Shadow Copy Deletion (lynx)'
id: 8e19fd70-6547-506f-ab17-164c141f2411
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3632
  Ransomware victim claim by lynx: Hypertype; country: US; sector: Healthcare
  First observed: 2024-10-29.
references:
  - http://lynxblog.net/leaks/67435265e42beed9ed2ce748
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
