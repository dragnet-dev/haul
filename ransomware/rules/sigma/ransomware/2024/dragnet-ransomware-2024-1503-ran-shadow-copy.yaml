title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1503 — Shadow Copy Deletion (ciphbit)'
id: 48e1311f-925b-57f7-9a15-3348dcdcfc82
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ciphbit ransomware.
  Incident: dragnet-ransomware-2024-1503
  Ransomware victim claim by ciphbit: FD S.R.L; country: IT; sector: Technology
  First observed: 2024-08-15.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
