title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1965 — Shadow Copy Deletion (dragonransomware)'
id: 6afacddd-a772-5383-a7b3-c92ca1e63064
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dragonransomware ransomware.
  Incident: dragnet-ransomware-2024-1965
  Ransomware victim claim by dragonransomware: timesexpress.net; country: AE; sector: Transportation/Logistics
  First observed: 2024-12-12.
references:
  - https://t.me/DragonRansom/433
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
