description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3657
  Ransomware victim claim by lynx: NEBRASKALAND; country: US; sector: Agriculture and Food Production
  First observed: 2024-10-19.
references:
