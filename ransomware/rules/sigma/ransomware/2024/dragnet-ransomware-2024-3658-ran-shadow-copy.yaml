title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3658 — Shadow Copy Deletion (lynx)'
id: c42945dd-dbeb-5ea6-b6e3-6af179db4272
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3658
  Ransomware victim claim by lynx: New Age Micro; country: US; sector: Technology
  First observed: 2024-12-02.
references:
  - http://lynxblog.net/leaks/674da7bee42beed9ed47fb9c
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
