description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-2805
  Ransomware victim claim by incransom: Human Technology Inc.; country: US; sector: Technology
  First observed: 2024-04-27.
references:
