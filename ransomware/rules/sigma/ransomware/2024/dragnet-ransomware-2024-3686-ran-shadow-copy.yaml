title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3686 — Shadow Copy Deletion (lynx)'
id: f6580049-dbf9-5e2b-b163-b3b33e80768a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3686
  Ransomware victim claim by lynx: TaxPros of Clermont; country: US; sector: Financial Services
  First observed: 2024-10-24.
references:
  - http://lynxblog.net/leaks/67321fdedab69e0ba2d4cdcf
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
