description: |
  Detects shadow copy deletion commands associated with helldown ransomware.
  Incident: dragnet-ransomware-2024-2447
  Ransomware victim claim by helldown: ATP; country: IT; sector: Business Services
  First observed: 2024-08-20.
references:
  - http://onyxcgfg4pjevvp5h34zvhaj45kbft3dg5r33j5vu3nyp7xic3vrzvad.onion/3ba5f741.html
