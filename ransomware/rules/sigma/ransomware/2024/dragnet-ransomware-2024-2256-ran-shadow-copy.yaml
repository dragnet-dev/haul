title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2256 — Shadow Copy Deletion (frag)'
id: 4cc6564a-d1bb-56d7-a6ae-a3bba6798a11
status: deprecated
description: |
  Detects shadow copy deletion commands associated with frag ransomware.
  Incident: dragnet-ransomware-2024-2256
  Ransomware victim claim by frag: AmeriKen Die Supply, Inc; country: US; sector: Manufacturing
  First observed: 2024-11-12.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
