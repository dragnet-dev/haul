description: |
  Detects shadow copy deletion commands associated with blacksuit ransomware.
  Incident: dragnet-ransomware-2024-1184
  Ransomware victim claim by blacksuit: catiglass.com $100.000; country: US; sector: Business Services
  First observed: 2024-04-29.
references:
