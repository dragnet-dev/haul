title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5915 — Shadow Copy Deletion (stormous)'
id: 3df30318-7098-5405-922c-f3b177544b36
status: deprecated
description: |
  Detects shadow copy deletion commands associated with stormous ransomware.
  Incident: dragnet-ransomware-2024-5915
  Ransomware victim claim by stormous: intrama-bg; country: BG; sector: Manufacturing
  First observed: 2024-07-28.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
