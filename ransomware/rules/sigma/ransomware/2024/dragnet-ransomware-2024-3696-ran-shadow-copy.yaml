description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3696
  Ransomware victim claim by lynx: True Blue Environmental; country: US; sector: Construction
  First observed: 2024-07-16.
references:
  - http://lynxblog.net/leaks/6697cfd09e33e89b00de8561
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
