title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3689 — Shadow Copy Deletion (lynx)'
id: 856ee953-62a1-5b7f-bf93-bde2c6c68044
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3689
  Ransomware victim claim by lynx: The Greenhouse People; country: GB; sector: Business Services
  First observed: 2024-07-16.
references:
  - http://lynxblog.net/leaks/6697936c9e33e89b00de841f
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
