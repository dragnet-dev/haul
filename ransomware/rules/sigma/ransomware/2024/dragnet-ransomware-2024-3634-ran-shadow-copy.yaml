title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3634 — Shadow Copy Deletion (lynx)'
id: 33f27861-c364-566b-8d62-4a39b364fb11
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3634
  Ransomware victim claim by lynx: Inland Tarp & Liner; country: US; sector: Manufacturing
  First observed: 2024-10-31.
references:
  - http://lynxblog.net/leaks/674349d7e42beed9ed2cc8b8
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
