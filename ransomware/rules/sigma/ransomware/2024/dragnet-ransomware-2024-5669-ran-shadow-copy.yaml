title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5669 — Shadow Copy Deletion (rhysida)'
id: 82d88b24-c0ca-5549-804e-1083f6d88541
status: deprecated
description: |
  Detects shadow copy deletion commands associated with rhysida ransomware.
  Incident: dragnet-ransomware-2024-5669
  Ransomware victim claim by rhysida: The Washington Times; country: US; sector: Consumer Services
  First observed: 2024-08-14.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
