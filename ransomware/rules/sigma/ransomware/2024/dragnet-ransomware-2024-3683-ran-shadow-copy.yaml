title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3683 — Shadow Copy Deletion (lynx)'
id: c9105e81-da53-5ee8-a86d-1b93ed08aa1a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3683
  Ransomware victim claim by lynx: Talascend; country: US; sector: Transportation/Logistics
  First observed: 2024-11-25.
references:
  - http://lynxblog.net/leaks/67584cfee42beed9ed6dfb29
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
