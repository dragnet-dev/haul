description: |
  Detects shadow copy deletion commands associated with SilentRansomGroup ransomware.
  Incident: dragnet-ransomware-2024-5824
  Ransomware victim claim by SilentRansomGroup: Sanchez Daniels & Hoffman LLP; country: US; sector: Business Services
