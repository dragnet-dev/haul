title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3637 — Shadow Copy Deletion (lynx)'
id: 9fc3183a-1022-5365-bbe3-59fbfeb6255f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3637
  Ransomware victim claim by lynx: ITU AbsorbTech; country: US; sector: Manufacturing
  First observed: 2024-12-17.
references:
  - http://lynxblog.net/leaks/677c4add05a779c3d3a2b25e
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
