title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3700 — Shadow Copy Deletion (lynx)'
id: b7f53bc3-50ea-5829-b75d-bd9c0b0ecabb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3700
  Ransomware victim claim by lynx: Warwick Hotels and Resorts; country: US; sector: Hospitality and Tourism
  First observed: 2024-08-01.
references:
  - http://lynxblog.net/leaks/66ba5039a3128b53533e61ba
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
