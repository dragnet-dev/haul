  Ransomware victim claim by bianlian: Proax Technologies LTD; country: CA; sector: Manufacturing
  First observed: 2024-01-05.
references:
  - http://bianlianlbc5an4kgnay3opdemgcryg2kpfcbgczopmm3dnbz3uaunad.onion//companies/proax.ca/
