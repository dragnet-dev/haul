description: |
  Detects shadow copy deletion commands associated with threeam ransomware.
  Incident: dragnet-ransomware-2024-5973
  Ransomware victim claim by threeam: thecsi.com; country: CA; sector: Business Services
  First observed: 2024-01-12.
references:
