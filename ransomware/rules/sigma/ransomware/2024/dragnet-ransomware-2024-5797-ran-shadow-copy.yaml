title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5797 — Shadow Copy Deletion (shinyhunters)'
id: e030fdf1-3ba7-5770-a2ff-dcb3e1221947
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2024-5797
  Ransomware victim claim by shinyhunters: Saks Fifth; country: US; sector: Consumer Services
  First observed: 2024-06-05.
references:
  - https://breachforums.hn//saksfifth.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
