description: |
  Detects shadow copy deletion commands associated with moneymessage ransomware.
  Incident: dragnet-ransomware-2024-4107
  Ransomware victim claim by moneymessage: The Egyptian Tax Authority (ETA); country: EG; sector: Public Sector
  First observed: 2024-11-17.
references:
