title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2838 — Shadow Copy Deletion (incransom)'
id: 918f8005-89ce-52c4-afad-a4bd4503b453
status: deprecated
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-2838
  Ransomware victim claim by incransom: OrthoNY, Orthopedic Care; country: US; sector: Healthcare
  First observed: 2024-01-25.
references:
  - http://incapt.blog/blog/leak/B0873B072264B9DB
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
