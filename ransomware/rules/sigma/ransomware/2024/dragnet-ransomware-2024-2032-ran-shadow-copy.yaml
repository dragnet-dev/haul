title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2032 — Shadow Copy Deletion (ElDorado)'
id: 83c73ae6-9dd1-5539-995b-c3d4df6a030c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ElDorado ransomware.
  Incident: dragnet-ransomware-2024-2032
  Ransomware victim claim by ElDorado: Midland Turbo; country: GB; sector: Manufacturing
  First observed: 2024-12-14.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
