title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3602 — Shadow Copy Deletion (lynx)'
id: 6b25479d-2344-59c6-bb20-1535f7f0b31d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3602
  Ransomware victim claim by lynx: Cambria Automobiles (summitgroup.local); country: GB; sector: Business Services
  First observed: 2024-07-24.
references:
  - http://lynxblog.net/leaks/66aa4ba7e7861ae72f223ed4
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
