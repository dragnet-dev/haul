title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2438 — Shadow Copy Deletion (hellcat)'
id: 1f4a7d82-0c89-58fc-ada5-84c6d868a90a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with hellcat ransomware.
  Incident: dragnet-ransomware-2024-2438
  Ransomware victim claim by hellcat: Car Care Plan - Turkey; country: TR; sector: Consumer Services
  First observed: 2024-12-26.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
