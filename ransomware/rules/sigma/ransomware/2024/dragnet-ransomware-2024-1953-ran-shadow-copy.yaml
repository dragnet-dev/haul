title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1953 — Shadow Copy Deletion (dragonransomware)'
id: 821e2b3b-2f4d-59bb-b65d-629432bc5c97
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dragonransomware ransomware.
  Incident: dragnet-ransomware-2024-1953
  Ransomware victim claim by dragonransomware: pid.co.zw; country: ZW; sector: Business Services
  First observed: 2024-12-13.
references:
  - https://t.me/DragonRansom/436
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
