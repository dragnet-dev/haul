description: |
  Detects shadow copy deletion commands associated with blacksuit ransomware.
  Incident: dragnet-ransomware-2024-1227
  Ransomware victim claim by blacksuit: Hostetler Buildings; country: US; sector: Business Services
  First observed: 2024-08-14.
references:
  - http://weg7sdx54bevnvulapqu6bpzwztryeflq3s23tegbmnhkbpqz637f2yd.onion/?id=pdKvXBxSAJC7MF3A
