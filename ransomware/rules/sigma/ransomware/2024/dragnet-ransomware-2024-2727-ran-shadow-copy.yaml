references:
  - http://incblog6qu4y4mm4zvw5nrmue6qbwtgjsxpw6b7ixzssu36tsajldoad.onion/blog/disclosures/675437e838e2eaa58b36b549
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
