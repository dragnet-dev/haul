title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2432 — Shadow Copy Deletion (handala)'
id: 825243d8-e7a1-5a74-970e-cbfca1228a3b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-2432
  Ransomware victim claim by handala: Sonol ( Gas Stations ); sector: Energy
  First observed: 2024-07-11.
references:
  - https://handala.to/zionists-sonol-hacked-gas-stations/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
