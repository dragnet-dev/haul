description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3665
  Ransomware victim claim by lynx: plowmancraven.co.uk; country: GB; sector: Business Services
  First observed: 2024-10-11.
references:
  - http://lynxblog.net/leaks/672c7200dab69e0ba2c7e23b
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
