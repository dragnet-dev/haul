title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3622 — Shadow Copy Deletion (lynx)'
id: af3dfe6f-c445-5e53-bcdb-11a6b9a21b61
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3622
  Ransomware victim claim by lynx: GBC; country: GB; sector: Telecommunication
  First observed: 2024-12-04.
references:
  - http://lynxblog.net/leaks/67501b7fe42beed9ed50bc5e
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
