references:
  - http://lockbit3olp7oetlc4tl5zydnoluphh7fvdt5oa6arcp2757r7xkutid.onion/post/c5fBFEz3WoOEKD2d66103ab04eb39
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
