description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3604
  Ransomware victim claim by lynx: CM Buck & Associates; country: IN; sector: Manufacturing
  First observed: 2024-12-11.
references:
  - http://lynxblog.net/leaks/67596712e42beed9ed721fc3
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
