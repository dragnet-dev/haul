title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5726 — Shadow Copy Deletion (safepay)'
id: 1f9b92ef-2b42-5d71-b603-cc06d23e60f6
status: deprecated
description: |
  Detects shadow copy deletion commands associated with safepay ransomware.
  Incident: dragnet-ransomware-2024-5726
  Ransomware victim claim by safepay: stats.gov.bb; country: BB; sector: Public Sector
  First observed: 2024-10-29.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
