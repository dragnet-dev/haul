references:
  - http://incblog6qu4y4mm4zvw5nrmue6qbwtgjsxpw6b7ixzssu36tsajldoad.onion/blog/disclosures/672b3b2c38e2eaa58bfa9cc6
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
