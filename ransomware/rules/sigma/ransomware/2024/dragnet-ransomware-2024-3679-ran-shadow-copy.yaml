title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3679 — Shadow Copy Deletion (lynx)'
id: ec28a0cf-23cf-5fed-a88c-8603fdf82322
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3679
  Ransomware victim claim by lynx: Societatea Energetica Electrica S.A.; country: RO; sector: Energy
  First observed: 2024-12-05.
references:
  - http://lynxblog.net/leaks/67584e89e42beed9ed6e0070
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
