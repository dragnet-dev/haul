description: |
  Detects shadow copy deletion commands associated with blacksuit ransomware.
  Incident: dragnet-ransomware-2024-1176
  Ransomware victim claim by blacksuit: Bandier; country: US; sector: Business Services
  First observed: 2024-07-17.
references:
