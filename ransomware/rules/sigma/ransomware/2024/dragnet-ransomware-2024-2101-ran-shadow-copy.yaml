  Ransomware victim claim by everest: Concord Orthopaedics; country: US; sector: Healthcare
  First observed: 2024-11-24.
references:
  - http://ransomocmou6mnbquqz44ewosbkjk3o5qjsl3orawojexfook2j7esad.onion/concord-orthopaedics/
