description: |
  Detects shadow copy deletion commands associated with abyss ransomware.
  Incident: dragnet-ransomware-2024-0178
  Ransomware victim claim by abyss: rameywine.com; country: US; sector: Agriculture and Food Production
  First observed: 2024-03-29.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
