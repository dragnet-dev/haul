description: |
  Detects shadow copy deletion commands associated with meow ransomware.
  Incident: dragnet-ransomware-2024-3964
  Ransomware victim claim by meow: Arlington Perinatal Associates; country: US; sector: Healthcare
  First observed: 2024-02-12.
references:
  - http://meow6xanhzfci2gbkn3lmbqq7xjjufskkdfocqdngt3ltvzgqpsg5mid.onion/story/arlington-perinatal-associates
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
