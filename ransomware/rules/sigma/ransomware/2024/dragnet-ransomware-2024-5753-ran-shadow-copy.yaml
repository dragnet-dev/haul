description: |
  Detects shadow copy deletion commands associated with sarcoma ransomware.
  Incident: dragnet-ransomware-2024-5753
  Ransomware victim claim by sarcoma: FF Steel; country: PK; sector: Manufacturing
  First observed: 2024-12-04.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
