title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3702 — Shadow Copy Deletion (lynx)'
id: f846a684-e5bc-5d2c-81fb-08518b98a283
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3702
  Ransomware victim claim by lynx: Wireless Solutions (Morris.Domain); country: US; sector: Telecommunication
  First observed: 2024-12-15.
references:
  - http://lynxblog.net/leaks/6797e48205a779c3d32fc334
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
