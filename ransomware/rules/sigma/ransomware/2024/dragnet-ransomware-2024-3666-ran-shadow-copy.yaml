title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3666 — Shadow Copy Deletion (lynx)'
id: 83750b85-6ec1-593f-8d0e-19b3992d483d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3666
  Ransomware victim claim by lynx: powelltool.com; country: US; sector: Manufacturing
  First observed: 2024-12-24.
references:
  - http://lynxblog.net/leaks/677c5baf05a779c3d3a2f62c
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
