description: |
  Detects shadow copy deletion commands associated with monti ransomware.
  Incident: dragnet-ransomware-2024-4135
  Ransomware victim claim by monti: Prism Construction; country: CA; sector: Business Services
  First observed: 2024-08-30.
references:
