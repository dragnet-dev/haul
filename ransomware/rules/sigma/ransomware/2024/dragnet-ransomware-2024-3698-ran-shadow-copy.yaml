title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3698 — Shadow Copy Deletion (lynx)'
id: b3fe516a-2d85-5bed-913d-a2c93e9d1022
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3698
  Ransomware victim claim by lynx: ValueMax Group; country: SG; sector: Financial Services
  First observed: 2024-10-16.
references:
  - http://lynxblog.net/leaks/67101909cbfc63d2fb1615d3
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
