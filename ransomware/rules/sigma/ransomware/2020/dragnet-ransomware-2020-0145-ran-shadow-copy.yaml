title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0145 — Shadow Copy Deletion (netwalker)'
id: e3e589b1-f83f-52f6-8744-096fc292604f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with netwalker ransomware.
  Incident: dragnet-ransomware-2020-0145
  Ransomware victim claim by netwalker: K-Electric (electric utility supplier); country: PK; sector: Energy
  First observed: 2020-09-07.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
