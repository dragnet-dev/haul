title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0141 — Shadow Copy Deletion (netwalker)'
id: a8cf3774-0bee-5708-8bb9-01b5f8a8f922
status: deprecated
description: |
  Detects shadow copy deletion commands associated with netwalker ransomware.
  Incident: dragnet-ransomware-2020-0141
  Ransomware victim claim by netwalker: Entrust Energy; country: US; sector: Energy
  First observed: 2020-08-05.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
