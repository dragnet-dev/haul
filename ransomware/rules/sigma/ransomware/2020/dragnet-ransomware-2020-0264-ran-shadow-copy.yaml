title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0264 — Shadow Copy Deletion (snake)'
id: 1f227652-0e95-5b7e-ab56-603a8f6f906d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with snake ransomware.
  Incident: dragnet-ransomware-2020-0264
  Ransomware victim claim by snake: Fresenius SE & Co.; country: DE; sector: Healthcare
  First observed: 2020-05-04.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
