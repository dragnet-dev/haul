title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0038 — Shadow Copy Deletion (dispossessor)'
id: 7677fc27-8a9b-50e5-8e09-89a75ad4450d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2020-0038
  Ransomware victim claim by dispossessor: pbinfo.com; country: US; sector: Not Found
  First observed: 2020-06-25.
references:
  - https://dispossessor.com/blogs/32
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
