title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0007 — Shadow Copy Deletion (coldlock)'
id: 11bd5b7e-41a7-5436-892c-1fa338dd08eb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with coldlock ransomware.
  Incident: dragnet-ransomware-2020-0007
  Ransomware victim claim by coldlock: CPC Corp. (Tawain's state-owned energy company); sector: Energy
  First observed: 2020-05-05.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
