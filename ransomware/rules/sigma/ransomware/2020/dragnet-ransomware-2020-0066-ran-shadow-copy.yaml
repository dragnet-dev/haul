title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0066 — Shadow Copy Deletion (egregor)'
id: 9c55e3f6-0a61-56e3-ae83-44f84d166334
status: deprecated
description: |
  Detects shadow copy deletion commands associated with egregor ransomware.
  Incident: dragnet-ransomware-2020-0066
  Ransomware victim claim by egregor: Kmart; country: US; sector: Consumer Services
  First observed: 2020-12-01.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
