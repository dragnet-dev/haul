title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0027 — Shadow Copy Deletion (dispossessor)'
id: f928ee45-85ee-533b-9181-592aa705765d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2020-0027
  Ransomware victim claim by dispossessor: chuckecheese.com; country: US; sector: Hospitality and Tourism
  First observed: 2020-08-22.
references:
  - https://dispossessor.com/blogs/62
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
