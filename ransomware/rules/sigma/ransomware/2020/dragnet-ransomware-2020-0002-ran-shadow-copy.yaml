title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0002 — Shadow Copy Deletion (babuk)'
id: b03b5b4e-760c-5e3c-a40c-86f1b96a54ec
status: deprecated
description: |
  Detects shadow copy deletion commands associated with babuk ransomware.
  Incident: dragnet-ransomware-2020-0002
  Ransomware victim claim by babuk: Serco; country: GB; sector: Healthcare
  First observed: 2020-10-25.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
