title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0070 — Shadow Copy Deletion (lockbit)'
id: 060f02d9-0b8c-5469-aa1b-600f8e383c1d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lockbit ransomware.
  Incident: dragnet-ransomware-2020-0070
  Ransomware victim claim by lockbit: Kopter; country: CH; sector: Manufacturing
  First observed: 2020-11-30.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
