title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0107 — Shadow Copy Deletion (maze)'
id: f8240e1b-d489-5e33-8267-6fd655d23dca
status: deprecated
description: |
  Detects shadow copy deletion commands associated with maze ransomware.
  Incident: dragnet-ransomware-2020-0107
  Ransomware victim claim by maze: Pitney Bowes; country: US; sector: Technology
  First observed: 2020-05-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
