title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0037 — Shadow Copy Deletion (dispossessor)'
id: b34afc59-52ac-53d8-bc4b-2fa4e8f9d8c4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2020-0037
  Ransomware victim claim by dispossessor: joneslanglasalle.com; country: FR; sector: Business Services
  First observed: 2020-07-20.
references:
  - https://dispossessor.com/blogs/53
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
