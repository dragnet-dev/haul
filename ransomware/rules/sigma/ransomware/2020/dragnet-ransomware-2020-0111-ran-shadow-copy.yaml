title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0111 — Shadow Copy Deletion (maze)'
id: 790bf9b0-661f-564f-851d-276b54f5b66d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with maze ransomware.
  Incident: dragnet-ransomware-2020-0111
  Ransomware victim claim by maze: Southeastern Wire (wire manufacturer); country: US; sector: Manufacturing
  First observed: 2020-04-05.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
