title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0069 — Shadow Copy Deletion (hades)'
id: 67d5ee3f-de76-57a4-bfec-2e42606d03fe
status: deprecated
description: |
  Detects shadow copy deletion commands associated with hades ransomware.
  Incident: dragnet-ransomware-2020-0069
  Ransomware victim claim by hades: Forward Air Corp; country: US; sector: Transportation/Logistics
  First observed: 2020-12-15.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
