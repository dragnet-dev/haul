title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0060 — Shadow Copy Deletion (doppelpaymer)'
id: d7d9dc7a-efe6-5319-a172-2a757fda5599
status: deprecated
description: |
  Detects shadow copy deletion commands associated with doppelpaymer ransomware.
  Incident: dragnet-ransomware-2020-0060
  Ransomware victim claim by doppelpaymer: Knoxville PD and City of Knoxville, TN (Knox County); country: US; sector: Public Sector
  First observed: 2020-06-11.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
