title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0074 — Shadow Copy Deletion (mamba)'
id: 0c565e0c-00fb-52d7-81b3-4c4f23fcb8ee
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mamba ransomware.
  Incident: dragnet-ransomware-2020-0074
  Ransomware victim claim by mamba: Unnamed health care company; country: US; sector: Healthcare
  First observed: 2020-05-07.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
