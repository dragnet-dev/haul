title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0262 — Shadow Copy Deletion (sekhmet)'
id: 8173b17d-0e6c-5243-baf8-437c6a2b62b5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with sekhmet ransomware.
  Incident: dragnet-ransomware-2020-0262
  Ransomware victim claim by sekhmet: SilPac; country: US; sector: Energy
  First observed: 2020-06-20.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
