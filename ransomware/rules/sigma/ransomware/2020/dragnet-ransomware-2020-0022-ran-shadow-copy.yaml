title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0022 — Shadow Copy Deletion (dharma)'
id: 7a5ea317-2d5e-5ce4-b8e4-de7b99d9e0a2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dharma ransomware.
  Incident: dragnet-ransomware-2020-0022
  Ransomware victim claim by dharma: Medservicegroup; country: UA; sector: Manufacturing
  First observed: 2020-06-01.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
