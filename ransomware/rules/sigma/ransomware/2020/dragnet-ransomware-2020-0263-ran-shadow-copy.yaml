title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0263 — Shadow Copy Deletion (snake)'
id: 181bc241-b43c-59d1-967d-3b22e61aa468
status: deprecated
description: |
  Detects shadow copy deletion commands associated with snake ransomware.
  Incident: dragnet-ransomware-2020-0263
  Ransomware victim claim by snake: Enel Argentina Edesur S.A. Buenos Aires; country: AR; sector: Energy
  First observed: 2020-06-07.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
