title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0250 — Shadow Copy Deletion (ryuk)'
id: f6038f70-e886-5b54-856e-a15fa683016b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ryuk ransomware.
  Incident: dragnet-ransomware-2020-0250
  Ransomware victim claim by ryuk: K12 (AKA Stride Inc); country: US; sector: Education
  First observed: 2020-11-15.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
