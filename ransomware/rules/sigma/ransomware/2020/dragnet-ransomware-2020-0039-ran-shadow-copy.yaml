title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0039 — Shadow Copy Deletion (dispossessor)'
id: 57edd1f9-91c7-53c9-aa82-bcce2445b5cb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2020-0039
  Ransomware victim claim by dispossessor: planethomelending.com; country: US; sector: Financial Services
  First observed: 2020-03-25.
references:
  - https://dispossessor.com/blogs/68
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
