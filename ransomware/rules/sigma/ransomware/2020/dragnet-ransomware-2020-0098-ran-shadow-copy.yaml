title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0098 — Shadow Copy Deletion (maze)'
id: 6074b1f0-20f2-5c00-bfa5-7ea7384a3b61
status: deprecated
description: |
  Detects shadow copy deletion commands associated with maze ransomware.
  Incident: dragnet-ransomware-2020-0098
  Ransomware victim claim by maze: Henning Harders (freight and logistics firm); country: AU; sector: Transportation/Logistics
  First observed: 2020-03-15.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
