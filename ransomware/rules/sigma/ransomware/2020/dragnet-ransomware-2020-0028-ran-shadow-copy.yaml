title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0028 — Shadow Copy Deletion (dispossessor)'
id: 4a045ee1-faf1-5da9-a3e0-f9f1bc0f4c27
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2020-0028
  Ransomware victim claim by dispossessor: convergeone.com; country: US; sector: Technology
  First observed: 2020-10-07.
references:
  - https://dispossessor.com/blogs/94
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
