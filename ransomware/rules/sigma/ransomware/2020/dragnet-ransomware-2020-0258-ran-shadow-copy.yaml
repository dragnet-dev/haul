title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0258 — Shadow Copy Deletion (ryuk)'
id: 4b41b1b3-c211-5bea-88f7-52032bc82a08
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ryuk ransomware.
  Incident: dragnet-ransomware-2020-0258
  Ransomware victim claim by ryuk: Universal Health Services (UHS) Hospitals; country: US; sector: Healthcare
  First observed: 2020-09-27.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
