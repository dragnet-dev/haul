title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4205 — Shadow Copy Deletion (lynx)'
id: 1f8a5e85-2a37-5505-882c-a681bf75d6da
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4205
  Ransomware victim claim by lynx: Rossi Real Estate (ROSSIDG.LOCAL); country: US; sector: Business Services
  First observed: 2025-01-29.
references:
  - http://lynxblog.net/leaks/6787976705a779c3d3da3ebf
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
