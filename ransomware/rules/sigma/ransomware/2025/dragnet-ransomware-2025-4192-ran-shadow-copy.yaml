title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4192 — Shadow Copy Deletion (lynx)'
id: e1b0e5c0-dd94-50f9-9325-936e29ce357e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4192
  Ransomware victim claim by lynx: Pervedant; country: PT; sector: Manufacturing
  First observed: 2025-03-05.
references:
  - http://lynxblog.net/leaks/67c8a78644fac8dca1a4f213
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
