references:
  - http://genesis6ixpb5mcy4kudybtw5op2wqlrkocfogbnenz3c647ibqixiad.onion/5ef56805ff1995688f5a/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
