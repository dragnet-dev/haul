title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4169 — Shadow Copy Deletion (lynx)'
id: f32ac436-4312-5a8b-8cc5-13edd4bb56c0
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4169
  Ransomware victim claim by lynx: Martin Mechanical (martin.local); country: US; sector: Construction
  First observed: 2025-03-05.
references:
  - http://lynxblog.net/leaks/67c8384f44fac8dca1a15ae9
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
