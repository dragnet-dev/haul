description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4152
  Ransomware victim claim by lynx: KPI Engineering; country: GB; sector: Construction
  First observed: 2025-01-30.
references:
