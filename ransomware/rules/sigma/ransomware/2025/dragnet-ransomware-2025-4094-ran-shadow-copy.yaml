title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4094 — Shadow Copy Deletion (lynx)'
id: d15b6a95-985b-5419-a0db-1e0cdda95dce
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4094
  Ransomware victim claim by lynx: dhsmithco.com; country: US; sector: Construction
  First observed: 2025-03-27.
references:
  - http://lynxblog.net/leaks/67fed323ce8dcc3b0d9112c6
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
