description: |
  Detects shadow copy deletion commands associated with nova ransomware.
  Incident: dragnet-ransomware-2025-4627
  Ransomware victim claim by nova: Dansoft; country: US; sector: Technology
  First observed: 2025-07-13.
references:
  - http://leak7y2247fj7dbb35rpfyxuyaqtwbshiwxp6h35ttzlhrxmhvi4fead.onionDansoft
