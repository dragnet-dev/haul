description: |
  Detects shadow copy deletion commands associated with qilin ransomware.
  Incident: dragnet-ransomware-2025-6055
  Ransomware victim claim by qilin: The Blood and Marrow Transplant Group of Georgia; country: US; sector: Healthcare
  First observed: 2025-10-19.
references:
