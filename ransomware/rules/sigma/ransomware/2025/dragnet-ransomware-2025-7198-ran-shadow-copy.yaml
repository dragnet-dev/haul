title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7198 — Shadow Copy Deletion (SilentRansomGroup)'
id: aabfb0a3-4d8f-5e7c-bdaf-635d1a969c3f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with SilentRansomGroup ransomware.
  Incident: dragnet-ransomware-2025-7198
  Ransomware victim claim by SilentRansomGroup: CRC Group; country: US; sector: Financial Services
  First observed: 2025-03-16.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
