description: |
  Detects shadow copy deletion commands associated with safepay ransomware.
  Incident: dragnet-ransomware-2025-7008
  Ransomware victim claim by safepay: willms-fleisch.de; country: DE; sector: Agriculture and Food Production
  First observed: 2025-03-05.
references:
  - http://nz4z6ruzcekriti5cjjiiylzvrmysyqwibxztk6voem4trtx7gstpjid.onion#willms-fleisch
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
