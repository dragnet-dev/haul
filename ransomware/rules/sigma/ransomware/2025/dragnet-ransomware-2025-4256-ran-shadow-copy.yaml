title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4256 — Shadow Copy Deletion (lynx)'
id: 4496043c-c2c6-5890-9819-908a02819a00
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4256
  Ransomware victim claim by lynx: Winbas; country: SE; sector: Manufacturing
  First observed: 2025-01-23.
references:
  - http://lynxblog.net/leaks/67b3480e44fac8dca109ddaa
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
