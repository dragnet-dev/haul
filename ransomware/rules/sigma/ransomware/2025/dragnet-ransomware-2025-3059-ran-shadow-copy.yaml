description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-3059
  Ransomware victim claim by handala: Leaked Documents Reveal Identities of Iran International Staff; country: GB; sector: Not Found
  First observed: 2025-07-09.
references:
