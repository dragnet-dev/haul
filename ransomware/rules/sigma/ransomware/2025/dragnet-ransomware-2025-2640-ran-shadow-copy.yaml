description: |
  Detects shadow copy deletion commands associated with everest ransomware.
  Incident: dragnet-ransomware-2025-2640
  Ransomware victim claim by everest: Arlington Occupational Health and Wellness; country: US; sector: Healthcare
  First observed: 2025-06-17.
references:
  - http://ransomocmou6mnbquqz44ewosbkjk3o5qjsl3orawojexfook2j7esad.onion/news/arlingtonohw
