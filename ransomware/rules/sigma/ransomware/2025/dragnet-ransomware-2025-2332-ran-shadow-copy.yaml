description: |
  Detects shadow copy deletion commands associated with direwolf ransomware.
  Incident: dragnet-ransomware-2025-2332
  Ransomware victim claim by direwolf: Anadolu Hastaneleri; country: TR; sector: Healthcare
  First observed: 2025-07-20.
references:
  - http://direwolfcdkv5whaz2spehizdg22jsuf5aeje4asmetpbt6ri4jnd4qd.onion/articles/Anadolu.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
