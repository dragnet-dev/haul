title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7233 — Shadow Copy Deletion (SilentRansomGroup)'
id: 0654b8ab-d869-53c4-9c54-0b9df0642513
status: deprecated
description: |
  Detects shadow copy deletion commands associated with SilentRansomGroup ransomware.
  Incident: dragnet-ransomware-2025-7233
  Ransomware victim claim by SilentRansomGroup: USClaims; country: US; sector: Financial Services
  First observed: 2025-04-13.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
