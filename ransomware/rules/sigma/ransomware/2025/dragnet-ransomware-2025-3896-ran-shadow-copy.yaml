title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3896 — Shadow Copy Deletion (kryptos)'
id: a0937171-0ba9-5b71-add3-1385c44d042e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kryptos ransomware.
  Incident: dragnet-ransomware-2025-3896
  Ransomware victim claim by kryptos: Provincial Department of Health Services Sri Lanka; country: LK; sector: Public Sector
  First observed: 2025-11-06.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
