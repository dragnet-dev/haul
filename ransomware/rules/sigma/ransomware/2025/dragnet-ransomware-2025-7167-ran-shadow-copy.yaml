title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7167 — Shadow Copy Deletion (shinyhunters)'
id: 6973a92c-6e2f-5017-a2e3-cb944d8159c1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-7167
  Ransomware victim claim by shinyhunters: Red Hat, Inc.; country: US; sector: Technology
  First observed: 2025-09-13.
references:
  - https://breachforums.hn/rhel.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
