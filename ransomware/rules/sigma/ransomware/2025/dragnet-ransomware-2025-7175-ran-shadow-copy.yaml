title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7175 — Shadow Copy Deletion (shinyhunters)'
id: 2ddc62af-125b-5043-a26f-fe6402ab1e4a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-7175
  Ransomware victim claim by shinyhunters: TripleA (aaa.com); country: SG; sector: Financial Services
  First observed: 2025-05-02.
references:
  - https://breachforums.hn//triplea.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
