description: |
  Detects shadow copy deletion commands associated with safepay ransomware.
  Incident: dragnet-ransomware-2025-6841
  Ransomware victim claim by safepay: lifesafeservices.com; country: US; sector: Healthcare
  First observed: 2025-05-11.
references:
  - http://j3dp6okmaklajrsk6zljl5sfa2vpui7j2w6cwmhmmqhab6frdfbphhid.onion#lifesafeservices
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
