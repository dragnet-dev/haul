title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4148 — Shadow Copy Deletion (lynx)'
id: 213debe4-15eb-5945-8dc8-e19c5a2881ee
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4148
  Ransomware victim claim by lynx: Kassin & Carrow; country: US; sector: Business Services
  First observed: 2025-01-18.
references:
  - http://lynxblog.net/leaks/6786744e05a779c3d3d3db8c
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
