title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4150 — Shadow Copy Deletion (lynx)'
id: 95ee75bf-4dec-5723-bda4-8cb4f8167df8
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4150
  Ransomware victim claim by lynx: Kinseth Hospitality Companies; country: US; sector: Business Services
  First observed: 2025-01-14.
references:
  - http://lynxblog.net/leaks/67864b0605a779c3d3d2d1b8
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
