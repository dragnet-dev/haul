title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3037 — Shadow Copy Deletion (handala)'
id: fe40c5f1-2f10-5286-abf1-6cc4339b13af
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-3037
  Ransomware victim claim by handala: Caught by the Octopus: Bennett’s Darkest Hour; sector: Not Found
  First observed: 2025-12-17.
references:
  - https://handala-hack.to/caught-by-the-octopus-bennetts-darkest-hour/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
