title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4173 — Shadow Copy Deletion (lynx)'
id: 8bb8ec2f-a59e-5001-bcc6-a09b28e90b23
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4173
  Ransomware victim claim by lynx: Mintz Law Firm, LLC; country: US; sector: Business Services
  First observed: 2025-01-22.
references:
  - http://lynxblog.net/leaks/678671ee05a779c3d3d3cd39
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
