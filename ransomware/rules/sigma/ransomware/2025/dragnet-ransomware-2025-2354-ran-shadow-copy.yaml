description: |
  Detects shadow copy deletion commands associated with direwolf ransomware.
  Incident: dragnet-ransomware-2025-2354
  Ransomware victim claim by direwolf: K.M. Packaging; country: TH; sector: Manufacturing
  First observed: 2025-11-20.
references:
