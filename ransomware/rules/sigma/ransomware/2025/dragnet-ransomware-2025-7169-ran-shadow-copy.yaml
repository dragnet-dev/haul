title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7169 — Shadow Copy Deletion (shinyhunters)'
id: 196fe9f2-6e52-579a-8df1-cdc8a45b903e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-7169
  Ransomware victim claim by shinyhunters: S&P Global (spglobal.com); country: US; sector: Financial Services
  First observed: 2025-10-05.
references:
  - https://breachforums.hn//spg.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
