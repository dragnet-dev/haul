title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4162 — Shadow Copy Deletion (lynx)'
id: fa394ff8-7116-5cd5-9838-b62b320257e6
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4162
  Ransomware victim claim by lynx: Longue Vue Club; country: US; sector: Hospitality and Tourism
  First observed: 2025-01-31.
references:
  - http://lynxblog.net/leaks/67d0620c44fac8dca1d7d92f
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
