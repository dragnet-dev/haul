title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3085 — Shadow Copy Deletion (handala)'
id: 82ab166c-b12d-59f8-a4dd-26f1d771a1d2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-3085
  Ransomware victim claim by handala: We will soon be in your hollow regime; sector: Not Found
  First observed: 2025-07-21.
references:
  - https://handala-hack.to/we-will-soon-be-in-your-hollow-regime/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
