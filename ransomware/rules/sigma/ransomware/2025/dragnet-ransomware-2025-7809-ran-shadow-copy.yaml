title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7809 — Shadow Copy Deletion (weyhro)'
id: d4dc4f47-98eb-5083-94fe-9174b3f4aef6
status: deprecated
description: |
  Detects shadow copy deletion commands associated with weyhro ransomware.
  Incident: dragnet-ransomware-2025-7809
  Ransomware victim claim by weyhro: McMillan James Equipment Company (MJEC); country: US; sector: Manufacturing
  First observed: 2025-03-19.
references:
  - https://weyhro.hk//leaks/mjec
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
