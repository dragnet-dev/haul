title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2875 — Shadow Copy Deletion (frag)'
id: 53e1f278-74dd-5b55-b61b-833122b2b0f0
status: deprecated
description: |
  Detects shadow copy deletion commands associated with frag ransomware.
  Incident: dragnet-ransomware-2025-2875
  Ransomware victim claim by frag: Bunting Capital Management Inc; country: US; sector: Financial Services
  First observed: 2025-02-28.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
