description: |
  Detects shadow copy deletion commands associated with cephalus ransomware.
  Incident: dragnet-ransomware-2025-1376
  Ransomware victim claim by cephalus: K Strategies Marketing and Public Relations; country: US; sector: Business Services
  First observed: 2025-08-26.
references:
