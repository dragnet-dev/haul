description: |
  Detects shadow copy deletion commands associated with direwolf ransomware.
  Incident: dragnet-ransomware-2025-2365
  Ransomware victim claim by direwolf: Kingsford Group; country: SG; sector: Business Services
  First observed: 2025-11-20.
references:
