title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4219 — Shadow Copy Deletion (lynx)'
id: 15f5b959-6329-5b7f-b913-2e83f32fa25c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4219
  Ransomware victim claim by lynx: Shinsung Delta Tech; country: KR; sector: Manufacturing
  First observed: 2025-02-05.
references:
  - http://lynxblog.net/leaks/67a3a30f61c2d9c619a47500
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
