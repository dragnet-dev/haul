description: |
  Detects shadow copy deletion commands associated with safepay ransomware.
  Incident: dragnet-ransomware-2025-6880
  Ransomware victim claim by safepay: niemann.de; country: DE; sector: Manufacturing
  First observed: 2025-04-07.
references:
