title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4130 — Shadow Copy Deletion (lynx)'
id: 12fa8de8-177c-5df4-bfce-48df06495c3e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4130
  Ransomware victim claim by lynx: Harrells.com; country: US; sector: Agriculture and Food Production
  First observed: 2025-02-21.
references:
  - http://lynxblog.net/leaks/67d34b9af2854cb0af8fbcd3
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
