title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4180 — Shadow Copy Deletion (lynx)'
id: 64a8baa2-0f7e-536a-987e-29cb3eb7e507
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4180
  Ransomware victim claim by lynx: nevadareadymix.com; country: US; sector: Construction
  First observed: 2025-03-17.
references:
  - http://lynxblog.net/leaks/67fe92b2ce8dcc3b0d8c76e6
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
