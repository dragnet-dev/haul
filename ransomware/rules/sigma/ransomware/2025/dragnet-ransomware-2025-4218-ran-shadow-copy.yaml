title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4218 — Shadow Copy Deletion (lynx)'
id: 1fb5c87c-15ec-5049-9435-9ec545fd80bb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4218
  Ransomware victim claim by lynx: shgcpa.com; country: US; sector: Financial Services
  First observed: 2025-04-07.
references:
  - http://lynxblog.net/leaks/680baae2d5daa03fd3795653
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
