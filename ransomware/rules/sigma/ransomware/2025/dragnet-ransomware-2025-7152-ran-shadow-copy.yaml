title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7152 — Shadow Copy Deletion (shinyhunters)'
id: 95249b8f-fe2d-5d7c-a5ff-a23b751c3421
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-7152
  Ransomware victim claim by shinyhunters: FedEx; country: US; sector: Transportation/Logistics
  First observed: 2025-08-31.
references:
  - https://breachforums.hn//fedex.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
