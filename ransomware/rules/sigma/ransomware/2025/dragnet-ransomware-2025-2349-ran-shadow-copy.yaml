description: |
  Detects shadow copy deletion commands associated with direwolf ransomware.
  Incident: dragnet-ransomware-2025-2349
  Ransomware victim claim by direwolf: Hyundai Nishat Motor; country: PK; sector: Manufacturing
  First observed: 2025-11-13.
references:
