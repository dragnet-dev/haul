title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4158 — Shadow Copy Deletion (lynx)'
id: 212ee28b-593b-5147-bf0f-9f981180cc14
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4158
  Ransomware victim claim by lynx: Lexington Electric; country: US; sector: Energy
  First observed: 2025-01-29.
references:
  - http://lynxblog.net/leaks/679a244e05a779c3d33a35d2
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
