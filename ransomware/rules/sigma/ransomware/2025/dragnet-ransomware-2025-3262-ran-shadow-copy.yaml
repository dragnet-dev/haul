references:
  - http://incblog6qu4y4mm4zvw5nrmue6qbwtgjsxpw6b7ixzssu36tsajldoad.onion/blog/disclosures/687ef781c7b82dfe0ba1bfda
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
