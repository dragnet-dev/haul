description: |
  Detects shadow copy deletion commands associated with IMNCrew ransomware.
  Incident: dragnet-ransomware-2025-3160
  Ransomware victim claim by IMNCrew: Repremundo.com.co; country: CO; sector: Business Services
  First observed: 2025-06-14.
references:
  - http://imncrewwfkbjkhr2oylerfm5qtbzfphhmpcfag43xc2kfgvluqtlgoid.onion/files/data/repremundo.zip
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
