title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2928 — Shadow Copy Deletion (funksec)'
id: 225cee29-2666-5134-a5fc-75a90bf4670b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with funksec ransomware.
  Incident: dragnet-ransomware-2025-2928
  Ransomware victim claim by funksec: punjab.gov.pk; country: PK; sector: Public Sector
  First observed: 2025-01-23.
references:
  - http://funksec.top/punjab.gov.pk
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
