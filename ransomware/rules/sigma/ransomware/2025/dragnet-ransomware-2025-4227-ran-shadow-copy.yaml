title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4227 — Shadow Copy Deletion (lynx)'
id: 8870048e-6b09-596e-8e0e-79205589c903
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4227
  Ransomware victim claim by lynx: spscompanies.com; country: US; sector: Manufacturing
  First observed: 2025-03-12.
references:
  - http://lynxblog.net/leaks/67fe8b0bce8dcc3b0d8beba7
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
