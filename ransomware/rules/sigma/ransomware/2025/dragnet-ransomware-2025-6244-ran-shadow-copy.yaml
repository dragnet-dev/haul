title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6244 — Shadow Copy Deletion (radiant)'
id: 9f9cffb8-34a1-5f74-8b80-a206d325a53e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with radiant ransomware.
  Incident: dragnet-ransomware-2025-6244
  Ransomware victim claim by radiant: UK Rail Services; country: UK; sector: Transportation/Logistics
  First observed: 2025-10-12.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
