title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4086 — Shadow Copy Deletion (lynx)'
id: c1095043-6eea-5915-a5db-7fca265f144a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4086
  Ransomware victim claim by lynx: corporateflight.com; country: US; sector: Transportation/Logistics
  First observed: 2025-03-27.
references:
  - http://lynxblog.net/leaks/680ba5b5d5daa03fd378ed43
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
