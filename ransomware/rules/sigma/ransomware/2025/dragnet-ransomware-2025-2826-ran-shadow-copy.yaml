title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2826 — Shadow Copy Deletion (fog)'
id: 768022b1-8b23-5694-a021-dadbe79f5092
status: deprecated
description: |
  Detects shadow copy deletion commands associated with fog ransomware.
  Incident: dragnet-ransomware-2025-2826
  Ransomware victim claim by fog: INGV; country: IT; sector: Education
  First observed: 2025-02-12.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
