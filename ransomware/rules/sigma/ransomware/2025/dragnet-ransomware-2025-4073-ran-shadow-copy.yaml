title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4073 — Shadow Copy Deletion (lynx)'
id: 1a188808-aa4d-5e02-8824-4580bd19b311
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4073
  Ransomware victim claim by lynx: CabinC.com; country: US; sector: Transportation/Logistics
  First observed: 2025-02-28.
references:
  - http://lynxblog.net/leaks/6815c8edd5daa03fd3333ae3
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
