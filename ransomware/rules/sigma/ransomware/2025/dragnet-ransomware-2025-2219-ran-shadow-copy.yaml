title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2219 — Shadow Copy Deletion (devman)'
id: c032edab-4d7f-5599-acb9-efce5c3d2599
status: deprecated
description: |
  Detects shadow copy deletion commands associated with devman ransomware.
  Incident: dragnet-ransomware-2025-2219
  Ransomware victim claim by devman: EU victim; sector: Healthcare
  First observed: 2025-04-25.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
