references:
  - http://incblog6qu4y4mm4zvw5nrmue6qbwtgjsxpw6b7ixzssu36tsajldoad.onion/blog/disclosures/6916628ee1a4e4b3ffec445c
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
