title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1382 — Shadow Copy Deletion (cephalus)'
id: d67b7c4d-b295-5193-8650-f459e55aadc6
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cephalus ransomware.
  Incident: dragnet-ransomware-2025-1382
  Ransomware victim claim by cephalus: Sherman, Silverstein, Kohl, Rose & Podolsky, P.A.; country: US; sector: Business Services
  First observed: 2025-08-26.
references:
  - https://darkforums.st/Thread-Document-SSKRPLAW-DATA-LEAK-5GB-ZIP
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
