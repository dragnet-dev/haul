title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4089 — Shadow Copy Deletion (lynx)'
id: f49b48ad-d1c6-55ec-95b5-6dcd737885ba
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4089
  Ransomware victim claim by lynx: David Mills CPA, LLC; country: US; sector: Financial Services
  First observed: 2025-04-28.
references:
  - http://lynxblog.net/leaks/680fb93fd5daa03fd3c82485
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
