title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0916 — Shadow Copy Deletion (arkana)'
id: 071e0a9e-9945-5268-ade3-57698835a9a4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with arkana ransomware.
  Incident: dragnet-ransomware-2025-0916
  Ransomware victim claim by arkana: Wide Open West - WOW!; country: US; sector: Telecommunication
  First observed: 2025-03-24.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
