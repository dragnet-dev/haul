title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2329 — Shadow Copy Deletion (direwolf)'
id: 2d715c76-364f-56b6-ac41-61fde336a71c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with direwolf ransomware.
  Incident: dragnet-ransomware-2025-2329
  Ransomware victim claim by direwolf: Acarlar Ltd; country: TR; sector: Business Services
  First observed: 2025-07-28.
references:
  - http://direwolfcdkv5whaz2spehizdg22jsuf5aeje4asmetpbt6ri4jnd4qd.onion/articles/Acarlar.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
