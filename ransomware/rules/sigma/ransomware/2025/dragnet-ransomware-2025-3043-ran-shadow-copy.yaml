title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3043 — Shadow Copy Deletion (handala)'
id: 66fda93e-492b-5242-b234-514cca8049fb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-3043
  Ransomware victim claim by handala: From Shield to Shame; sector: Not Found
  First observed: 2025-12-06.
references:
  - https://handala-hack.to/from-shield-to-shame/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
