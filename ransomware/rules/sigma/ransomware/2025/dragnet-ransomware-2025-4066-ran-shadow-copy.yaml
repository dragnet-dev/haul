title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4066 — Shadow Copy Deletion (lynx)'
id: 78a34bb1-3819-5818-b0c2-32127db05e0f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4066
  Ransomware victim claim by lynx: bilbie.com.au; country: AU; sector: Business Services
  First observed: 2025-04-12.
references:
  - http://lynxblog.net/leaks/67f9dfdbce8dcc3b0d52bfe5
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
