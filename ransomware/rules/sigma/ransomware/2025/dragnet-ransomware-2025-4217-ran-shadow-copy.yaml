title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4217 — Shadow Copy Deletion (lynx)'
id: bda4f2e5-f6af-5054-92b2-dfd57e02d56c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4217
  Ransomware victim claim by lynx: Seabank Group; country: MT; sector: Hospitality and Tourism
  First observed: 2025-03-04.
references:
  - http://lynxblog.net/leaks/67c6d5fb44fac8dca198779d
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
