title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3039 — Shadow Copy Deletion (handala)'
id: 347b59c2-0f36-5b1e-976d-946a1659cf5a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-3039
  Ransomware victim claim by handala: Commemoration of Commander Martyr Reza Awada; sector: Not Found
  First observed: 2025-10-19.
references:
  - https://handala-hack.to/commemoration-of-commander-martyr-reza-awada/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
