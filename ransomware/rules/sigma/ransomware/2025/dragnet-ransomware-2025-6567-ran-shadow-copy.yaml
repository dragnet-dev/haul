description: |
  Detects shadow copy deletion commands associated with rhysida ransomware.
  Incident: dragnet-ransomware-2025-6567
  Ransomware victim claim by rhysida: Cardinal Services; country: US; sector: Business Services
  First observed: 2025-07-15.
references:
  - http://rhysidafohrhyy2aszi7bm32tnjat5xri65fopcxkdfxhi4tidsg7cad.onion/archive.php/archive.php?company=199
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
