title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1306 — Shadow Copy Deletion (brotherhood)'
id: a46b5c7e-8603-5230-ab00-1de141acb7ef
status: deprecated
description: |
  Detects shadow copy deletion commands associated with brotherhood ransomware.
  Incident: dragnet-ransomware-2025-1306
  Ransomware victim claim by brotherhood: Citizens' Committee for Children of New York; country: US; sector: Public Sector
  First observed: 2025-10-11.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
