description: |
  Detects shadow copy deletion commands associated with direwolf ransomware.
  Incident: dragnet-ransomware-2025-2353
  Ransomware victim claim by direwolf: IoTechWorld; country: IN; sector: Technology
  First observed: 2025-05-14.
references:
