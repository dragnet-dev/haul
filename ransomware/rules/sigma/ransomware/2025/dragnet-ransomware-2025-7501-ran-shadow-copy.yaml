description: |
  Detects shadow copy deletion commands associated with stormous ransomware.
  Incident: dragnet-ransomware-2025-7501
  Ransomware victim claim by stormous: French Gov "PYV S"; country: FR; sector: Public Sector
  First observed: 2025-06-12.
references:
