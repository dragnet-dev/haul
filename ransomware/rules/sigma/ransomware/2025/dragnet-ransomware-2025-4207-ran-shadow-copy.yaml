title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4207 — Shadow Copy Deletion (lynx)'
id: 8f7c1d8a-8b0c-55fd-a765-fff638af6d39
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4207
  Ransomware victim claim by lynx: Royal Chemical; country: US; sector: Manufacturing
  First observed: 2025-04-11.
references:
  - http://lynxblog.net/leaks/6820b990e2d7f43c8fd7a75c
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
