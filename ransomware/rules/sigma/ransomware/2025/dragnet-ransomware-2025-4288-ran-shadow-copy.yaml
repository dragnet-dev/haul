description: |
  Detects shadow copy deletion commands associated with medusa ransomware.
  Incident: dragnet-ransomware-2025-4288
  Ransomware victim claim by medusa: ARDEX Australia; country: AU; sector: Manufacturing
  First observed: 2025-01-29.
references:
