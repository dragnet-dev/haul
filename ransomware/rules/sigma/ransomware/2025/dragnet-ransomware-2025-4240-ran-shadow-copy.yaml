description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4240
  Ransomware victim claim by lynx: Tri-Sen Systems; country: US; sector: Technology
  First observed: 2025-01-30.
references:
