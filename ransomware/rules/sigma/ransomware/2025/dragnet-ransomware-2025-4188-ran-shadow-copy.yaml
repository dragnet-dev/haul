title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4188 — Shadow Copy Deletion (lynx)'
id: 63f4c3e3-435d-58d0-96bb-eb8bd1c9642c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4188
  Ransomware victim claim by lynx: Palomino Petroleum; country: GB; sector: Energy
  First observed: 2025-03-19.
references:
  - http://lynxblog.net/leaks/67da9cb451e131d63486afc8
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
