title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6648 — Shadow Copy Deletion (rhysida)'
id: 3a789211-585a-58a4-bd98-9b84e3d94a86
status: deprecated
description: |
  Detects shadow copy deletion commands associated with rhysida ransomware.
  Incident: dragnet-ransomware-2025-6648
  Ransomware victim claim by rhysida: ZCORP; country: US; sector: Technology
  First observed: 2025-08-27.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
