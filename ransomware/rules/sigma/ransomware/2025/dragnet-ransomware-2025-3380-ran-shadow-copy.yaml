title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3380 — Shadow Copy Deletion (incransom)'
id: 860af037-efbb-5184-8296-6b5ad55febab
status: deprecated
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2025-3380
  Ransomware victim claim by incransom: New Jersey Association on Correction; country: US; sector: Public Sector
