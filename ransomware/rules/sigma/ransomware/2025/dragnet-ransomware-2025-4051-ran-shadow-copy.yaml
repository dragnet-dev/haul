title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4051 — Shadow Copy Deletion (lynx)'
id: 9367923c-e872-5947-8298-73489346c7df
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4051
  Ransomware victim claim by lynx: Alo Center (hq.aloteknik.se); country: SE; sector: Technology
  First observed: 2025-01-18.
references:
  - http://lynxblog.net/leaks/67978a0305a779c3d32e2bfa
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
