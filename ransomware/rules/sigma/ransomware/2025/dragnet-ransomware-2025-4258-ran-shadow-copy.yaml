description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4258
  Ransomware victim claim by lynx: www.advancedentdenver.com; country: US; sector: Healthcare
  First observed: 2025-12-16.
references:
