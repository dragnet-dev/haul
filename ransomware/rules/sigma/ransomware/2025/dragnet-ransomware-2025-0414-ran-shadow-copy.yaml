title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0414 — Shadow Copy Deletion (akira)'
id: 4ad6fbcf-e61c-593f-ba4c-ca35f8ffd020
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2025-0414
  Ransomware victim claim by akira: LandWorks; country: US; sector: Consumer Services
  First observed: 2025-08-20.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
