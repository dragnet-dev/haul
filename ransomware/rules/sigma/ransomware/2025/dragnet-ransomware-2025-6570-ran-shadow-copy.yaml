description: |
  Detects shadow copy deletion commands associated with rhysida ransomware.
  Incident: dragnet-ransomware-2025-6570
  Ransomware victim claim by rhysida: Cator Ruma & Associates; country: US; sector: Construction
  First observed: 2025-05-28.
references:
  - http://rhysidafohrhyy2aszi7bm32tnjat5xri65fopcxkdfxhi4tidsg7cad.onion/archive.php?company=193
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
