title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7773 — Shadow Copy Deletion (warlock)'
id: d4a171be-4b3d-5a1a-86af-3d4f12ca3b97
status: deprecated
description: |
  Detects shadow copy deletion commands associated with warlock ransomware.
  Incident: dragnet-ransomware-2025-7773
  Ransomware victim claim by warlock: mytune.me; country: MY; sector: Not Found
  First observed: 2025-11-01.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
