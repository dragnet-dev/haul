title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1536 — Shadow Copy Deletion (clop)'
id: e947d61f-4c8f-5f26-a5f3-e8fd577c5cff
status: deprecated
description: |
  Detects shadow copy deletion commands associated with clop ransomware.
  Incident: dragnet-ransomware-2025-1536
  Ransomware victim claim by clop: AMPOL.COM.AU; country: AU; sector: Energy
  First observed: 2025-01-24.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
