title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3892 — Shadow Copy Deletion (kryptos)'
id: eb66f7a0-bad4-58aa-80a0-1b6908a6dfda
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kryptos ransomware.
  Incident: dragnet-ransomware-2025-3892
  Ransomware victim claim by kryptos: Adichunchanagiri Institute Of Technology; country: IN; sector: Education
  First observed: 2025-10-24.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
