title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4168 — Shadow Copy Deletion (lynx)'
id: 064fe8d8-68e0-54ba-aa09-6dcde215d7de
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4168
  Ransomware victim claim by lynx: Marshall Motor Holdings; country: GB; sector: Consumer Services
  First observed: 2025-02-09.
references:
  - http://lynxblog.net/leaks/67a8d09b61c2d9c619c19982
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
