title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2133 — Shadow Copy Deletion (crypto24)'
id: fb0d54f1-0564-5671-85f6-961fad34e60e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with crypto24 ransomware.
  Incident: dragnet-ransomware-2025-2133
  Ransomware victim claim by crypto24: U.S. Vanadium Holding Company LLC; country: US; sector: Manufacturing
  First observed: 2025-10-20.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
