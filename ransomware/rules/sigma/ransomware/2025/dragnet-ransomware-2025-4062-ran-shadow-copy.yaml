description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4062
  Ransomware victim claim by lynx: Banfi Vintners; country: US; sector: Agriculture and Food Production
  First observed: 2025-02-05.
references:
