title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4117 — Shadow Copy Deletion (lynx)'
id: 74363bb8-1b51-5d39-ad91-f24b8b725b1e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4117
  Ransomware victim claim by lynx: fstlogistics.com; country: US; sector: Transportation/Logistics
  First observed: 2025-03-03.
references:
  - http://lynxblog.net/leaks/67d347e6f2854cb0af8f7aa1
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
