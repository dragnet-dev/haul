title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3100 — Shadow Copy Deletion (hellcat)'
id: e5a05aeb-3000-578b-a2e1-45ec2d459b66
status: deprecated
description: |
  Detects shadow copy deletion commands associated with hellcat ransomware.
  Incident: dragnet-ransomware-2025-3100
  Ransomware victim claim by hellcat: Omnitracs; country: US; sector: Technology
  First observed: 2025-03-24.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
