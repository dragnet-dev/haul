title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4171 — Shadow Copy Deletion (lynx)'
id: 32cf828a-d0fb-5163-8e32-c21095eea7b1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4171
  Ransomware victim claim by lynx: Marukai; country: JP; sector: Consumer Services
  First observed: 2025-01-21.
references:
  - http://lynxblog.net/leaks/678e72c605a779c3d3fff758
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
