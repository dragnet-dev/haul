title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2224 — Shadow Copy Deletion (devman)'
id: e1d40106-d31e-5eae-a6b0-db252c8a401b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with devman ransomware.
  Incident: dragnet-ransomware-2025-2224
  Ransomware victim claim by devman: FEELFOUR; country: SG; sector: Not Found
  First observed: 2025-04-13.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
