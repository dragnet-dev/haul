description: |
  Detects shadow copy deletion commands associated with radiant ransomware.
  Incident: dragnet-ransomware-2025-6243
  Ransomware victim claim by radiant: Spijkermat; country: NL; sector: Consumer Services
  First observed: 2025-10-29.
references:
  - http://trfqksm6peaeyz4q6egxbij5n2ih6zrg65of4kwasrejc7hnw2jtxryd.onion/spijkermat
