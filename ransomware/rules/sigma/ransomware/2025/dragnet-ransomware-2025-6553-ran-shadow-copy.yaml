title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6553 — Shadow Copy Deletion (rebornvc)'
id: 13b8ddac-d282-56bc-a1f0-50730d14beb4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with rebornvc ransomware.
  Incident: dragnet-ransomware-2025-6553
  Ransomware victim claim by rebornvc: unyleya.edu.br; country: BR; sector: Education
  First observed: 2025-07-08.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
