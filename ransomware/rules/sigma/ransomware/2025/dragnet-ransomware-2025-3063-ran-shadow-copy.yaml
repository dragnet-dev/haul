title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3063 — Shadow Copy Deletion (handala)'
id: e9bd66d3-5e67-5280-8ae6-e7dcda111abf
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-3063
  Ransomware victim claim by handala: Netanyahu’s Cabinet Awaits Handala’s Next Move; sector: Public Sector
  First observed: 2025-12-27.
references:
  - https://handala-hack.to/netanyahus-cabinet-awaits-handalas-next-move/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
