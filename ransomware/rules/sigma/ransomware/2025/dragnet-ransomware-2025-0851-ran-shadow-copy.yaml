title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0851 — Shadow Copy Deletion (apos)'
id: e7ffe736-f6e6-5331-8a9a-1c8f2cd5e118
status: deprecated
description: |
  Detects shadow copy deletion commands associated with apos ransomware.
  Incident: dragnet-ransomware-2025-0851
  Ransomware victim claim by apos: Ha******.us; sector: Healthcare
  First observed: 2025-06-12.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
