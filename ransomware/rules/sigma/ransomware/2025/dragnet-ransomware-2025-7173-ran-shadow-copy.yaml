title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7173 — Shadow Copy Deletion (shinyhunters)'
id: ec7d931e-a7b7-5dbb-bcaa-9b54f307db32
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-7173
  Ransomware victim claim by shinyhunters: Toyota Motor Corporations; country: JP; sector: Manufacturing
  First observed: 2025-05-01.
references:
  - https://breachforums.hn/toyota.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
