title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4104 — Shadow Copy Deletion (lynx)'
id: 3f0365a2-05d6-5f72-a1e1-607250bd0cfb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4104
  Ransomware victim claim by lynx: Empire Home Center; country: US; sector: Consumer Services
  First observed: 2025-01-23.
references:
  - http://lynxblog.net/leaks/679c9d8a861630bc778ce6f7
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
