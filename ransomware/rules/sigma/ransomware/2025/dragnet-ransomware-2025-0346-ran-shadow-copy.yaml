title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0346 — Shadow Copy Deletion (akira)'
id: 6f8de975-aaac-5ce4-a18e-f1e57bf825a2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2025-0346
  Ransomware victim claim by akira: Heinz Hammer Vertragswerkstatt (Mercedes-Benz car dealer); country: DE; sector: Consumer Services
  First observed: 2025-04-18.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
