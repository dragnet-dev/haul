title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4215 — Shadow Copy Deletion (lynx)'
id: 9bac35b8-c8e0-5b4e-8508-739fdceb3fde
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4215
  Ransomware victim claim by lynx: Schmiedetechnik Plettenberg GmbH & Co KG; country: DE; sector: Manufacturing
  First observed: 2025-03-05.
references:
  - http://lynxblog.net/leaks/67c80eea44fac8dca1a00944
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
