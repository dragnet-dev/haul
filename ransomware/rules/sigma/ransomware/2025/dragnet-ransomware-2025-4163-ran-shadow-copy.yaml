title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4163 — Shadow Copy Deletion (lynx)'
id: 7fb6b721-7612-5f63-84c7-632e9a1f5160
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4163
  Ransomware victim claim by lynx: Lowe Engineers; country: US; sector: Business Services
  First observed: 2025-01-15.
references:
  - http://lynxblog.net/leaks/6788057d05a779c3d3dce642
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
