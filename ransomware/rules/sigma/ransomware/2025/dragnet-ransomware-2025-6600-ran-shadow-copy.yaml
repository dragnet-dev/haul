  Ransomware victim claim by rhysida: Kalin Hobeltechnik; country: CH; sector: Manufacturing
  First observed: 2025-05-03.
references:
  - http://rhysidafohrhyy2aszi7bm32tnjat5xri65fopcxkdfxhi4tidsg7cad.onion/archive.php?company=186
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
