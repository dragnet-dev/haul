title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2126 — Shadow Copy Deletion (crypto24)'
id: a7d01fae-1cde-5870-a306-cbaef1d93c8c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with crypto24 ransomware.
  Incident: dragnet-ransomware-2025-2126
  Ransomware victim claim by crypto24: SOUBEIRAN CHOBET S.R.L.; country: AR; sector: Business Services
  First observed: 2025-07-14.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
