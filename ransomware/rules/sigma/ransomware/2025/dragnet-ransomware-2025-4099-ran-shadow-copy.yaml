title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4099 — Shadow Copy Deletion (lynx)'
id: 9c24cde2-83e1-5140-9f49-2b73bf5b91de
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4099
  Ransomware victim claim by lynx: Douglas County, GA (DDCWSA.COM); country: US; sector: Public Sector
  First observed: 2025-01-14.
references:
  - http://lynxblog.net/leaks/67864ed905a779c3d3d2dfd1
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
