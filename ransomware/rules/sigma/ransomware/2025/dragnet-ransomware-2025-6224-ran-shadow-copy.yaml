title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6224 — Shadow Copy Deletion (radar)'
id: 08aeb514-dee1-5b61-b9b1-574f1fd6ad23
status: deprecated
description: |
  Detects shadow copy deletion commands associated with radar ransomware.
  Incident: dragnet-ransomware-2025-6224
  Ransomware victim claim by radar: My Florida Case Management Services, LLC; country: US; sector: Healthcare
  First observed: 2025-10-19.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
