title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3166 — Shadow Copy Deletion (incransom)'
id: e70dc009-c6fd-5503-9929-eb49c71e11f8
status: deprecated
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2025-3166
  Ransomware victim claim by incransom: Academic Urology & Urogynecology of Arizona; country: US; sector: Healthcare
