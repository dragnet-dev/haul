description: |
  Detects shadow copy deletion commands associated with cactus ransomware.
  Incident: dragnet-ransomware-2025-1328
  Ransomware victim claim by cactus: associatedasset.com; country: US; sector: Financial Services
  First observed: 2025-02-06.
references:
  - https://cactusbloguuodvqjmnzlwetjlpj6aggc6iocwhuupb47laukux7ckid.onion/posts/ASSOCIATEDASSET
