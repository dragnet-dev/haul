title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4732 — Shadow Copy Deletion (payoutsking)'
id: 42f12f99-fb8b-5480-b3b0-d8c660989dce
status: deprecated
description: |
  Detects shadow copy deletion commands associated with payoutsking ransomware.
  Incident: dragnet-ransomware-2025-4732
  Ransomware victim claim by payoutsking: G*****; country: US; sector: Not Found
  First observed: 2025-07-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
