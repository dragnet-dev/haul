description: |
  Detects shadow copy deletion commands associated with cephalus ransomware.
  Incident: dragnet-ransomware-2025-1377
  Ransomware victim claim by cephalus: Lee & Associates; country: US; sector: Business Services
  First observed: 2025-08-20.
references:
