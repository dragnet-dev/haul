description: |
  Detects shadow copy deletion commands associated with obscura ransomware.
  Incident: dragnet-ransomware-2025-4697
  Ransomware victim claim by obscura: HeavenlyDental; country: US; sector: Healthcare
  First observed: 2025-08-29.
references:
  - http://obscurad3aphckihv7wptdxvdnl5emma6t3vikcf3c5oiiqndq6y6xad.onion/company.html?company=heavenlydental
