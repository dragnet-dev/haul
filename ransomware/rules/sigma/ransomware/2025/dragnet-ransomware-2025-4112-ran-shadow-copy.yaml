title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4112 — Shadow Copy Deletion (lynx)'
id: fc941f33-889b-565a-964c-b7b62efe34e3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4112
  Ransomware victim claim by lynx: Fortune Electric Co Ltd; country: TW; sector: Manufacturing
  First observed: 2025-02-10.
references:
  - http://lynxblog.net/leaks/67aa151661c2d9c619ca4119
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
