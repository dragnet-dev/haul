title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4172 — Shadow Copy Deletion (lynx)'
id: 555d06b6-320c-5edb-94e1-d150e8b56028
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4172
  Ransomware victim claim by lynx: McElwee Firm; country: US; sector: Business Services
  First observed: 2025-04-15.
references:
  - http://lynxblog.net/leaks/67fed90ece8dcc3b0d917e53
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
