description: |
  Detects shadow copy deletion commands associated with direwolf ransomware.
  Incident: dragnet-ransomware-2025-2345
  Ransomware victim claim by direwolf: GB Group; country: GB; sector: Technology
  First observed: 2025-06-18.
references:
  - http://direwolfcdkv5whaz2spehizdg22jsuf5aeje4asmetpbt6ri4jnd4qd.onion/articles/GB_Group.html
