title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4445 — Shadow Copy Deletion (minteye)'
id: 068ebb1f-b460-5666-9887-f130c4802fbc
status: deprecated
description: |
  Detects shadow copy deletion commands associated with minteye ransomware.
  Incident: dragnet-ransomware-2025-4445
  Ransomware victim claim by minteye: David M. Schwarz Architects; country: US; sector: Construction
  First observed: 2025-12-07.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
