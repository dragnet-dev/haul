title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3263 — Shadow Copy Deletion (incransom)'
id: 07104003-015d-5a99-b078-d3c052994932
status: deprecated
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2025-3263
  Ransomware victim claim by incransom: Durant City; country: US; sector: Public Sector
