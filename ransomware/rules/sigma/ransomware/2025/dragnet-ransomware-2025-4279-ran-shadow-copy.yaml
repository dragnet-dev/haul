title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4279 — Shadow Copy Deletion (lynx)'
id: 43c18132-8e1a-536b-a1f4-22d95bd2b3c1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4279
  Ransomware victim claim by lynx: Zamzow's; country: US; sector: Consumer Services
  First observed: 2025-01-30.
references:
  - http://lynxblog.net/leaks/679e80e1861630bc7797904e
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
