title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4045 — Shadow Copy Deletion (lynx)'
id: 552a53d3-e4df-5b3f-944a-c7b38e3d76dd
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4045
  Ransomware victim claim by lynx: ACTi Corporation; country: TW; sector: Technology
  First observed: 2025-02-25.
references:
  - http://lynxblog.net/leaks/67cd5c2c44fac8dca1c3d876
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
