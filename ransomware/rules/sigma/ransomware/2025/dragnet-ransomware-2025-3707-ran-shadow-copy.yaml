title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3707 — Shadow Copy Deletion (kairos)'
id: 64b9e0ef-8835-59e7-a080-db765a43e62f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kairos ransomware.
  Incident: dragnet-ransomware-2025-3707
  Ransomware victim claim by kairos: The Property Business; country: AU; sector: Financial Services
  First observed: 2025-09-16.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
