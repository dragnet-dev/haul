title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7806 — Shadow Copy Deletion (weyhro)'
id: 1819a272-f335-51a2-8460-536489b5ada8
status: deprecated
description: |
  Detects shadow copy deletion commands associated with weyhro ransomware.
  Incident: dragnet-ransomware-2025-7806
  Ransomware victim claim by weyhro: Community Services of Missouri; country: US; sector: Public Sector
  First observed: 2025-08-10.
references:
  - https://weyhro.hk//leaks/dwiprograms
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
