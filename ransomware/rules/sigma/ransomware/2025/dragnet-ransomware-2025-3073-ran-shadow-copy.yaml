title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3073 — Shadow Copy Deletion (handala)'
id: 294dbb47-06f8-5605-b5ba-452532f9e818
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-3073
  Ransomware victim claim by handala: Saturday Unveilings – Shadows Have Names; sector: Not Found
  First observed: 2025-10-25.
references:
  - https://handala-hack.to/saturday-unveilings-shadows-have-names/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
