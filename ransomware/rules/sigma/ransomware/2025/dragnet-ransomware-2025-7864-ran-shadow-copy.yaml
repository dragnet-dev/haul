description: |
  Detects shadow copy deletion commands associated with worldleaks ransomware.
  Incident: dragnet-ransomware-2025-7864
  Ransomware victim claim by worldleaks: Kentfield Hospital; country: US; sector: Healthcare
  First observed: 2025-06-13.
references:
