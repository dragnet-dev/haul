title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4083 — Shadow Copy Deletion (lynx)'
id: 01d8f8ef-a1cc-5f87-a1b4-236b62579e32
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4083
  Ransomware victim claim by lynx: Commercial Concrete Systems; country: US; sector: Construction
  First observed: 2025-02-28.
references:
  - http://lynxblog.net/leaks/67c83b1f44fac8dca1a16dc0
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
