description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4050
  Ransomware victim claim by lynx: Allied Tenesis; country: US; sector: Telecommunication
  First observed: 2025-02-17.
references:
  - http://lynxblog.net/leaks/67b3283644fac8dca108d39c
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
