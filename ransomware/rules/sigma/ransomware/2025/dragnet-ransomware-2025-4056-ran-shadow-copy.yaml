title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4056 — Shadow Copy Deletion (lynx)'
id: 12332fa0-e81c-5e62-8348-807c0bf66ec7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4056
  Ransomware victim claim by lynx: amethystgroup.co.uk; country: GB; sector: Transportation/Logistics
  First observed: 2025-04-10.
references:
  - http://lynxblog.net/leaks/6807a26cd5daa03fd3350199
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
