title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7810 — Shadow Copy Deletion (weyhro)'
id: 7816adb6-9c0f-5ead-8fcf-b390492162b3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with weyhro ransomware.
  Incident: dragnet-ransomware-2025-7810
  Ransomware victim claim by weyhro: Montgomery Little & Soran, PC; country: US; sector: Business Services
  First observed: 2025-03-21.
references:
  - https://weyhro.hk//leaks/montgomerylittle
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
