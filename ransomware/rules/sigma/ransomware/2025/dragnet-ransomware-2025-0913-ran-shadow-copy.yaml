title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0913 — Shadow Copy Deletion (arkana)'
id: aba41a11-dcb4-587f-bfc2-0c381934b8c2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with arkana ransomware.
  Incident: dragnet-ransomware-2025-0913
  Ransomware victim claim by arkana: Oregon Surveillance Network - OSN!; country: US; sector: Not Found
  First observed: 2025-03-26.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
