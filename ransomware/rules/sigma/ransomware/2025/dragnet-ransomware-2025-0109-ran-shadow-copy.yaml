title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0109 — Shadow Copy Deletion (akira)'
id: 4e675184-9fe3-5dd1-ad3f-8f86c0510b9e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2025-0109
  Ransomware victim claim by akira: Asl Consulting, DTG Consulting Solutions, Snyder Cohn, SBLM Architects, Dealer Information...; country: US; sector: Business Services
  First observed: 2025-11-27.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
