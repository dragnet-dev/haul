title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7160 — Shadow Copy Deletion (shinyhunters)'
id: 552ea669-6299-5aa0-8d4c-764e72a5fe2f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-7160
  Ransomware victim claim by shinyhunters: Instructure.com - Canvas; country: US; sector: Education
  First observed: 2025-07-07.
references:
  - https://breachforums.hn//instructure.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
