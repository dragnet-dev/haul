title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4041 — Shadow Copy Deletion (lynx)'
id: a2bb3287-48c9-55d8-b9d9-ce994ba2a503
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4041
  Ransomware victim claim by lynx: Access Capital Partners SA; country: FR; sector: Financial Services
  First observed: 2025-01-16.
references:
  - http://lynxblog.net/leaks/6787acfb05a779c3d3dac945
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
