title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6237 — Shadow Copy Deletion (radiant)'
id: 496e8e14-54e3-54e8-ac2e-285d0b5aa4ca
status: deprecated
description: |
  Detects shadow copy deletion commands associated with radiant ransomware.
  Incident: dragnet-ransomware-2025-6237
  Ransomware victim claim by radiant: Docurail; country: FI; sector: Transportation/Logistics
  First observed: 2025-10-16.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
