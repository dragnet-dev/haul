description: |
  Detects shadow copy deletion commands associated with warlock ransomware.
  Incident: dragnet-ransomware-2025-7730
  Ransomware victim claim by warlock: astronika; country: PL; sector: Technology
  First observed: 2025-06-11.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
