description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4277
  Ransomware victim claim by lynx: Xepa Soul; country: SG; sector: Healthcare
  First observed: 2025-02-11.
references:
