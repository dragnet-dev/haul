title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3066 — Shadow Copy Deletion (handala)'
id: be1b853b-a3ee-5005-b406-9f9581ce972b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-3066
  Ransomware victim claim by handala: Operation Octopus: Naftali Bennett; country: IL; sector: Not Found
  First observed: 2025-12-17.
references:
  - https://handala-hack.to/operation-octopus-naftali-bennett-hacked/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
