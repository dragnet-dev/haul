title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4143 — Shadow Copy Deletion (lynx)'
id: 03d00cb5-b3e3-547d-bf48-e47cdb3dfbbc
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4143
  Ransomware victim claim by lynx: impactcanada.com; country: CA; sector: Public Sector
  First observed: 2025-04-25.
references:
  - http://lynxblog.net/leaks/680ad489d5daa03fd36c1bcf
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
