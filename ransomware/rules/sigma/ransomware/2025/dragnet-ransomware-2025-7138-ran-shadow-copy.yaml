title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7138 — Shadow Copy Deletion (shinyhunters)'
id: 84ea40f0-870a-588c-a3e6-2f7a2ea68640
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-7138
  Ransomware victim claim by shinyhunters: Albertsons (Jewel Osco, etc); country: US; sector: Consumer Services
  First observed: 2025-07-14.
references:
  - https://breachforums.hn//albertsons.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
