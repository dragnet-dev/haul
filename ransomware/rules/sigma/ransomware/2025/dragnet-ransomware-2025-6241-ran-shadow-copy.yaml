title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6241 — Shadow Copy Deletion (radiant)'
id: aa2a670e-4c18-5f4b-8899-be59a6ea0af0
status: deprecated
description: |
  Detects shadow copy deletion commands associated with radiant ransomware.
  Incident: dragnet-ransomware-2025-6241
  Ransomware victim claim by radiant: Minnesota Hospital; country: US; sector: Healthcare
  First observed: 2025-10-12.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
