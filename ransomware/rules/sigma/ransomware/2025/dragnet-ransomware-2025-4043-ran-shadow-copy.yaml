title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4043 — Shadow Copy Deletion (lynx)'
id: 6bcea40e-48d0-51bb-a8be-cdbf8bb6be0e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4043
  Ransomware victim claim by lynx: ACDC Express; country: ZA; sector: Manufacturing
  First observed: 2025-02-14.
references:
  - http://lynxblog.net/leaks/67cad56f44fac8dca1b4bc93
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
