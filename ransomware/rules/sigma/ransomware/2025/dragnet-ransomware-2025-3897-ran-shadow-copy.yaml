status: deprecated
description: |
  Detects shadow copy deletion commands associated with linkc ransomware.
  Incident: dragnet-ransomware-2025-3897
  Ransomware victim claim by linkc: h2o.ai; country: US; sector: Technology
  First observed: 2025-01-29.
references:
  - http://iywqjjaf2zioehzzauys3sktbcdmuzm2fsjkqsblnm7dt6axjfpoxwid.onion/article/9698d0a2-56b8-40a9-8c6e-fa4697133c96
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
