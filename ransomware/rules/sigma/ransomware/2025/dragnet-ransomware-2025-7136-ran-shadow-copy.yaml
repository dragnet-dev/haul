title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7136 — Shadow Copy Deletion (shinyhunters)'
id: cf4e1de8-dcc0-570b-a2e4-95a3e9422c25
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-7136
  Ransomware victim claim by shinyhunters: Air France & KLM; country: FR; sector: Transportation/Logistics
  First observed: 2025-07-29.
references:
  - https://breachforums.hn//afkl.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
