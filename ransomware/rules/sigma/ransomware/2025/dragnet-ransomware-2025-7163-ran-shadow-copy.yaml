title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7163 — Shadow Copy Deletion (shinyhunters)'
id: e8891d5c-f1e7-584d-9b40-aa93a4f47fc2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-7163
  Ransomware victim claim by shinyhunters: McDonalds; country: US; sector: Hospitality and Tourism
  First observed: 2025-06-27.
references:
  - https://breachforums.hn//mcdonalds.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
