description: |
  Detects shadow copy deletion commands associated with everest ransomware.
  Incident: dragnet-ransomware-2025-2738
  Ransomware victim claim by everest: Woodlake; sector: Healthcare
  First observed: 2025-01-16.
references:
  - http://ransomocmou6mnbquqz44ewosbkjk3o5qjsl3orawojexfook2j7esad.onion/woodlake/
