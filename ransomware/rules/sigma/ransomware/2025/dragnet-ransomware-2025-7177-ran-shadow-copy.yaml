title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7177 — Shadow Copy Deletion (shinyhunters)'
id: 286362ed-59a7-5c62-bb20-6d387946a0dc
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-7177
  Ransomware victim claim by shinyhunters: Vietnam Airlines; country: VN; sector: Transportation/Logistics
  First observed: 2025-06-20.
references:
  - https://breachforums.hn//vietnamairlines.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
