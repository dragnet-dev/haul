status: deprecated
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2025-3343
  Ransomware victim claim by incransom: Lamina Dielectrics, United Kingdom; country: GB; sector: Manufacturing
  First observed: 2025-06-17.
references:
