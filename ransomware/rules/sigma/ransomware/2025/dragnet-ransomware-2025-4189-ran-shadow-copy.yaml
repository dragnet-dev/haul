title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4189 — Shadow Copy Deletion (lynx)'
id: 00a71755-afc9-57ff-9d4f-b1c0ba0d228f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4189
  Ransomware victim claim by lynx: pay4freight.com; country: US; sector: Transportation/Logistics
  First observed: 2025-03-26.
references:
  - http://lynxblog.net/leaks/680ac683d5daa03fd36b19e1
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
