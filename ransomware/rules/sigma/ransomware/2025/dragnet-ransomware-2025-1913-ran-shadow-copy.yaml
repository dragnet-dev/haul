title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1913 — Shadow Copy Deletion (clop)'
id: 67d38a5e-53ff-5bcf-be7a-723234f48605
status: deprecated
description: |
  Detects shadow copy deletion commands associated with clop ransomware.
  Incident: dragnet-ransomware-2025-1913
  Ransomware victim claim by clop: REESEPHARMACEUTICAL.COM; country: JP; sector: Healthcare
  First observed: 2025-02-27.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
