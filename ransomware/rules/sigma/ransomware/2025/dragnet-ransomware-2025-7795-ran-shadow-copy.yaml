title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7795 — Shadow Copy Deletion (warlock)'
id: 83bd7b7b-2294-5831-a279-bac9c30ec4fd
status: deprecated
description: |
  Detects shadow copy deletion commands associated with warlock ransomware.
  Incident: dragnet-ransomware-2025-7795
  Ransomware victim claim by warlock: via-optronics; country: DE; sector: Technology
  First observed: 2025-05-02.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
