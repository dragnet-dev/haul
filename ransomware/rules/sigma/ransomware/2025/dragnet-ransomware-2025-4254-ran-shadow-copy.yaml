title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4254 — Shadow Copy Deletion (lynx)'
id: deedfb7b-6201-5c88-acca-37c1ca42a72b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4254
  Ransomware victim claim by lynx: WDEF-TV; country: US; sector: Telecommunication
  First observed: 2025-05-01.
references:
  - http://lynxblog.net/leaks/6812dcf8d5daa03fd3f65f42
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
