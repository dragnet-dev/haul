title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3844 — Shadow Copy Deletion (killsec)'
id: 372fa030-0ffa-58eb-9168-5bb2bf0bed79
status: deprecated
description: |
  Detects shadow copy deletion commands associated with killsec ransomware.
  Incident: dragnet-ransomware-2025-3844
  Ransomware victim claim by killsec: republica federative do brasil; country: BR; sector: Public Sector
  First observed: 2025-12-15.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
