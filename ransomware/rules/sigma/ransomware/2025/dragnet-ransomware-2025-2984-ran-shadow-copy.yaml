title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2984 — Shadow Copy Deletion (global)'
id: dce1a4e8-3bd3-5f53-bfda-8c2e0aa34c5a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with global ransomware.
  Incident: dragnet-ransomware-2025-2984
  Ransomware victim claim by global: Dithelm Travel Group; country: TH; sector: Hospitality and Tourism
  First observed: 2025-07-26.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
