title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2987 — Shadow Copy Deletion (global)'
id: 94b38e93-ef67-5d1a-b440-c27a44c5cd7e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with global ransomware.
  Incident: dragnet-ransomware-2025-2987
  Ransomware victim claim by global: Epworth-Hospital; country: AU; sector: Healthcare
  First observed: 2025-05-28.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
