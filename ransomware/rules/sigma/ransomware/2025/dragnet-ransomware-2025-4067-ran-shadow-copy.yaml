title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4067 — Shadow Copy Deletion (lynx)'
id: 692ecb30-5e23-51cc-bdef-8d09de393626
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4067
  Ransomware victim claim by lynx: Biogena GmbH & Co KG; country: AT; sector: Healthcare
  First observed: 2025-01-29.
references:
  - http://lynxblog.net/leaks/67c01a4b44fac8dca169e79e
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
