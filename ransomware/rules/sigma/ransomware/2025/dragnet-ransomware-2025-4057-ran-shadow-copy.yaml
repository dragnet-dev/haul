title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4057 — Shadow Copy Deletion (lynx)'
id: 69afe5be-5fac-5610-af31-c1577e8c7092
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4057
  Ransomware victim claim by lynx: AMICIO; country: FR; sector: Business Services
  First observed: 2025-03-07.
references:
  - http://lynxblog.net/leaks/67d9c5a051e131d63479e0b1
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
