title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3042 — Shadow Copy Deletion (handala)'
id: 5cc51390-48c7-544c-82de-9716a92e6679
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-3042
  Ransomware victim claim by handala: Freedom Wood Doors Ltd; sector: Manufacturing
  First observed: 2025-07-06.
references:
  - https://handala-hack.to/freedom-wood-doors-ltd-hacked/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
