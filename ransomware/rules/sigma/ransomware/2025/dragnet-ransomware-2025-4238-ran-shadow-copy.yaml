title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4238 — Shadow Copy Deletion (lynx)'
id: ca9dc148-0c5b-5b4f-ac28-5f5bd504f5dc
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4238
  Ransomware victim claim by lynx: toolsign.com; country: DE; sector: Consumer Services
  First observed: 2025-03-15.
references:
  - http://lynxblog.net/leaks/67fe87bdce8dcc3b0d8ba911
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
