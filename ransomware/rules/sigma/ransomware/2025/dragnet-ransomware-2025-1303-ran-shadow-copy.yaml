description: |
  Detects shadow copy deletion commands associated with bravox ransomware.
  Incident: dragnet-ransomware-2025-1303
  Ransomware victim claim by bravox: Hood River Dental; country: US; sector: Healthcare
  First observed: 2025-12-16.
references:
