description: |
  Detects shadow copy deletion commands associated with pear ransomware.
  Incident: dragnet-ransomware-2025-4784
  Ransomware victim claim by pear: ComTec Systems; country: US; sector: Technology
  First observed: 2025-09-23.
references:
