title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4471 — Shadow Copy Deletion (morpheus)'
id: e1dbf7be-210a-556f-b430-e8086733f4bd
status: deprecated
description: |
  Detects shadow copy deletion commands associated with morpheus ransomware.
  Incident: dragnet-ransomware-2025-4471
  Ransomware victim claim by morpheus: Dinizulu Law Group LTD; country: US; sector: Business Services
  First observed: 2025-02-24.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
