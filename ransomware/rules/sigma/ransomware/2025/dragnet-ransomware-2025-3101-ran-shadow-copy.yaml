title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3101 — Shadow Copy Deletion (hellcat)'
id: 89565173-3383-5b4b-911b-146104e3b17b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with hellcat ransomware.
  Incident: dragnet-ransomware-2025-3101
  Ransomware victim claim by hellcat: OneDealer; country: DE; sector: Consumer Services
  First observed: 2025-02-25.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
