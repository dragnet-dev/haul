title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4082 — Shadow Copy Deletion (lynx)'
id: 307c9e01-9c78-5dc0-9656-7ca2de6f85e0
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4082
  Ransomware victim claim by lynx: Colmar Industrial Supplies; country: US; sector: Manufacturing
  First observed: 2025-04-11.
references:
  - http://lynxblog.net/leaks/67f90ddcce8dcc3b0d4c3132
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
