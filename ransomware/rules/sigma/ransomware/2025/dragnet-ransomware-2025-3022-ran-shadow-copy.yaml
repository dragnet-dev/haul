description: |
  Detects shadow copy deletion commands associated with gunra ransomware.
  Incident: dragnet-ransomware-2025-3022
  Ransomware victim claim by gunra: SEGUROS AMÉRICA; country: NI; sector: Financial Services
  First observed: 2025-08-18.
