references:
  - http://incblog6qu4y4mm4zvw5nrmue6qbwtgjsxpw6b7ixzssu36tsajldoad.onion/blog/disclosures/68dd995efa0b6f4bdfa3c1f2
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
