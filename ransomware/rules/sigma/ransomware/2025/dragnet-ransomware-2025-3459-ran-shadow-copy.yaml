status: deprecated
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2025-3459
  Ransomware victim claim by incransom: suntreeinternalmedicine.com; country: US; sector: Healthcare
