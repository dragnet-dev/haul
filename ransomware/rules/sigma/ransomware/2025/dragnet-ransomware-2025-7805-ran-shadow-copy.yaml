title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7805 — Shadow Copy Deletion (weyhro)'
id: b54f36ce-7894-5f08-9bd3-1dac39f4adc4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with weyhro ransomware.
  Incident: dragnet-ransomware-2025-7805
  Ransomware victim claim by weyhro: Chemtron RiverBend; country: US; sector: Manufacturing
  First observed: 2025-08-10.
references:
  - https://weyhro.hk//leaks/crbwater
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
