description: |
  Detects shadow copy deletion commands associated with pear ransomware.
  Incident: dragnet-ransomware-2025-4798
  Ransomware victim claim by pear: Law Office of Ronald W. Hillberg; country: US; sector: Business Services
  First observed: 2025-11-12.
references:
