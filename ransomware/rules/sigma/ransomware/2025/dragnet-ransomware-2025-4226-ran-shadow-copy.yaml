title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4226 — Shadow Copy Deletion (lynx)'
id: 0250a0fb-df4e-5b79-8274-253e7a5bc93d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4226
  Ransomware victim claim by lynx: Springfield Water and Sewer Commission; country: US; sector: Public Sector
  First observed: 2025-03-11.
references:
  - http://lynxblog.net/leaks/67d07b3944fac8dca1d8a329
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
