title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3403 — Shadow Copy Deletion (incransom)'
id: 32773bd2-90f0-5069-ae69-d16b09530ae0
status: deprecated
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2025-3403
  Ransomware victim claim by incransom: Pennsylvania Office of Attorney General; country: US; sector: Public Sector
