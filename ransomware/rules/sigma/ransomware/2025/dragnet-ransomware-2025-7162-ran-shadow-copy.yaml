title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7162 — Shadow Copy Deletion (shinyhunters)'
id: cdd9831d-341b-5fb9-bde2-c48346f57f69
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-7162
  Ransomware victim claim by shinyhunters: Marriott; country: US; sector: Hospitality and Tourism
  First observed: 2025-08-17.
references:
  - https://breachforums.hn//marriott.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
