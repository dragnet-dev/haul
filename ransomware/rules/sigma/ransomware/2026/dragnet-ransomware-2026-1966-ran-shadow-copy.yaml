title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1966 — Shadow Copy Deletion (osiris)'
id: 2e431e2c-40a8-5de3-8e40-6bcb01983c2a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with osiris ransomware.
  Incident: dragnet-ransomware-2026-1966
  Ransomware victim claim by osiris: American Vanguard; country: US; sector: Manufacturing
  First observed: 2026-01-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
