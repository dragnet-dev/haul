title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1418 — Shadow Copy Deletion (kazu)'
id: f59c8605-3e69-589f-acfe-b16217693ecd
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kazu ransomware.
  Incident: dragnet-ransomware-2026-1418
  Ransomware victim claim by kazu: zHealthEHR — Practice Management Software for Chiropractic & Wellness Clinics; country: US; sector: Technology
  First observed: 2026-01-26.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
