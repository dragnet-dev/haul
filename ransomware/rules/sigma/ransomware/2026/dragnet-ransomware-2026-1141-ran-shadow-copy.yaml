title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1141 — Shadow Copy Deletion (handala)'
id: bda91c8b-6864-5a83-a244-7c6f3d4ebdfe
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1141
  Ransomware victim claim by handala: North Country Business Products Breached: 2,680 POS Terminals Disabled Nationwide; country: US; sector: Technology
  First observed: 2026-03-28.
references:
  - https://handala-hack.tw/north-country-business-products-breached-2680-pos-terminals-disabled-nationwide/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
