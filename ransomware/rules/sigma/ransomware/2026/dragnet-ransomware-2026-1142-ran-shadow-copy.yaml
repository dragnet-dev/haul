title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1142 — Shadow Copy Deletion (handala)'
id: 2ce667ce-8887-5547-8bcf-684783d6dc1c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1142
  Ransomware victim claim by handala: Official Statement by Handala Group in Response to Threats from the US and Its Allies; sector: Not Found
  First observed: 2026-03-20.
references:
  - https://handala-team.to/official-statement-by-handala-group-in-response-to-threats-from-the-us-and-its-allies/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
