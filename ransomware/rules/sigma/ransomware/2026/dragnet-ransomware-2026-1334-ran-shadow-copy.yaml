references:
  - http://incblog6qu4y4mm4zvw5nrmue6qbwtgjsxpw6b7ixzssu36tsajldoad.onion/blog/disclosures/699c5c908f1d14b743962624
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
