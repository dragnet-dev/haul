title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0031 — Shadow Copy Deletion (AiLock)'
id: c2895adc-420a-5a1f-8ccf-0ea37f5846f2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with AiLock ransomware.
  Incident: dragnet-ransomware-2026-0031
  Ransomware victim claim by AiLock: S&R Compression, LLC; country: US; sector: Manufacturing
  First observed: 2026-01-10.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
