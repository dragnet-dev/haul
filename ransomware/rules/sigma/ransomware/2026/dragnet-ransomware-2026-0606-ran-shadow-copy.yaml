title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0606 — Shadow Copy Deletion (cmdorganization)'
id: eb578116-5104-5ea2-b996-554c9375b929
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cmdorganization ransomware.
  Incident: dragnet-ransomware-2026-0606
  Ransomware victim claim by cmdorganization: Holy Name of Jesus; country: US; sector: Not Found
  First observed: 2026-05-17.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
