title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0610 — Shadow Copy Deletion (cmdorganization)'
id: 960f9b7b-f166-5eef-8d36-e961f875c695
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cmdorganization ransomware.
  Incident: dragnet-ransomware-2026-0610
  Ransomware victim claim by cmdorganization: PennEastern Architects; country: US; sector: Business Services
  First observed: 2026-05-08.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
