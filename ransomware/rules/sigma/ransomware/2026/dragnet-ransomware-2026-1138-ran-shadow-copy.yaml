description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1138
  Ransomware victim claim by handala: Martyr Ali Larijani; sector: Not Found
  First observed: 2026-03-18.
references:
  - https://handala-hack.to/martyr-ali-larijani/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
