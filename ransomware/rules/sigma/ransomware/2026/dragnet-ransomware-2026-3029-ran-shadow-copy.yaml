description: |
  Detects shadow copy deletion commands associated with stormous ransomware.
  Incident: dragnet-ransomware-2026-3029
  Ransomware victim claim by stormous: arc-reins.com + fidelityunited.ae UPDATE-FULL DATA DUMP; country: AE; sector: Financial Services
