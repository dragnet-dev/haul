title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0301 — Shadow Copy Deletion (anubis)'
id: 9d93f70f-e950-5b7f-a75e-2716aeff083e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with anubis ransomware.
  Incident: dragnet-ransomware-2026-0301
  Ransomware victim claim by anubis: [Redacted] Ticket #1989; country: GB; sector: Technology
  First observed: 2026-02-04.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
