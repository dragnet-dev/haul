title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1124 — Shadow Copy Deletion (handala)'
id: 6e4ae3e9-60b7-56f2-8487-01011c570334
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1124
  Ransomware victim claim by handala: Handala New Account – Sunset of the lions; sector: Not Found
  First observed: 2026-01-25.
references:
  - https://handala-hack.to/handala-new-account-sunset-of-the-lions/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
