title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1967 — Shadow Copy Deletion (osiris)'
id: 6c5a8fec-074a-5bfa-8ef0-47eb95fd6e8e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with osiris ransomware.
  Incident: dragnet-ransomware-2026-1967
  Ransomware victim claim by osiris: Mantra Softech Pvt; country: IN; sector: Technology
  First observed: 2026-01-18.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
