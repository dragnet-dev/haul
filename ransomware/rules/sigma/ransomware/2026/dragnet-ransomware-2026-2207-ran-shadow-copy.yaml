title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-2207 — Shadow Copy Deletion (PrinzEugen)'
id: f23e81dd-e6d9-550b-a46f-83239fba2cef
status: deprecated
description: |
  Detects shadow copy deletion commands associated with PrinzEugen ransomware.
  Incident: dragnet-ransomware-2026-2207
  Ransomware victim claim by PrinzEugen: Transitions Pro Centre Val de Loire; country: FR; sector: Business Services
  First observed: 2026-05-03.
references:
  - http://prinzfkbjiazbrur4mjje6mntjc4vydx3iatkkzycufoylqcoo4y7pqd.onion/transitions-pro-centre-val-de-loire
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
