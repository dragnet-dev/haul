title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0724 — Shadow Copy Deletion (crypto24)'
id: 99f219fc-c6a5-50d6-bde5-8b58e4795a3b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with crypto24 ransomware.
  Incident: dragnet-ransomware-2026-0724
  Ransomware victim claim by crypto24: Qatar Biomedical Research Institute (QBRI); country: QA; sector: Healthcare
  First observed: 2026-04-17.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
