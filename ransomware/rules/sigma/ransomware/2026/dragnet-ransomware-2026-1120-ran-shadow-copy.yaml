title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1120 — Shadow Copy Deletion (handala)'
id: 3731fbd4-d154-5b95-b30f-22086bb79079
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1120
  Ransomware victim claim by handala: From Hunter to Hunted: Mossad’s Former Chief Falls into the Trap; country: IL; sector: Not Found
  First observed: 2026-03-25.
references:
  - https://handala-team.to/from-hunter-to-hunted-mossads-former-chief-falls-into-the-trap/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
