title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-3035 — Shadow Copy Deletion (stormous)'
id: 52c42a38-05d0-558d-9770-7c551ff7fafd
status: deprecated
description: |
  Detects shadow copy deletion commands associated with stormous ransomware.
  Incident: dragnet-ransomware-2026-3035
  Ransomware victim claim by stormous: vspsolutions.com.au SAMPLE-FREE 20GB; country: AU; sector: Business Services
  First observed: 2026-05-13.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
