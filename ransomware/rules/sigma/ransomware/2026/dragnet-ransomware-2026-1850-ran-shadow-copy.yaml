description: |
  Detects shadow copy deletion commands associated with nightspire ransomware.
  Incident: dragnet-ransomware-2026-1850
  Ransomware victim claim by nightspire: *it**a*e *ut**ot**e Ltd; country: GB; sector: Not Found
