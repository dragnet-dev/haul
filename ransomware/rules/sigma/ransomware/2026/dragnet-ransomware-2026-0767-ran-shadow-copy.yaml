description: |
  Detects shadow copy deletion commands associated with direwolf ransomware.
  Incident: dragnet-ransomware-2026-0767
  Ransomware victim claim by direwolf: Sunzen Biotech Berhad; country: MY; sector: Healthcare
  First observed: 2026-01-04.
references:
  - http://direwolfcdkv5whaz2spehizdg22jsuf5aeje4asmetpbt6ri4jnd4qd.onion/api/public/articles/58
