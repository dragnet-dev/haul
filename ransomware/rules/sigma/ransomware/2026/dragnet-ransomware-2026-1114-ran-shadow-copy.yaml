title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1114 — Shadow Copy Deletion (handala)'
id: 9d5c6b56-69d0-53de-a314-f44b300ed6a8
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1114
  Ransomware victim claim by handala: Avraham Hayyim ( Mehrdad Rahimi ) – Mossad Agent; sector: Not Found
  First observed: 2026-01-18.
references:
  - https://handala-hack.to/avraham-hayyim-mehrdad-rahimi-hacked-mossad-agent/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
