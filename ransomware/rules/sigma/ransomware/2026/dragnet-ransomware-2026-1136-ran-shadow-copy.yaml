title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1136 — Shadow Copy Deletion (handala)'
id: ad282f7e-d8fc-5407-a076-62dc42b8de1c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1136
  Ransomware victim claim by handala: Listen Closely, Gallant: Handala’s Eyes and Ears Are Everywhere; sector: Not Found
  First observed: 2026-03-29.
references:
  - https://handala-hack.tw/listen-closely-gallant-handalas-eyes-and-ears-are-everywhere/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
