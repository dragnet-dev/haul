title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1132 — Shadow Copy Deletion (handala)'
id: a806cf80-33c1-5549-9434-0c2233e2d288
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1132
  Ransomware victim claim by handala: Israeli Weather Stations Crippled; country: IL; sector: Public Sector
  First observed: 2026-03-08.
references:
  - https://handala-hack.to/israeli-weather-stations-crippled/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
