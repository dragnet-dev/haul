title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1130 — Shadow Copy Deletion (handala)'
id: 8be67160-d843-5ac5-8d86-9391a8b73594
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1130
  Ransomware victim claim by handala: Israel Institute for National Security Studies (INSS); country: IL; sector: Public Sector
  First observed: 2026-03-04.
references:
  - https://handala-hack.to/israel-institute-for-national-security-studies-inss-hacked/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
