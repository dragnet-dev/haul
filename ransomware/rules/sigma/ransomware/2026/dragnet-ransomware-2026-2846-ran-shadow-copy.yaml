title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-2846 — Shadow Copy Deletion (shinyhunters)'
id: 13bacc1a-8c3a-58e1-866e-2491db44f480
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2026-2846
  Ransomware victim claim by shinyhunters: Aura Group, Inc; country: US; sector: Business Services
  First observed: 2026-03-12.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
