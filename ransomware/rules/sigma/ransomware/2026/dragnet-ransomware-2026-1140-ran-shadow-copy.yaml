title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1140 — Shadow Copy Deletion (handala)'
id: ecf88d44-e6ab-5898-ab73-437d2cedde36
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1140
  Ransomware victim claim by handala: No Place to Hide: Senior Navy Officers’ Identities Now Public; sector: Not Found
  First observed: 2026-03-14.
references:
  - https://handala-hack.to/no-place-to-hide-senior-navy-officers-identities-now-public/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
