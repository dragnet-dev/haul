title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1053 — Shadow Copy Deletion (genesis)'
id: 79db011e-5b89-5d74-bbf4-1a84fd6b87e5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with genesis ransomware.
  Incident: dragnet-ransomware-2026-1053
  Ransomware victim claim by genesis: Community Health Action of Staten Island (A part of Sun River Health); country: US; sector: Healthcare
  First observed: 2026-02-13.
references:
  - http://genesis6ixpb5mcy4kudybtw5op2wqlrkocfogbnenz3c647ibqixiad.onion/c3a27df2d6f6ef4bccc2/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
