title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1113 — Shadow Copy Deletion (handala)'
id: 18524cb0-b0bf-5280-9a51-b00efb5a5aa1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1113
  Ransomware victim claim by handala: Atlas Insurances Ltd; country: IL; sector: Financial Services
  First observed: 2026-03-05.
references:
  - https://handala-hack.to/atlas-insurances-ltd-hacked/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
