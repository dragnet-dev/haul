title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1148 — Shadow Copy Deletion (handala)'
id: 93674eec-0e25-5abd-b836-dc9ec657d835
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1148
  Ransomware victim claim by handala: Raz Zimmt’s Chats Leaked to the World; sector: Not Found
  First observed: 2026-04-06.
references:
  - https://handala-hack.tw/raz-zimmts-chats-leaked-to-the-world/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
