title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-2835 — Shadow Copy Deletion (shadowbyt3$)'
id: c777b281-8acb-58fa-bcb1-34502b313f8d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shadowbyt3$ ransomware.
  Incident: dragnet-ransomware-2026-2835
  Ransomware victim claim by shadowbyt3$: PowerCampus; country: IN; sector: Education
  First observed: 2026-05-14.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
