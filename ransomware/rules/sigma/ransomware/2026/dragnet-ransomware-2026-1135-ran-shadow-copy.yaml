title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1135 — Shadow Copy Deletion (handala)'
id: 61ebeaf1-c9e6-52c1-b253-cfa0bc63d88b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1135
  Ransomware victim claim by handala: Laura Gilinski; sector: Not Found
  First observed: 2026-03-15.
references:
  - https://handala-hack.to/laura-gilinski-hacked/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
