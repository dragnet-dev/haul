title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1762 — Shadow Copy Deletion (morpheus)'
id: c2a4f69e-d8e9-5140-9e03-1b83086240fd
status: deprecated
description: |
  Detects shadow copy deletion commands associated with morpheus ransomware.
  Incident: dragnet-ransomware-2026-1762
  Ransomware victim claim by morpheus: SUNSETWORLDRESORTS; country: MX; sector: Hospitality and Tourism
  First observed: 2026-01-29.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
