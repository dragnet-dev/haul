title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1785 — Shadow Copy Deletion (nightspire)'
id: b945f0de-9cb4-50e5-a4db-d0170dd0534c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with nightspire ransomware.
  Incident: dragnet-ransomware-2026-1785
  Ransomware victim claim by nightspire: Anbogen Therapeutics Inc.; country: TW; sector: Healthcare
  First observed: 2026-03-22.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
