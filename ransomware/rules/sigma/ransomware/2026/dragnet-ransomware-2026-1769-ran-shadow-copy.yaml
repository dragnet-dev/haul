title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1769 — Shadow Copy Deletion (netrunner)'
id: f0335004-5f44-51f8-8b5f-5c3f30e822ef
status: deprecated
description: |
  Detects shadow copy deletion commands associated with netrunner ransomware.
  Incident: dragnet-ransomware-2026-1769
  Ransomware victim claim by netrunner: Nippon Medical School Musashi Kosugi Hospital; country: JP; sector: Healthcare
  First observed: 2026-04-03.
references:
  - http://netrunrsb3bivj5gnwajzxlig5qkteb6edgthxj7fmsvhkzxtwfxwaad.onion/view/MusashiKosugi
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
