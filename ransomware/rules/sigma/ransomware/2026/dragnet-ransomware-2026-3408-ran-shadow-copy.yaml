title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-3408 — Shadow Copy Deletion (TiMc)'
id: 9f342bd2-f473-5dbb-a0da-72db53fb0532
status: deprecated
description: |
  Detects shadow copy deletion commands associated with TiMc ransomware.
  Incident: dragnet-ransomware-2026-3408
  Ransomware victim claim by TiMc: oncologica; country: GB; sector: Healthcare
  First observed: 2026-04-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
