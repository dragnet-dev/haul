description: |
  Detects shadow copy deletion commands associated with pear ransomware.
  Incident: dragnet-ransomware-2026-2088
  Ransomware victim claim by pear: The Odom Firm; country: US; sector: Business Services
  First observed: 2026-02-23.
references:
