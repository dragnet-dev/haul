title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1128 — Shadow Copy Deletion (handala)'
id: 043667f2-e7ec-535b-b2ce-725a5ae1d564
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1128
  Ransomware victim claim by handala: Ignite Chaos at Your Own Risk: i24 Channel; sector: Telecommunication
  First observed: 2026-01-21.
references:
  - https://handala-hack.to/ignite-chaos-at-your-own-risk-i24-channel-hacked/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
