description: |
  Detects shadow copy deletion commands associated with nightspire ransomware.
  Incident: dragnet-ransomware-2026-1790
  Ransomware victim claim by nightspire: B** *r*t**r* *i* **s***s of ***te** *i**o**i; sector: Not Found
