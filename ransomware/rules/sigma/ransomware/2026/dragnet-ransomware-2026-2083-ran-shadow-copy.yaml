description: |
  Detects shadow copy deletion commands associated with pear ransomware.
  Incident: dragnet-ransomware-2026-2083
  Ransomware victim claim by pear: San Diego Eye Bank; country: US; sector: Healthcare
  First observed: 2026-02-04.
references:
