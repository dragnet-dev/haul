title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1146 — Shadow Copy Deletion (handala)'
id: 86873008-73fe-570a-896c-160a4e8dc9b7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1146
  Ransomware victim claim by handala: Publication of Photos and Personal Details of IranWire’s Traitorous Members; sector: Not Found
  First observed: 2026-04-03.
references:
  - https://handala-hack.tw/publication-of-photos-and-personal-details-of-iranwires-traitorous-members/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
