title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1137 — Shadow Copy Deletion (handala)'
id: 73840519-b7cc-5223-b2b3-72a8587aaf14
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1137
  Ransomware victim claim by handala: Lockheed Martin Employees Given 48 Hours to Respond: A Tight Deadline Looms; country: US; sector: Manufacturing
  First observed: 2026-03-26.
references:
  - https://handala-team.to/lockheed-martin-employees-given-48-hours-to-respond-a-tight-deadline-looms/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
