title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1122 — Shadow Copy Deletion (handala)'
id: 77327409-17d7-51f7-afaf-da7c25b49ae7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1122
  Ransomware victim claim by handala: Handala Alert: Amplifying the Voice of Resistance; country: PS; sector: Not Found
  First observed: 2026-01-02.
references:
  - https://handala-hack.to/handala-alert-amplifying-the-voice-of-resistance/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
