description: |
  Detects shadow copy deletion commands associated with werewolves ransomware.
  Incident: dragnet-ransomware-2023-5373
  Ransomware victim claim by werewolves: promproektspb.ru; country: RU; sector: Business Services
  First observed: 2023-11-02.
references:
