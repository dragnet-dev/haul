description: |
  Detects shadow copy deletion commands associated with qilin ransomware.
  Incident: dragnet-ransomware-2023-4532
  Ransomware victim claim by qilin: AWM Global Advisors; sector: Financial Services
  First observed: 2023-06-07.
references:
