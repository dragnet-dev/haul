title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3750 — Shadow Copy Deletion (mallox)'
id: 34d3a87a-82e3-5c2f-ab74-f44c86eb6bce
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mallox ransomware.
  Incident: dragnet-ransomware-2023-3750
  Ransomware victim claim by mallox: El Seif Development; sector: Construction
  First observed: 2023-01-15.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
