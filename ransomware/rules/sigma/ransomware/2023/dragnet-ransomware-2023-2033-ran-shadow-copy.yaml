title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2033 — Shadow Copy Deletion (dispossessor)'
id: 0224e75f-d3c1-591b-bccb-a5fe86ee2480
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2033
  Ransomware victim claim by dispossessor: armstrongconsultants.com; country: US; sector: Business Services
  First observed: 2023-11-01.
references:
  - https://dispossessor.com/blogs/12
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
