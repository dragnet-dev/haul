title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2072 — Shadow Copy Deletion (dispossessor)'
id: 9e646f53-dc5e-5922-aa6b-663f48d0c583
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2072
  Ransomware victim claim by dispossessor: distribuidoradavidsa.com; country: PA; sector: Business Services
  First observed: 2023-08-29.
references:
  - https://dispossessor.com/blogs/901
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
