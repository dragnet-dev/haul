description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2084
  Ransomware victim claim by dispossessor: esinsa.com; sector: Technology
  First observed: 2023-04-24.
references:
  - https://dispossessor.com/blogs/682
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
