title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2412 — Shadow Copy Deletion (knight)'
id: cbdd35c0-d6a6-5949-a814-f4f10faf17a2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with knight ransomware.
  Incident: dragnet-ransomware-2023-2412
  Ransomware victim claim by knight: Akir Metal San Tic Ltd ti was hacked. All confidential information was stolen; country: TR; sector: Manufacturing
  First observed: 2023-12-08.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
