title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5307 — Shadow Copy Deletion (vendetta)'
id: 7793b2ec-a31d-5eac-9305-bab2a58850bb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with vendetta ransomware.
  Incident: dragnet-ransomware-2023-5307
  Ransomware victim claim by vendetta: Chowtaifook; sector: Consumer Services
  First observed: 2023-02-27.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
