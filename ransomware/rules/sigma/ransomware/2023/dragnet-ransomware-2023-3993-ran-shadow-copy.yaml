title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3993 — Shadow Copy Deletion (monti)'
id: afbf1f82-1edd-5bde-9974-f48215861ceb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with monti ransomware.
  Incident: dragnet-ransomware-2023-3993
  Ransomware victim claim by monti: Auckland University of Technology; country: NZ; sector: Education
  First observed: 2023-09-22.
references:
  - http://mblogci3rudehaagbryjznltdp33ojwzkq6hn2pckvjq33rycmzczpid.onion/blog/c4d13fb89574bba9e6b64412d1b369a26faecb336fc4710ba43d994468c915ef/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
