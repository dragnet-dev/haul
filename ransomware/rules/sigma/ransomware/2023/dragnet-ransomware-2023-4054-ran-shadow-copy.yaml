description: |
  Detects shadow copy deletion commands associated with noescape ransomware.
  Incident: dragnet-ransomware-2023-4054
  Ransomware victim claim by noescape: Contact 121 Pty Ltd; country: AU; sector: Business Services
  First observed: 2023-08-11.
references:
  - http://noescapemsqxvizdxyl7f7rmg5cdjwp33pg2wpmiaaibilb4btwzttad.onion/post/99dd7ea0-efef-4e2a-8644-eb22d88c2bc6
