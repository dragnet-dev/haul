title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2409 — Shadow Copy Deletion (karakurt)'
id: 11cbe4cf-33ca-5f68-8be2-e45b28410891
status: deprecated
description: |
  Detects shadow copy deletion commands associated with karakurt ransomware.
  Incident: dragnet-ransomware-2023-2409
  Ransomware victim claim by karakurt: Yakima Valley Radiology; sector: Healthcare
  First observed: 2023-09-22.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
