references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/9943d6d1-fb03-43f3-a02a-87b87909d5af
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
