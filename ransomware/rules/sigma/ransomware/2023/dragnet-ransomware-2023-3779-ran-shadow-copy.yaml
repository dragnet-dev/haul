description: |
  Detects shadow copy deletion commands associated with medusa ransomware.
  Incident: dragnet-ransomware-2023-3779
  Ransomware victim claim by medusa: Amaszonas S.A.; country: BO; sector: Transportation/Logistics
  First observed: 2023-05-23.
references:
