title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5142 — Shadow Copy Deletion (threeam)'
id: a14dd3a0-bf78-571d-a1ee-a2d63fdae2e7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with threeam ransomware.
  Incident: dragnet-ransomware-2023-5142
  Ransomware victim claim by threeam: neuraxpharm.com; sector: Healthcare
  First observed: 2023-09-22.
references:
  - http://threeamkelxicjsaf2czjyz2lc4q3ngqkxhhlexyfcp2o6raw4rphyad.onion/cl/clicks.php?uri=NEURAX/index.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
