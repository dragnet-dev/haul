title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4915 — Shadow Copy Deletion (royal)'
id: 43af714b-4f97-5f81-913a-9e838d3e3bc8
status: deprecated
description: |
  Detects shadow copy deletion commands associated with royal ransomware.
  Incident: dragnet-ransomware-2023-4915
  Ransomware victim claim by royal: Hills Salvage and Recycling; country: GB; sector: Manufacturing
  First observed: 2023-01-14.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
