title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4720 — Shadow Copy Deletion (ransomhouse)'
id: eeb0a6d7-49a5-5f2e-81e9-89a600249e45
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ransomhouse ransomware.
  Incident: dragnet-ransomware-2023-4720
  Ransomware victim claim by ransomhouse: IMI Hydronic Engineering; sector: Manufacturing
  First observed: 2023-01-12.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
