title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2068 — Shadow Copy Deletion (dispossessor)'
id: f61b4e17-5db6-56d8-bedd-f0fd3c75d17f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2068
  Ransomware victim claim by dispossessor: csem.qc.ca; country: CA; sector: Business Services
  First observed: 2023-08-30.
references:
  - https://dispossessor.com/blogs/920
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
