title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2029 — Shadow Copy Deletion (dispossessor)'
id: 41bc3b98-88f5-5faf-ba8b-4644201e39fd
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2029
  Ransomware victim claim by dispossessor: aquidneckclub.com; sector: Hospitality and Tourism
  First observed: 2023-06-19.
references:
  - https://dispossessor.com/blogs/789
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
