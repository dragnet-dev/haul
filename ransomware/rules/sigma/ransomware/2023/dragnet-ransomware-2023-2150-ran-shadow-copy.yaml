title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2150 — Shadow Copy Deletion (dispossessor)'
id: 599057fb-fce5-5b7a-9395-b89e5126c57a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2150
  Ransomware victim claim by dispossessor: ourrelentlesschurch.com; sector: Consumer Services
  First observed: 2023-06-06.
references:
  - https://dispossessor.com/blogs/764
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
