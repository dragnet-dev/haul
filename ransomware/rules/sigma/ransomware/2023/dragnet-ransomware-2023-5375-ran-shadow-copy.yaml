description: |
  Detects shadow copy deletion commands associated with werewolves ransomware.
  Incident: dragnet-ransomware-2023-5375
  Ransomware victim claim by werewolves: roomhotel-sochi.ru; country: RU; sector: Hospitality and Tourism
  First observed: 2023-09-30.
