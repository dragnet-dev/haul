description: |
  Detects shadow copy deletion commands associated with medusa ransomware.
  Incident: dragnet-ransomware-2023-3837
  Ransomware victim claim by medusa: Hinsdale School District ; country: US; sector: Education
  First observed: 2023-12-11.
references:
  - http://medusaxko7jxtrojdkxo66j7ck4q5tgktf7uqsqyfry4ebnxlcbkccyd.onion/detail?id=c0b0f5a1de88f28e720b7a30657065d0
