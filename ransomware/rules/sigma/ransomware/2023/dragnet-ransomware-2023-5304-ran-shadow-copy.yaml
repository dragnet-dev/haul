title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5304 — Shadow Copy Deletion (unsafe)'
id: 55e88a34-b3a3-5680-8dc8-5648d40b650c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with unsafe ransomware.
  Incident: dragnet-ransomware-2023-5304
  Ransomware victim claim by unsafe: SPARTAN Light Metal Products Inc; country: US; sector: Manufacturing
  First observed: 2023-04-17.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
