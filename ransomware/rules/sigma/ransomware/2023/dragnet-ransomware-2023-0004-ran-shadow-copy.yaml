title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0004 — Shadow Copy Deletion (0mega)'
id: 5c663822-ecec-5286-8fba-b8038c700aea
status: deprecated
description: |
  Detects shadow copy deletion commands associated with 0mega ransomware.
  Incident: dragnet-ransomware-2023-0004
  Ransomware victim claim by 0mega: US Liner Company & American Made LLC; sector: Manufacturing
  First observed: 2023-10-04.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
