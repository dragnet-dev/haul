title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2057 — Shadow Copy Deletion (dispossessor)'
id: ae86a7a2-eca8-55d0-8d37-0f0f01f4f6bd
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2057
  Ransomware victim claim by dispossessor: cloverbrook.com; sector: Manufacturing
  First observed: 2023-08-29.
references:
  - https://dispossessor.com/blogs/906
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
