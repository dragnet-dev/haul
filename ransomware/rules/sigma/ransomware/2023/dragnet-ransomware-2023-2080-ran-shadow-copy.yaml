title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2080 — Shadow Copy Deletion (dispossessor)'
id: 8dd57c2e-963a-597e-84e4-960ca123f41f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2080
  Ransomware victim claim by dispossessor: elliott-turbo.com; country: TD; sector: Manufacturing
  First observed: 2023-08-16.
references:
  - https://dispossessor.com/blogs/290
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
