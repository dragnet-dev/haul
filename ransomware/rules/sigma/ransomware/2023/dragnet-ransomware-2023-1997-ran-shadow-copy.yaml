title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1997 — Shadow Copy Deletion (daixin)'
id: 1344a492-b47c-52c0-9dd1-09947d4ef778
status: deprecated
description: |
  Detects shadow copy deletion commands associated with daixin ransomware.
  Incident: dragnet-ransomware-2023-1997
  Ransomware victim claim by daixin: North Texas Municipal Water District; country: US; sector: Public Sector
  First observed: 2023-11-28.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
