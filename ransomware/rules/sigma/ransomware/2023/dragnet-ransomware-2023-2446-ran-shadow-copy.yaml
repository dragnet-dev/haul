description: |
  Detects shadow copy deletion commands associated with knight ransomware.
  Incident: dragnet-ransomware-2023-2446
  Ransomware victim claim by knight: US Claims Solutions; sector: Financial Services
  First observed: 2023-11-01.
references:
  - http://knight3xppu263m7g4ag3xlit2qxpryjwueobh7vjdc3zrscqlfu3pqd.onion/3a390ff6-f9c5-49f9-b47c-3272012731e2/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
