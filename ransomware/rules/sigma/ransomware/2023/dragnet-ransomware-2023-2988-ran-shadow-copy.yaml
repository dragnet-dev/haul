description: |
  Detects shadow copy deletion commands associated with lockbit3 ransomware.
  Incident: dragnet-ransomware-2023-2988
  Ransomware victim claim by lockbit3: ktbs.com; country: US; sector: Consumer Services
  First observed: 2023-04-14.
references:
