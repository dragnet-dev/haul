title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4611 — Shadow Copy Deletion (ransomed)'
id: f68dbb29-1e95-5585-bc29-d49a8e7918e4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ransomed ransomware.
  Incident: dragnet-ransomware-2023-4611
  Ransomware victim claim by ransomed: A1; sector: Not Found
  First observed: 2023-08-21.
references:
  - https://ransomed.vc/a1.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
