title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0238 — Shadow Copy Deletion (abyss)'
id: c702cb0f-9705-5ce2-8dce-7f5f3ed5377b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with abyss ransomware.
  Incident: dragnet-ransomware-2023-0238
  Ransomware victim claim by abyss: 7x7oralsurgery.com; sector: Healthcare
  First observed: 2023-03-30.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
