title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5081 — Shadow Copy Deletion (stormous)'
id: ec0390b6-0ee7-54b2-9708-c13c6a32f5b4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with stormous ransomware.
  Incident: dragnet-ransomware-2023-5081
  Ransomware victim claim by stormous: dynamite; sector: Consumer Services
  First observed: 2023-07-24.
references:
  - http://h3reihqb2y7woqdary2g3bmk3apgtxuyhx4j2ftovbhe3l5svev7bdyd.onion/dynamite.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
