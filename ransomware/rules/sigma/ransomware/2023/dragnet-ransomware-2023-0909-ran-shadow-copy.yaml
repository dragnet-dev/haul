title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0909 — Shadow Copy Deletion (avoslocker)'
id: 7052b4c0-f910-5ee3-a83d-ab1406c72ff7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with avoslocker ransomware.
  Incident: dragnet-ransomware-2023-0909
  Ransomware victim claim by avoslocker: Memtech Acoustical; sector: Manufacturing
  First observed: 2023-02-11.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
