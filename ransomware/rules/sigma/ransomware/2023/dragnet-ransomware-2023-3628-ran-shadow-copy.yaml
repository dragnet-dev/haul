title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3628 — Shadow Copy Deletion (malas)'
id: da56f859-b322-540b-9851-da729113cd87
status: deprecated
description: |
  Detects shadow copy deletion commands associated with malas ransomware.
  Incident: dragnet-ransomware-2023-3628
  Ransomware victim claim by malas: ConnectTo; sector: Business Services
  First observed: 2023-04-09.
references:
  - http://malas2urovbyyavjzaezkt5ohljvyd5lt7vv7mnsgbf2y4bwlh72doqd.onion/posts/defaulters/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
