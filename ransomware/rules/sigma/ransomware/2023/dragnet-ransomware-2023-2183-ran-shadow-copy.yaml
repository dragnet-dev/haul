title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2183 — Shadow Copy Deletion (dispossessor)'
id: fd7b1eb8-b694-5617-9ebe-75e2fa037d46
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2183
  Ransomware victim claim by dispossessor: tayloredservices.com; sector: Transportation/Logistics
  First observed: 2023-10-01.
references:
  - https://dispossessor.com/blogs/1033
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
