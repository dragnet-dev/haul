references:
  - http://lockbitapt5x4zkjbcqmz6frdhecqqgadevyiwqxukksspnlidyvd7qd.onion/post/Q5oBD1KsAR0POiFc64876a13d77fc
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
