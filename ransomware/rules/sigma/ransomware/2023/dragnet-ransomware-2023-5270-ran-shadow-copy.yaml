description: |
  Detects shadow copy deletion commands associated with trigona ransomware.
  Incident: dragnet-ransomware-2023-5270
  Ransomware victim claim by trigona: Albany Clinic; country: AU; sector: Healthcare
  First observed: 2023-04-11.
references:
  - http://6n5tfadusp4sarzuxntz34q4ohspiaya2mc6aw6uhlusfqfsdomavyyd.onion/leak/7
