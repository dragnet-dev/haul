description: |
  Detects shadow copy deletion commands associated with cyclops ransomware.
  Incident: dragnet-ransomware-2023-1987
  Ransomware victim claim by cyclops: Guatemala Military Intelligence Directorate; country: GT; sector: Public Sector
  First observed: 2023-06-30.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
