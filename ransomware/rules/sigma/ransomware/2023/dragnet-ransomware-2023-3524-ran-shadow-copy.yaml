title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3524 — Shadow Copy Deletion (lorenz)'
id: 078d7fb8-ce79-5f7a-91ba-b80c2d8b88fd
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lorenz ransomware.
  Incident: dragnet-ransomware-2023-3524
  Ransomware victim claim by lorenz: Intrasect Technologies; sector: Technology
  First observed: 2023-04-05.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
