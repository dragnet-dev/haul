title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0003 — Shadow Copy Deletion (0mega)'
id: 9224a208-d345-5ae2-8deb-087d1b5c4620
status: deprecated
description: |
  Detects shadow copy deletion commands associated with 0mega ransomware.
  Incident: dragnet-ransomware-2023-0003
  Ransomware victim claim by 0mega: Rotorcraft Leasing Company; sector: Transportation/Logistics
  First observed: 2023-10-17.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
