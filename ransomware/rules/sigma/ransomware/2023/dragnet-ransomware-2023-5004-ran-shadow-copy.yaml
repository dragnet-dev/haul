title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5004 — Shadow Copy Deletion (siegedsec)'
id: 356bbaa2-dcf7-5ea0-8bf9-085c6cfa0646
status: deprecated
description: |
  Detects shadow copy deletion commands associated with siegedsec ransomware.
  Incident: dragnet-ransomware-2023-5004
  Ransomware victim claim by siegedsec: Portland Government & United states government; sector: Public Sector
  First observed: 2023-12-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
