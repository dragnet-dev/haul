description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2023-0452
  Ransomware victim claim by alphv: accesscontrolsecuritycom; sector: Business Services
  First observed: 2023-04-26.
references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/dae5a481-e981-4fa6-9167-838ebce0bd25
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
