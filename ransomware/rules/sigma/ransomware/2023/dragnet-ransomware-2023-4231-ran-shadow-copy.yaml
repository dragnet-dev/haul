description: |
  Detects shadow copy deletion commands associated with play ransomware.
  Incident: dragnet-ransomware-2023-4231
  Ransomware victim claim by play: Betty Lou's; country: US; sector: Consumer Services
  First observed: 2023-07-06.
references:
