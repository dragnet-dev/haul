title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1369 — Shadow Copy Deletion (blackbyte)'
id: f6fa0918-4e8c-59ad-bd46-23a1ac03afd1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with blackbyte ransomware.
  Incident: dragnet-ransomware-2023-1369
  Associated with BlackByte.
  Ransomware victim claim by blackbyte: Ellison Technologies; sector: Manufacturing
  First observed: 2023-01-05.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.blackbyte
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
