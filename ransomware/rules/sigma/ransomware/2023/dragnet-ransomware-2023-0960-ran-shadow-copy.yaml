  Ransomware victim claim by bianlian: Bay Orthopedic & Rehabilitation Supply; sector: Consumer Services
  First observed: 2023-12-23.
references:
  - http://bianlianlbc5an4kgnay3opdemgcryg2kpfcbgczopmm3dnbz3uaunad.onion//companies/bayorthopedic.com
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
