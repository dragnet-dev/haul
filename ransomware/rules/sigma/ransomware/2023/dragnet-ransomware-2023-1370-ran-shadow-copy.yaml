title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1370 — Shadow Copy Deletion (blackbyte)'
id: f2ab4389-67a4-5754-b333-5d33e2ca914b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with blackbyte ransomware.
  Incident: dragnet-ransomware-2023-1370
  Associated with BlackByte.
  Ransomware victim claim by blackbyte: Esperanza Viva Jóvenes de México; sector: Not Found
  First observed: 2023-04-15.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.blackbyte
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
