title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2092 — Shadow Copy Deletion (dispossessor)'
id: 9fd99aa0-680e-5582-b533-34f8df2d3fa5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2092
  Ransomware victim claim by dispossessor: fullertonindia.com; country: ML; sector: Financial Services
  First observed: 2023-06-13.
references:
  - https://dispossessor.com/blogs/338
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
