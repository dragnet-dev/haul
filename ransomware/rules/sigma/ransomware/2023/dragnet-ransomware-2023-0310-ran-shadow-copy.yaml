title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0310 — Shadow Copy Deletion (akira)'
id: d9fb23ab-4527-56e0-aacd-787ad5f7d634
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2023-0310
  Ransomware victim claim by akira: Datawatch Systems; sector: Business Services
  First observed: 2023-08-03.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
