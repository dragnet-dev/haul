title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2135 — Shadow Copy Deletion (dispossessor)'
id: a61b09b4-e5b8-56c1-874f-829ff191e86e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2135
  Ransomware victim claim by dispossessor: mundocuervo.com; sector: Hospitality and Tourism
  First observed: 2023-06-07.
references:
  - https://dispossessor.com/blogs/777
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
