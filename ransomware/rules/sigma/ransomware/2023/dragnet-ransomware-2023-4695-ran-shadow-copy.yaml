status: deprecated
description: |
  Detects shadow copy deletion commands associated with ransomhouse ransomware.
  Incident: dragnet-ransomware-2023-4695
  Ransomware victim claim by ransomhouse: ALPS Ltd; country: GB; sector: Financial Services
  First observed: 2023-11-04.
references:
  - http://zohlm7ahjwegcedoz7lrdrti7bvpofymcayotp744qhx6gjmxbuo2yid.onion/r/9c8e6bf347a9f527f463113839932698d77a8828
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
