status: deprecated
description: |
  Detects shadow copy deletion commands associated with monti ransomware.
  Incident: dragnet-ransomware-2023-4002
  Ransomware victim claim by monti: Hello Cristina from Law Offices of John E Hill; sector: Business Services
  First observed: 2023-12-01.
references:
