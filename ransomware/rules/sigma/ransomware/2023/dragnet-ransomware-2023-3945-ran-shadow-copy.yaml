title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3945 — Shadow Copy Deletion (meow)'
id: 85734ea9-e7b2-5d83-af55-907747ca7365
status: deprecated
description: |
  Detects shadow copy deletion commands associated with meow ransomware.
  Incident: dragnet-ransomware-2023-3945
  Ransomware victim claim by meow: Vanderbilt University Medical Center; sector: Healthcare
  First observed: 2023-11-18.
references:
  - http://meow6xanhzfci2gbkn3lmbqq7xjjufskkdfocqdngt3ltvzgqpsg5mid.onion/story/vanderbilt-university-medical-center
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
