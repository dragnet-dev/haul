title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2220 — Shadow Copy Deletion (donutleaks)'
id: 20a4f3fe-0ca5-57ba-baca-088bbf484bb2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with donutleaks ransomware.
  Incident: dragnet-ransomware-2023-2220
  Ransomware victim claim by donutleaks: Jackson Township Police Department and Administration.; sector: Public Sector
  First observed: 2023-07-23.
references:
  - http://sbc2zv2qnz5vubwtx3aobfpkeao6l4igjegm3xx7tk5suqhjkp5jxtqd.onion/jackson-township-police-department-and-administration/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
