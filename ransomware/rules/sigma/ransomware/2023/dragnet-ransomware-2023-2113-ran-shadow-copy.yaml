title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2113 — Shadow Copy Deletion (dispossessor)'
id: e19914c0-0065-57e8-86fe-7a3e48fea45b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2113
  Ransomware victim claim by dispossessor: islandinsurance.ca; country: CA; sector: Financial Services
  First observed: 2023-04-19.
references:
  - https://dispossessor.com/blogs/669
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
