title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5103 — Shadow Copy Deletion (stormous)'
id: 85c1fd09-7f50-55e9-9751-ad25cc59194b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with stormous ransomware.
  Incident: dragnet-ransomware-2023-5103
  Ransomware victim claim by stormous: matrixtelecoms; sector: Telecommunication
  First observed: 2023-03-30.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
