description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2074
  Ransomware victim claim by dispossessor: dobsystems.com; sector: Technology
  First observed: 2023-12-20.
references:
