description: |
  Detects shadow copy deletion commands associated with monti ransomware.
  Incident: dragnet-ransomware-2023-3994
  Ransomware victim claim by monti: Bickel & Brewer - Press Release; country: US; sector: Business Services
  First observed: 2023-08-02.
references:
