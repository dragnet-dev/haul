description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2037
  Ransomware victim claim by dispossessor: bakermech.com; sector: Manufacturing
  First observed: 2023-03-21.
references:
