title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4783 — Shadow Copy Deletion (raznatovic)'
id: 534dd49c-6dd6-5c21-bfb5-8d239ddc26b6
status: deprecated
description: |
  Detects shadow copy deletion commands associated with raznatovic ransomware.
  Incident: dragnet-ransomware-2023-4783
  Ransomware victim claim by raznatovic: Colonial Pipeline; sector: Energy
  First observed: 2023-12-17.
references:
  - https://t.me/ransomed_channel/232
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
