description: |
  Detects shadow copy deletion commands associated with werewolves ransomware.
  Incident: dragnet-ransomware-2023-5358
  Ransomware victim claim by werewolves: avrora24.ru; country: RU; sector: Consumer Services
  First observed: 2023-09-22.
references:
