title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2062 — Shadow Copy Deletion (dispossessor)'
id: 560717f8-61a4-59da-8018-607601f26fd7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2062
  Ransomware victim claim by dispossessor: commercialfluidpower.com; country: US; sector: Manufacturing
  First observed: 2023-08-29.
references:
  - https://dispossessor.com/blogs/1003
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
