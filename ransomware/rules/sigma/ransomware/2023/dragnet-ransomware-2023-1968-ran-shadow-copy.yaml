description: |
  Detects shadow copy deletion commands associated with cryptnet ransomware.
  Incident: dragnet-ransomware-2023-1968
  Ransomware victim claim by cryptnet: Urban Import; sector: Consumer Services
  First observed: 2023-04-19.
references:
  - http://blog6zw62uijolee7e6aqqnqaszs3ckr5iphzdzsazgrpvtqtjwqryid.onion/news/1
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
