title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3971 — Shadow Copy Deletion (moneymessage)'
id: 967c01ca-ea13-558c-9032-48cd94605676
status: deprecated
description: |
  Detects shadow copy deletion commands associated with moneymessage ransomware.
  Incident: dragnet-ransomware-2023-3971
  Ransomware victim claim by moneymessage: Lpa-group.com; sector: Manufacturing
  First observed: 2023-01-04.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
