title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3736 — Shadow Copy Deletion (malekteam)'
id: 4f305f5e-4ec1-5d65-bb41-1bfb1249236d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with malekteam ransomware.
  Incident: dragnet-ransomware-2023-3736
  Ransomware victim claim by malekteam: ZIV Hospital; country: IL; sector: Healthcare
  First observed: 2023-12-24.
references:
  - http://195.14.123.2/ziv.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
