title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4831 — Shadow Copy Deletion (rhysida)'
id: 75175f65-7139-5d57-8806-7e3a1fbbff01
status: deprecated
description: |
  Detects shadow copy deletion commands associated with rhysida ransomware.
  Incident: dragnet-ransomware-2023-4831
  Ransomware victim claim by rhysida: MHM Health; sector: Healthcare
  First observed: 2023-11-11.
references:
  - http://rhysidafc6lm7qa2mkiukbezh7zuth3i4wof4mh2audkymscjm6yegad.onion/archive.php?company=57
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
