description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2023-0479
  Ransomware victim claim by alphv: Atlantic Federal Credit Union; sector: Financial Services
  First observed: 2023-08-22.
references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/678ea132-9f61-4efe-a636-76a4b854c020
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
