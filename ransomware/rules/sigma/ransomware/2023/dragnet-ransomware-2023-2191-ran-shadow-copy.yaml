title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2191 — Shadow Copy Deletion (dispossessor)'
id: 69ae6b7b-8630-503c-bbc8-fe50a47afc84
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2191
  Ransomware victim claim by dispossessor: universalproperties.ca; country: CA; sector: Business Services
  First observed: 2023-09-08.
references:
  - https://dispossessor.com/blogs/22
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
