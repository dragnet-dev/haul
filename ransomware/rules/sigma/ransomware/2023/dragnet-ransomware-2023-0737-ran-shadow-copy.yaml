references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/62b6deb5-88a3-4757-a4bf-78c8ae0df0ea
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
