title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2133 — Shadow Copy Deletion (dispossessor)'
id: 3a06e454-387f-591d-b9fb-6567f440b1b2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2133
  Ransomware victim claim by dispossessor: modestogov.com; sector: Public Sector
  First observed: 2023-03-28.
references:
  - https://dispossessor.com/blogs/317
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
