title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5285 — Shadow Copy Deletion (trigona)'
id: cf05820a-5106-560d-bbcf-d320155a81fa
status: deprecated
description: |
  Detects shadow copy deletion commands associated with trigona ransomware.
  Incident: dragnet-ransomware-2023-5285
  Ransomware victim claim by trigona: McKinney Trailers; country: US; sector: Manufacturing
  First observed: 2023-04-17.
references:
  - http://6n5tfadusp4sarzuxntz34q4ohspiaya2mc6aw6uhlusfqfsdomavyyd.onion/leak/8
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
