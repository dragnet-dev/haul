title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3756 — Shadow Copy Deletion (mallox)'
id: e0db1cdd-4a2d-55c8-9400-980596fdeca4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mallox ransomware.
  Incident: dragnet-ransomware-2023-3756
  Ransomware victim claim by mallox: Garuda Indonesia; sector: Transportation/Logistics
  First observed: 2023-07-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
