title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2152 — Shadow Copy Deletion (dispossessor)'
id: 43ebe8b2-0bc7-5a93-a57f-401cab16b58a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2152
  Ransomware victim claim by dispossessor: petersenjohnson.com; country: US; sector: Healthcare
  First observed: 2023-10-08.
references:
  - https://dispossessor.com/blogs/14
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
