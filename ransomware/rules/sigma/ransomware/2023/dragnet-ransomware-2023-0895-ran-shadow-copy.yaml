title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0895 — Shadow Copy Deletion (arvinclub)'
id: cd02b176-dc21-50fb-b810-6d534d5c1e48
status: deprecated
description: |
  Detects shadow copy deletion commands associated with arvinclub ransomware.
  Incident: dragnet-ransomware-2023-0895
  Ransomware victim claim by arvinclub: Kimia Tadbir Kiyan; country: IR; sector: Not Found
  First observed: 2023-10-13.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
