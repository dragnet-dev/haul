description: |
  Detects shadow copy deletion commands associated with royal ransomware.
  Incident: dragnet-ransomware-2023-4967
  Ransomware victim claim by royal: Thomaston Mills; sector: Manufacturing
  First observed: 2023-03-09.
references:
  - http://royal4ezp7xrbakkus3oofjw6gszrohpodmdnfbe5e4w3og5sm7vb3qd.onion/hxbz9nDul90O1KHBcs9eDb1Pn9TsDQQI
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
