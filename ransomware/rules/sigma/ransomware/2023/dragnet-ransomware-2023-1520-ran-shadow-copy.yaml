description: |
  Detects shadow copy deletion commands associated with cactus ransomware.
  Incident: dragnet-ransomware-2023-1520
  Ransomware victim claim by cactus: West Craft Manufacturing; sector: Manufacturing
  First observed: 2023-09-07.
references:
  - https://cactusbloguuodvqjmnzlwetjlpj6aggc6iocwhuupb47laukux7ckid.onion/posts/WESTCRAFTNET
