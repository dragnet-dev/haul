description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2023-2371
  Ransomware victim claim by incransom: Trylon TSF Inc.; sector: Telecommunication
  First observed: 2023-11-23.
references:
