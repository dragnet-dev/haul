description: |
  Detects shadow copy deletion commands associated with bianlian ransomware.
  Incident: dragnet-ransomware-2023-1158
  Ransomware victim claim by bianlian: Victoria Park; country: SE; sector: Business Services
  First observed: 2023-03-28.
references:
  - http://bianlianlbc5an4kgnay3opdemgcryg2kpfcbgczopmm3dnbz3uaunad.onion/companies/victoriapark.se/
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
