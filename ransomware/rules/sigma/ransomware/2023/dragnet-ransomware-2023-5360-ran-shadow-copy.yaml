title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5360 — Shadow Copy Deletion (werewolves)'
id: 8620074d-3e45-5530-ad7e-d33f9c7ddd54
status: deprecated
description: |
  Detects shadow copy deletion commands associated with werewolves ransomware.
  Incident: dragnet-ransomware-2023-5360
  Ransomware victim claim by werewolves: carmoney.ru; country: RU; sector: Financial Services
  First observed: 2023-09-29.
references:
  - https://werewolves.pro/en/croc-ru.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
