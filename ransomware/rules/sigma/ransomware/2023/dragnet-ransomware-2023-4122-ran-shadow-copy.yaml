description: |
  Detects shadow copy deletion commands associated with noescape ransomware.
  Incident: dragnet-ransomware-2023-4122
  Ransomware victim claim by noescape: OE Federal Credit Union; sector: Financial Services
  First observed: 2023-10-29.
references:
  - http://noescapemsqxvizdxyl7f7rmg5cdjwp33pg2wpmiaaibilb4btwzttad.onion/post/9a775d19-d453-4a61-9c6d-3cd8e2f7b155
