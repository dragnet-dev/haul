description: |
  Detects shadow copy deletion commands associated with snatch ransomware.
  Incident: dragnet-ransomware-2023-5020
  Ransomware victim claim by snatch: City of Modesto, CA; sector: Public Sector
  First observed: 2023-03-28.
references:
