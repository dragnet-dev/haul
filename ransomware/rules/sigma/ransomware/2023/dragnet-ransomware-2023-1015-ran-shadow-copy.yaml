title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1015 — Shadow Copy Deletion (bianlian)'
id: 852a015f-51d6-5c89-bde0-84b72eb78707
status: deprecated
description: |
  Detects shadow copy deletion commands associated with bianlian ransomware.
  Incident: dragnet-ransomware-2023-1015
  Ransomware victim claim by bianlian: Flensburger Schiffbau Gesellschaft mbH and Co. and Nobiskrug Yachts GmbH; sector: Manufacturing
  First observed: 2023-04-11.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
