description: |
  Detects shadow copy deletion commands associated with meow ransomware.
  Incident: dragnet-ransomware-2023-3943
  Ransomware victim claim by meow: Standard Filter; sector: Manufacturing
  First observed: 2023-11-22.
references:
  - http://meow6xanhzfci2gbkn3lmbqq7xjjufskkdfocqdngt3ltvzgqpsg5mid.onion/story/standard-filter
