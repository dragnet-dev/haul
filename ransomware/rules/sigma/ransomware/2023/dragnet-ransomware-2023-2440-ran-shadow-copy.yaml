description: |
  Detects shadow copy deletion commands associated with knight ransomware.
  Incident: dragnet-ransomware-2023-2440
  Ransomware victim claim by knight: National Health Mission. Department of Heath & Family Welfare, Govt. of U.P; country: IN; sector: Healthcare
  First observed: 2023-10-10.
references:
