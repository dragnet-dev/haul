title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2182 — Shadow Copy Deletion (dispossessor)'
id: a383d602-5e69-5a9d-8067-106d3be85acb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2182
  Ransomware victim claim by dispossessor: surfsidefoods.com; sector: Agriculture and Food Production
  First observed: 2023-06-14.
references:
  - https://dispossessor.com/blogs/783
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
