references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/0ac49118-e02d-4fdd-8fa6-3c0bfba449c1
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
