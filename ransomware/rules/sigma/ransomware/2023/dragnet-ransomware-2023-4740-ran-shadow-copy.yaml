title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4740 — Shadow Copy Deletion (ranstreet)'
id: e41f66b4-7ca5-5a58-86b0-eaeb7e8c8c69
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ranstreet ransomware.
  Incident: dragnet-ransomware-2023-4740
  Ransomware victim claim by ranstreet: zonesoft.pt; country: PT; sector: Not Found
  First observed: 2023-12-21.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
