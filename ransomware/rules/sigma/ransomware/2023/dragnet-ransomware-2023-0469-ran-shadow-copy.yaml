references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/082ffa95-7205-46fb-86a7-9c8f4c73f8de
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
