description: |
  Detects shadow copy deletion commands associated with monti ransomware.
  Incident: dragnet-ransomware-2023-4028
  Ransomware victim claim by monti: University Obrany - Part 2 (Tiny Leak); sector: Education
  First observed: 2023-10-07.
references:
