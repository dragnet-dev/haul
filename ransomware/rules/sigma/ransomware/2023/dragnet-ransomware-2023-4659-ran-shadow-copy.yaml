title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4659 — Shadow Copy Deletion (ransomed)'
id: bbe8c705-7e12-591f-bbc5-5e85b880913e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ransomed ransomware.
  Incident: dragnet-ransomware-2023-4659
  Ransomware victim claim by ransomed: PSM; sector: Not Found
  First observed: 2023-08-28.
references:
  - https://ransomed.vc/ps.html
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
