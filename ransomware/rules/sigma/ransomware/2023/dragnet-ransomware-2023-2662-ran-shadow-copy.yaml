description: |
  Detects shadow copy deletion commands associated with lockbit3 ransomware.
  Incident: dragnet-ransomware-2023-2662
  Ransomware victim claim by lockbit3: conver-pack.com; country: US; sector: Manufacturing
  First observed: 2023-04-24.
references:
  - http://lockbitapt5x4zkjbcqmz6frdhecqqgadevyiwqxukksspnlidyvd7qd.onion/post/zxYCZ63FDMx5LE7h6446c6e89f504
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
