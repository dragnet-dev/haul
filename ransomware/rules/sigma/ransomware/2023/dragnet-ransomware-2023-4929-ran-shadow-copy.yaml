description: |
  Detects shadow copy deletion commands associated with royal ransomware.
  Incident: dragnet-ransomware-2023-4929
  Ransomware victim claim by royal: Materialogic; sector: Transportation/Logistics
  First observed: 2023-03-10.
references:
  - http://royal4ezp7xrbakkus3oofjw6gszrohpodmdnfbe5e4w3og5sm7vb3qd.onion/nEVtGJtO2WQeOmskIBRbySgM1SBbcQn4
