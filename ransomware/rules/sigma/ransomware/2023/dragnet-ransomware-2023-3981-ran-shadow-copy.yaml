title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3981 — Shadow Copy Deletion (moneymessage)'
id: ebde4dd6-d0a9-5c1f-87f7-fd5f9cdfc6eb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with moneymessage ransomware.
  Incident: dragnet-ransomware-2023-3981
  Ransomware victim claim by moneymessage: Toscana Promozione; country: IT; sector: Business Services
  First observed: 2023-10-03.
references:
  - http://blogvl7tjyjvsfthobttze52w36wwiz34hrfcmorgvdzb6hikucb7aqd.onion/news.php?id=3
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
