title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2204 — Shadow Copy Deletion (dispossessor)'
id: dd7c055c-1874-52ac-aa8f-dd8f2ed0df4c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2204
  Ransomware victim claim by dispossessor: www.c-v-e.com; country: US; sector: Business Services
  First observed: 2023-10-02.
references:
  - https://dispossessor.com/blogs/15
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
