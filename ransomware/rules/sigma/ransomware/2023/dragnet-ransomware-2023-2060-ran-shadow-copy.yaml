title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2060 — Shadow Copy Deletion (dispossessor)'
id: da99d655-e126-51bb-92e4-6eb2abf650ad
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2060
  Ransomware victim claim by dispossessor: co.langlade.wi.us; country: US; sector: Public Sector
  First observed: 2023-07-15.
references:
  - https://dispossessor.com/blogs/832
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
