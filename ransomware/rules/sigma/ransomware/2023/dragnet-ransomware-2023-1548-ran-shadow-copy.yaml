title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1548 — Shadow Copy Deletion (cloak)'
id: e634d1fa-84ef-588d-8f22-4730835699fb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cloak ransomware.
  Incident: dragnet-ransomware-2023-1548
  Ransomware victim claim by cloak: ihopmexico.com; country: MX; sector: Hospitality and Tourism
  First observed: 2023-08-24.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
