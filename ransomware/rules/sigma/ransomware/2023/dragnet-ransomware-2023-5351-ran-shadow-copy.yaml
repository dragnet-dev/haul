title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5351 — Shadow Copy Deletion (vicesociety)'
id: f05f86c3-a9dd-5218-847e-ad8a5916e667
status: deprecated
description: |
  Detects shadow copy deletion commands associated with vicesociety ransomware.
  Incident: dragnet-ransomware-2023-5351
  Ransomware victim claim by vicesociety: TIMco; country: GB; sector: Business Services
  First observed: 2023-01-14.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
