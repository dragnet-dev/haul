  Ransomware victim claim by alphv: Ofimedic; sector: Healthcare
  First observed: 2023-08-04.
references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/92dc3de8-b0a1-4766-8a6e-5e853850e73e
