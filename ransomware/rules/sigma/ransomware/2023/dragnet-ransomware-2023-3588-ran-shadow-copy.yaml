title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3588 — Shadow Copy Deletion (lynx)'
id: cd8de671-ea72-5bc9-9b54-d628fcb61f1a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2023-3588
  Ransomware victim claim by lynx: Atlas Commodities; country: US; sector: Energy
  First observed: 2023-05-22.
references:
  - http://lynxblog.net/leaks/67aa135961c2d9c619ca34b9
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
