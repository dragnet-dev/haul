title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0812 — Shadow Copy Deletion (conti)'
id: 05f0674a-b95c-59b5-9a8d-352b48e382c1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with conti ransomware.
  Incident: dragnet-ransomware-2022-0812
  Ransomware victim claim by conti: Fujioka Eletro Imagem SA; sector: Consumer Services
  First observed: 2022-03-07.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
