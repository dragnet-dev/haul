title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0433 — Shadow Copy Deletion (blackbasta)'
id: 95ec1b2d-1a9e-5be3-b82b-e038f25755e1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with blackbasta ransomware.
  Incident: dragnet-ransomware-2022-0433
  Ransomware victim claim by blackbasta: CADEPLOY; sector: Not Found
  First observed: 2022-10-31.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
