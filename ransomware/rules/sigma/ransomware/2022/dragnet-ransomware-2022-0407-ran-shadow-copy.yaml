title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0407 — Shadow Copy Deletion (bitlocker)'
id: dcb5b7d8-136f-534a-a071-701719aec467
status: deprecated
description: |
  Detects shadow copy deletion commands associated with bitlocker ransomware.
  Incident: dragnet-ransomware-2022-0407
  Ransomware victim claim by bitlocker: State Bar of Georgia; country: US; sector: Public Sector
  First observed: 2022-05-02.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
