title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2821 — Shadow Copy Deletion (roadsweep)'
id: f330aa0d-151d-561a-8334-0ec980320bf3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with roadsweep ransomware.
  Incident: dragnet-ransomware-2022-2821
  Ransomware victim claim by roadsweep: Albanian Government; country: AL; sector: Public Sector
  First observed: 2022-07-18.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
