title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1429 — Shadow Copy Deletion (lapsus$)'
id: e8838555-e854-5871-8c09-a8630313b90d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lapsus$ ransomware.
  Incident: dragnet-ransomware-2022-1429
  Associated with LAPSUS$.
  Ransomware victim claim by lapsus$: Samsung Electronics; country: JP; sector: Technology
  First observed: 2022-03-07.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.lapsus
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
