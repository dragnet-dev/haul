title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2788 — Shadow Copy Deletion (ransomhouse)'
id: 708420f5-ac64-597a-a1ef-a0a4a678348f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ransomhouse ransomware.
  Incident: dragnet-ransomware-2022-2788
  Ransomware victim claim by ransomhouse: Carmen Copper Corporation; sector: Energy
  First observed: 2022-12-05.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
