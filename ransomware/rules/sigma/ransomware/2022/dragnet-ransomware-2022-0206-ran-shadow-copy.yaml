title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0206 — Shadow Copy Deletion (alphv)'
id: 931cd753-5cb3-5f5f-a6cc-bec70c253a62
status: deprecated
description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2022-0206
  Ransomware victim claim by alphv: ( POST HAS BEEN UPDATED 1400GB LEAK AVAILABLE ) County Suffolk and contractors; country: US; sector: Public Sector
  First observed: 2022-09-15.
references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/11f75aa5-18d9-43aa-a52d-d7847c590200
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
