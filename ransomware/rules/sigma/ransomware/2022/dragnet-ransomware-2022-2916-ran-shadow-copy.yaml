title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2916 — Shadow Copy Deletion (sabbath)'
id: 43a51879-21bc-5f6e-aea7-24db60c4a899
status: deprecated
description: |
  Detects shadow copy deletion commands associated with sabbath ransomware.
  Incident: dragnet-ransomware-2022-2916
  Ransomware victim claim by sabbath: Protected: PRIVATE POST  ITALY; sector: Not Found
  First observed: 2022-01-12.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
