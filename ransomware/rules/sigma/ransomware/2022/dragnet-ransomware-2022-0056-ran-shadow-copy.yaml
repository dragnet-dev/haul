  Ransomware victim claim by alphv: Artic Building Services; sector: Construction
  First observed: 2022-09-14.
references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/575c4172-1b6c-430d-bbf4-beab2320bf20
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
