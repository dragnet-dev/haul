title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2591 — Shadow Copy Deletion (onyx)'
id: 73cc9ee0-621f-574c-bd58-dad02fb6e209
status: deprecated
description: |
  Detects shadow copy deletion commands associated with onyx ransomware.
  Incident: dragnet-ransomware-2022-2591
  Ransomware victim claim by onyx: Jasper County Sheriff's Office; sector: Public Sector
  First observed: 2022-04-29.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
