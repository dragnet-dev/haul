title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2655 — Shadow Copy Deletion (projectrelic)'
id: 16aaeee8-08f5-5dad-b1b9-bb4f7292ec1c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with projectrelic ransomware.
  Incident: dragnet-ransomware-2022-2655
  Ransomware victim claim by projectrelic: Doctors Center Hospital; sector: Healthcare
  First observed: 2022-12-18.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
