title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2529 — Shadow Copy Deletion (medusalocker)'
id: 90f202f4-7dac-58e1-924c-d9a219673991
status: deprecated
description: |
  Detects shadow copy deletion commands associated with medusalocker ransomware.
  Incident: dragnet-ransomware-2022-2529
  Ransomware victim claim by medusalocker: atlantisholidays; sector: Hospitality and Tourism
  First observed: 2022-11-15.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
