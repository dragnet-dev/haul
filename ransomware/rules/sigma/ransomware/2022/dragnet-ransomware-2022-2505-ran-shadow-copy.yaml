title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2505 — Shadow Copy Deletion (lv)'
id: 6b38dbf3-6d4b-5b36-94c1-20bd41a2dabe
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lv ransomware.
  Incident: dragnet-ransomware-2022-2505
  Ransomware victim claim by lv: STTLK; sector: Not Found
  First observed: 2022-08-04.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
