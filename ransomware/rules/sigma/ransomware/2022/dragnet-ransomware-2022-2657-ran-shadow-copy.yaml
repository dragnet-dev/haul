title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2657 — Shadow Copy Deletion (projectrelic)'
id: 1c277f66-46c6-58b2-8dfe-84a4c4cd6c36
status: deprecated
description: |
  Detects shadow copy deletion commands associated with projectrelic ransomware.
  Incident: dragnet-ransomware-2022-2657
  Ransomware victim claim by projectrelic: Turner & Associates, LLP; sector: Financial Services
  First observed: 2022-11-11.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
