title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2806 — Shadow Copy Deletion (redalert)'
id: 84a11ad1-7849-5c52-ae7d-c99410708513
status: deprecated
description: |
  Detects shadow copy deletion commands associated with redalert ransomware.
  Incident: dragnet-ransomware-2022-2806
  Ransomware victim claim by redalert: vahanen.com; sector: Not Found
  First observed: 2022-07-15.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
