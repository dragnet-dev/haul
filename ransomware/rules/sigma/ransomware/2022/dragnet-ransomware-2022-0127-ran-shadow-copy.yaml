references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/59e123b6-4324-48b7-ac4c-05360055b6bd
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
