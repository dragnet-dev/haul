title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1051 — Shadow Copy Deletion (dispossessor)'
id: 03668604-f5bf-50f5-aa5d-b42394c2eb73
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-1051
  Ransomware victim claim by dispossessor: thaiho.com; country: TW; sector: Manufacturing
  First observed: 2022-11-08.
references:
  - https://dispossessor.com/blogs/379
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
