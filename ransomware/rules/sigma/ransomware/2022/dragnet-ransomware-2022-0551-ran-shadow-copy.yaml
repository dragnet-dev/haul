description: |
  Detects shadow copy deletion commands associated with blackbasta ransomware.
  Incident: dragnet-ransomware-2022-0551
  Ransomware victim claim by blackbasta: undefined; sector: Not Found
  First observed: 2022-05-28.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
