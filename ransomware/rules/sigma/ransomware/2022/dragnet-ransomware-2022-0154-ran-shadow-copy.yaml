description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2022-0154
  Ransomware victim claim by alphv: KKJM Lawfirm; sector: Business Services
  First observed: 2022-07-18.
references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/fb21a6e3-4ac8-4f0e-9488-e04836745262
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
