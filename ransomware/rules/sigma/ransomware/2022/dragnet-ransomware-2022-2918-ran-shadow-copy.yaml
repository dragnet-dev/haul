title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2918 — Shadow Copy Deletion (shaoleaks)'
id: 49ad43a6-a706-54d1-950d-76f93fb46fbb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shaoleaks ransomware.
  Incident: dragnet-ransomware-2022-2918
  Ransomware victim claim by shaoleaks: Greetings to havi.com and tmsw.com; sector: Not Found
  First observed: 2022-11-01.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
