description: |
  Detects shadow copy deletion commands associated with quantum ransomware.
  Incident: dragnet-ransomware-2022-2716
  Ransomware victim claim by quantum: Tehama County Social Services; country: US; sector: Public Sector
  First observed: 2022-04-28.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
