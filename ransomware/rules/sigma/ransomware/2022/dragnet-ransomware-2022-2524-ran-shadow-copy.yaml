title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2524 — Shadow Copy Deletion (mallox)'
id: dc8e18e0-4bbb-5848-964c-6e8e69504227
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mallox ransomware.
  Incident: dragnet-ransomware-2022-2524
  Ransomware victim claim by mallox: CLUB DE TENIS LA PAZ; sector: Hospitality and Tourism
  First observed: 2022-11-04.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
