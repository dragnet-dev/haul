title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1052 — Shadow Copy Deletion (dispossessor)'
id: c7022c27-96b9-5077-9f22-e38d557d3abf
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-1052
  Ransomware victim claim by dispossessor: thecondorgroup.com; country: QA; sector: Business Services
  First observed: 2022-11-09.
references:
  - https://dispossessor.com/blogs/382
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
