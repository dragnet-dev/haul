title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2568 — Shadow Copy Deletion (mindware)'
id: 7c6cafa3-ff10-54b2-9cb6-09d4406fb161
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mindware ransomware.
  Incident: dragnet-ransomware-2022-2568
  Ransomware victim claim by mindware: mediuscorp; sector: Business Services
  First observed: 2022-05-05.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
