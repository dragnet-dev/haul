status: deprecated
description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2022-0212
  Ransomware victim claim by alphv: Rankam China Manufacturing; country: CA; sector: Manufacturing
