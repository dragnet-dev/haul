status: deprecated
description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2022-0054
  Ransomware victim claim by alphv: Alliant Physical Therapy DATA; sector: Healthcare
  First observed: 2022-04-21.
references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/f402581e-e80f-4450-9ed2-6c5276a5faef
