title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2474 — Shadow Copy Deletion (lv)'
id: 47d6cc64-bfaa-540b-9bd4-6d4d23d83a53
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lv ransomware.
  Incident: dragnet-ransomware-2022-2474
  Ransomware victim claim by lv: ANGT - HACKED. MORE THEN 700 GB SENSITIVE DATA LEAKED; sector: Not Found
  First observed: 2022-08-25.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
