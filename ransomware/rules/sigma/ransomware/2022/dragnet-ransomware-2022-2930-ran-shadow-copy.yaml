title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2930 — Shadow Copy Deletion (snatch)'
id: c01eb51f-cd74-57e1-ab5b-6fd6191ab961
status: deprecated
description: |
  Detects shadow copy deletion commands associated with snatch ransomware.
  Incident: dragnet-ransomware-2022-2930
  Ransomware victim claim by snatch: Grandview, MO; sector: Public Sector
  First observed: 2022-11-01.
references:
  - https://snatchteam.top/news.php?id=7a9db9b6-71f3-4829-b7e6-69f4225771a5
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
