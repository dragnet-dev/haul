title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2824 — Shadow Copy Deletion (royal)'
id: b73c381c-604a-5175-a99e-157f17cff810
status: deprecated
description: |
  Detects shadow copy deletion commands associated with royal ransomware.
  Incident: dragnet-ransomware-2022-2824
  Ransomware victim claim by royal: Aegea Group companies; country: BR; sector: Energy
  First observed: 2022-12-23.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
