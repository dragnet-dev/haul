title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1071 — Shadow Copy Deletion (donutleaks)'
id: d4d0a7ba-4609-5997-8598-94439555c4c4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with donutleaks ransomware.
  Incident: dragnet-ransomware-2022-1071
  Ransomware victim claim by donutleaks: PlanET Biogas Solutions; sector: Agriculture and Food Production
  First observed: 2022-08-24.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
