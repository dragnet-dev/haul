title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1067 — Shadow Copy Deletion (donutleaks)'
id: 0e81b64e-44ed-5571-9814-a181d8191fd8
status: deprecated
description: |
  Detects shadow copy deletion commands associated with donutleaks ransomware.
  Incident: dragnet-ransomware-2022-1067
  Ransomware victim claim by donutleaks: Evo exhibits; sector: Business Services
  First observed: 2022-09-28.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
