title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-3163 — Shadow Copy Deletion (yanluowang)'
id: 4e10551d-490f-505e-92ff-60bd99771e29
status: deprecated
description: |
  Detects shadow copy deletion commands associated with yanluowang ransomware.
  Incident: dragnet-ransomware-2022-3163
  Ransomware victim claim by yanluowang: Greetings to havi.com and tmsw.com; sector: Not Found
  First observed: 2022-07-02.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
