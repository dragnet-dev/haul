description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2022-0078
  Ransomware victim claim by alphv: CENTRAL BANK OF GAMBIA HACKED 2 TB OF CRITICAL DATA WAS STOLEN; country: GM; sector: Financial Services
