title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0617 — Shadow Copy Deletion (blogxx)'
id: bc78944c-175f-5cdd-8b88-ac29bc77a249
status: deprecated
description: |
  Detects shadow copy deletion commands associated with blogxx ransomware.
  Incident: dragnet-ransomware-2022-0617
  Ransomware victim claim by blogxx: Medibank Private Limited; country: AU; sector: Financial Services
  First observed: 2022-10-12.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
