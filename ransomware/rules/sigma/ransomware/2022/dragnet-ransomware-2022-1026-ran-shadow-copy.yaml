title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1026 — Shadow Copy Deletion (dispossessor)'
id: b483dd9b-37e7-5a10-8c95-d8a6af9cc7cb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-1026
  Ransomware victim claim by dispossessor: goalsolutions.com; country: US; sector: Financial Services
  First observed: 2022-01-26.
references:
  - https://dispossessor.com/blogs/36
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
