title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2972 — Shadow Copy Deletion (sparta)'
id: dd99ad7d-e738-5d01-97b9-e54c3d92a05b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with sparta ransomware.
  Incident: dragnet-ransomware-2022-2972
  Ransomware victim claim by sparta: INDIBA; country: ES; sector: Healthcare
  First observed: 2022-09-13.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
