description: |
  Detects shadow copy deletion commands associated with clop ransomware.
  Incident: dragnet-ransomware-2022-0740
  Ransomware victim claim by clop: THE7STARS.CO.UK; country: GB; sector: Business Services
  First observed: 2022-12-22.
references:
  - http://santat7kpllt6iyvqbr7q4amdv6dzrh6paatvyrzl7ry3zm72zigf4ad.onion/the7stars-co-uk
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
