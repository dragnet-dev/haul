title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0522 — Shadow Copy Deletion (blackbasta)'
id: 387da891-5d9d-508d-b56a-c3c275fca7bb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with blackbasta ransomware.
  Incident: dragnet-ransomware-2022-0522
  Ransomware victim claim by blackbasta: RBBUSA; sector: Not Found
  First observed: 2022-08-06.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
