title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2971 — Shadow Copy Deletion (sparta)'
id: a57783d7-a5a9-5afc-b454-97909a28a68c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with sparta ransomware.
  Incident: dragnet-ransomware-2022-2971
  Ransomware victim claim by sparta: Grupo Galilea; sector: Consumer Services
  First observed: 2022-09-13.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
