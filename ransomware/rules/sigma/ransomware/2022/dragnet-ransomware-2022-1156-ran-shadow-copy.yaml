title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1156 — Shadow Copy Deletion (freecivilian)'
id: 8939b1ba-18e4-5209-a40d-687b3e849638
status: deprecated
description: |
  Detects shadow copy deletion commands associated with freecivilian ransomware.
  Incident: dragnet-ransomware-2022-1156
  Ransomware victim claim by freecivilian: health.mia; sector: Healthcare
  First observed: 2022-12-31.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
