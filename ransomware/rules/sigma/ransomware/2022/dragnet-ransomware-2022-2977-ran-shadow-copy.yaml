title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2977 — Shadow Copy Deletion (sparta)'
id: 27be3c55-78e7-5ddd-a40a-a5b7fc92e656
status: deprecated
description: |
  Detects shadow copy deletion commands associated with sparta ransomware.
  Incident: dragnet-ransomware-2022-2977
  Ransomware victim claim by sparta: Tema Litoclean Group; sector: Manufacturing
  First observed: 2022-09-13.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
