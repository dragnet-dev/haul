title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2483 — Shadow Copy Deletion (lv)'
id: 11c201bd-e41f-5b1a-9c1e-b6cd15efba79
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lv ransomware.
  Incident: dragnet-ransomware-2022-2483
  Ransomware victim claim by lv: ELEFONDATI SRL - WAS HACKED. 20 GB OF SENSITIVE DATA STOLEN; sector: Not Found
  First observed: 2022-08-15.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
