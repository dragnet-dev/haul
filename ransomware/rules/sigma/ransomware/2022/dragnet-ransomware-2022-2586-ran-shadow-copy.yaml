title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2586 — Shadow Copy Deletion (onyx)'
id: 4d383e4f-8496-5a02-a695-c2452d7c1f14
status: deprecated
description: |
  Detects shadow copy deletion commands associated with onyx ransomware.
  Incident: dragnet-ransomware-2022-2586
  Ransomware victim claim by onyx: Artistic Stairs & Railings; sector: Construction
  First observed: 2022-07-26.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
