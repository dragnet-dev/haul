title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-3127 — Shadow Copy Deletion (vicesociety)'
id: d396967a-8cd9-5d83-8a07-7d2ee8ef9a59
status: deprecated
description: |
  Detects shadow copy deletion commands associated with vicesociety ransomware.
  Incident: dragnet-ransomware-2022-3127
  Ransomware victim claim by vicesociety: San Luis Coastal Unified; sector: Education
  First observed: 2022-07-19.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
