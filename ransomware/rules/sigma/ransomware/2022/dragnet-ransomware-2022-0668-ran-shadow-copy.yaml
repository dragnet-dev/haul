description: |
  Detects shadow copy deletion commands associated with clop ransomware.
  Incident: dragnet-ransomware-2022-0668
  Ransomware victim claim by clop: FAIR-RITE.COM; sector: Manufacturing
  First observed: 2022-12-22.
references:
