title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1056 — Shadow Copy Deletion (dispossessor)'
id: 44f9c8d7-7fca-5d32-a7e0-4a5ff202a4db
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-1056
  Ransomware victim claim by dispossessor: vitalitygroup.com; country: GB; sector: Healthcare
  First observed: 2022-10-24.
references:
  - https://dispossessor.com/blogs/72
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
