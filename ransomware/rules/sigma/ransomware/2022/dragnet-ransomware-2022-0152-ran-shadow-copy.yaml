references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/91491bf7-487d-43fc-a1a2-abb9c85399de
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
