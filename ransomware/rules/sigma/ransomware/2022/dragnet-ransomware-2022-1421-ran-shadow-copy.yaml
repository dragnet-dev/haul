title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1421 — Shadow Copy Deletion (kelvinsecurity)'
id: d424a3e4-5b6e-548c-8b09-ea8129cb227f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kelvinsecurity ransomware.
  Incident: dragnet-ransomware-2022-1421
  Ransomware victim claim by kelvinsecurity: PT Pertamina Gas; sector: Energy
  First observed: 2022-04-22.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
