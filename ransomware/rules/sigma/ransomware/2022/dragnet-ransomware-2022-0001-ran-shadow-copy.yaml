title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0001 — Shadow Copy Deletion (0mega)'
id: 681c6031-8a7e-5a08-afa5-f43af9164684
status: deprecated
description: |
  Detects shadow copy deletion commands associated with 0mega ransomware.
  Incident: dragnet-ransomware-2022-0001
  Ransomware victim claim by 0mega: Maxey Moverley; sector: Business Services
  First observed: 2022-07-14.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
