description: |
  Detects shadow copy deletion commands associated with quantum ransomware.
  Incident: dragnet-ransomware-2022-2706
  Ransomware victim claim by quantum: Moscone Center; country: US; sector: Business Services
  First observed: 2022-09-01.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
