description: |
  Detects shadow copy deletion commands associated with clop ransomware.
  Incident: dragnet-ransomware-2022-0709
  Ransomware victim claim by clop: PENTAIR.COM; sector: Manufacturing
  First observed: 2022-12-22.
references:
  - http://santat7kpllt6iyvqbr7q4amdv6dzrh6paatvyrzl7ry3zm72zigf4ad.onion/pentair-com
