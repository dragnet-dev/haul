title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2471 — Shadow Copy Deletion (lorenz)'
id: fc075cbe-b8f9-5556-916e-9bbb21d8bda1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lorenz ransomware.
  Incident: dragnet-ransomware-2022-2471
  Ransomware victim claim by lorenz: Wes-tec inc.; sector: Manufacturing
  First observed: 2022-10-18.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
