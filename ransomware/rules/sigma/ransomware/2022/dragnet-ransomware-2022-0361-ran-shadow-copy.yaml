title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0361 — Shadow Copy Deletion (bianlian)'
id: d232ec8b-cb1b-5522-85c8-17a889194fe6
status: deprecated
description: |
  Detects shadow copy deletion commands associated with bianlian ransomware.
  Incident: dragnet-ransomware-2022-0361
  Ransomware victim claim by bianlian: International Custom Controls; sector: Manufacturing
  First observed: 2022-08-29.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
