title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0628 — Shadow Copy Deletion (cheers)'
id: ac160dbb-52b0-5f19-9cb6-f6e9895710d1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cheers ransomware.
  Incident: dragnet-ransomware-2022-0628
  Ransomware victim claim by cheers: An Technology Company - Paid; sector: Technology
  First observed: 2022-05-29.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
