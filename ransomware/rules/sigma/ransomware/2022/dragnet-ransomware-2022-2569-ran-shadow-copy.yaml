title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2569 — Shadow Copy Deletion (mindware)'
id: 314f0c83-c1d6-5be6-a8e2-88cab32aa0f3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mindware ransomware.
  Incident: dragnet-ransomware-2022-2569
  Ransomware victim claim by mindware: micropakkn; sector: Manufacturing
  First observed: 2022-05-05.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
