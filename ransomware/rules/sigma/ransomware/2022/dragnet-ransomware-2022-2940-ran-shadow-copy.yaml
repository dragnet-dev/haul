title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2940 — Shadow Copy Deletion (snatch)'
id: d3f80037-cee2-5f50-b060-c8ea1c9bc784
status: deprecated
description: |
  Detects shadow copy deletion commands associated with snatch ransomware.
  Incident: dragnet-ransomware-2022-2940
  Ransomware victim claim by snatch: Oil India Limited; country: IN; sector: Energy
  First observed: 2022-10-05.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
