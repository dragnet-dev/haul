title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2695 — Shadow Copy Deletion (quantum)'
id: 728a142b-cb37-5c19-b5bf-990609f88bce
status: deprecated
description: |
  Detects shadow copy deletion commands associated with quantum ransomware.
  Incident: dragnet-ransomware-2022-2695
  Ransomware victim claim by quantum: Jazeera Airways; country: KW; sector: Transportation/Logistics
  First observed: 2022-02-09.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
