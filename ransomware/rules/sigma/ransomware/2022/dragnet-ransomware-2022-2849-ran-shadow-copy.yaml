title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2849 — Shadow Copy Deletion (royal)'
id: 2f82bd61-292c-54b5-bdb2-5496250b7f67
status: deprecated
description: |
  Detects shadow copy deletion commands associated with royal ransomware.
  Incident: dragnet-ransomware-2022-2849
  Ransomware victim claim by royal: http://www.sheehanfamilycompanies.com; sector: Not Found
  First observed: 2022-11-07.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
