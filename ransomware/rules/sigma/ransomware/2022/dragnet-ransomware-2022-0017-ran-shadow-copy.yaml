title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0017 — Shadow Copy Deletion (8base)'
id: 50a283cc-6509-51db-965a-db6b8c0193cf
status: deprecated
description: |
  Detects shadow copy deletion commands associated with 8base ransomware.
  Incident: dragnet-ransomware-2022-0017
  Ransomware victim claim by 8base: ER of Dallas; sector: Healthcare
  First observed: 2022-11-15.
references:
  - http://basemmnnqwxevlymli5bs36o5ynti55xojzvn246spahniugwkff2pad.onion/company/789062
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
