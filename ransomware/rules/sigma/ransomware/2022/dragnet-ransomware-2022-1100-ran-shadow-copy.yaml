title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1100 — Shadow Copy Deletion (everest)'
id: fbf66409-9b6a-57b5-8727-55c82bf9bb0d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with everest ransomware.
  Incident: dragnet-ransomware-2022-1100
  Ransomware victim claim by everest: Florida lawyer&#8217;s data leaked; sector: Business Services
  First observed: 2022-01-27.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
