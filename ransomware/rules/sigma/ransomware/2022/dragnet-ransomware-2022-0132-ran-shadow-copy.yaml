status: deprecated
description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2022-0132
  Ransomware victim claim by alphv: Holland CPA; sector: Business Services
  First observed: 2022-07-24.
references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/a6e2a95e-7de9-4ba6-8b98-fe7a33294c68
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
