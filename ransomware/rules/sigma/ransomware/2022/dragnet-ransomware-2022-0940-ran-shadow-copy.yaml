title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0940 — Shadow Copy Deletion (cuba)'
id: 785defc5-d733-51e3-8068-5caf49f0e72b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cuba ransomware.
  Incident: dragnet-ransomware-2022-0940
  Ransomware victim claim by cuba: get-integrated; sector: Business Services
  First observed: 2022-11-04.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
