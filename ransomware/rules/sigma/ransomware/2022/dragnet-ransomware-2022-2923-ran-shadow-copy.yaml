title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2923 — Shadow Copy Deletion (snatch)'
id: 57f1b9ac-8e8f-5dd4-bc6e-505e2e7cacb5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with snatch ransomware.
  Incident: dragnet-ransomware-2022-2923
  Ransomware victim claim by snatch: Apex; country: BM; sector: Manufacturing
  First observed: 2022-06-29.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
