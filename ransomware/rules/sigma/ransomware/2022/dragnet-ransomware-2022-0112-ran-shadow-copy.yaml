description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2022-0112
  Ransomware victim claim by alphv: ENPPI - HACKED AND MORE THEN 1100 GB DATA LEAKED!; country: EG; sector: Energy
  First observed: 2022-11-27.
references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/b37133d8-fd6e-4a95-91fd-a7fe3a3c8745
