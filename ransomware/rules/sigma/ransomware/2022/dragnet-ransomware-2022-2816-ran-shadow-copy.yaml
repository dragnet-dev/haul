title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2816 — Shadow Copy Deletion (revil)'
id: 5ad8d315-9b4d-56da-b40e-501c843ea62b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with revil ransomware.
  Incident: dragnet-ransomware-2022-2816
  Ransomware victim claim by revil: Stratford University; sector: Education
  First observed: 2022-04-22.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
