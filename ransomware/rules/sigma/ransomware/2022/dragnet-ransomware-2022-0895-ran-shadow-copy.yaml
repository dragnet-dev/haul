title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0895 — Shadow Copy Deletion (conti)'
id: 16baa928-8858-587a-935d-14a7556d993a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with conti ransomware.
  Incident: dragnet-ransomware-2022-0895
  Ransomware victim claim by conti: The Contact Company; sector: Business Services
  First observed: 2022-05-25.
references:
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
