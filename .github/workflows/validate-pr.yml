name: Validate PR

on:
  pull_request:
    paths:
      - 'supply/incidents/**'
      - 'malware/incidents/**'
      - 'ransomware/incidents/**'
      - 'cve/incidents/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download Dragnet binary
        run: |
          gh release download \
            --repo dragnet-dev/dragnet \
            --pattern dragnet-linux-amd64 \
            --output dragnet
          chmod +x dragnet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: ./dragnet validate --module all --include-drafts
