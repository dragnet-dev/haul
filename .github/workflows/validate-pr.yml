name: Validate PR

on:
  pull_request:
    paths:
      - 'supply/incidents/**'
      - 'malware/incidents/**'
      - 'ransomware/incidents/**'
      - 'cve/incidents/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Download Dragnet binary
        run: |
          gh release download \
            --repo dragnet-dev/dragnet \
            --pattern dragnet-linux-amd64 \
            --output dragnet
          chmod +x dragnet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: ./dragnet validate --module all --include-drafts
