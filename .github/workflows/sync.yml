name: Dragnet Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'supply/incidents/**'
      - 'malware/incidents/**'
      - 'ransomware/incidents/**'
      - 'cve/incidents/**'

permissions:
  contents: write
  pull-requests: write

# Only one sync run at a time. Push and workflow_dispatch can both fire near
# each other (initial commit, manual trigger, etc.); racing runs end up with
# git push conflicts. Wait, don't cancel — we want every trigger to actually
# produce a sync.
concurrency:
  group: dragnet-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # Engine has its own 5-min per-module deadline plus 150s per source, but a
    # workflow-level cap is the last line of defence in case something gets
    # stuck below the engine layer (network, disk, runner). 90 min covers the
    # first-ever run (OSSF git clone ~3 min + container module sigma gen on
    # 5k Tier-1/2/3 records ~30s + everything else ~10 min). Subsequent runs
    # with caches restored complete in 10-15 min.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest Dragnet binary
        run: |
          gh release download \
            --repo dragnet-dev/dragnet \
            --pattern dragnet-linux-amd64 \
            --output dragnet
          chmod +x dragnet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get week for cache key rotation
        id: week
        run: echo "value=$(date -u +'%Y-%U')" >> "$GITHUB_OUTPUT"

      - name: Cache OSSF malicious-packages repo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: state/ossf-cache
          key: ossf-packages-${{ runner.os }}-${{ steps.week.outputs.value }}
          restore-keys: |
            ossf-packages-${{ runner.os }}-

      # Pre-clone OSSF malicious-packages so the engine's OSSF source finds
      # the .git dir already present and skips straight to the fast walk.
      # Without this, the clone (225k+ files, ~2 min) gets killed by the
      # engine's 90s per-source ctx, leaving no OSSF data in the output.
      - name: Pre-clone OSSF malicious-packages (primes the cache)
        run: |
          if [ ! -d state/ossf-cache/.git ]; then
            mkdir -p state
            git clone --depth 1 https://github.com/ossf/malicious-packages state/ossf-cache
          else
            echo "OSSF cache restored — skipping clone."
          fi

      # Trivy is required by the container module's trivy_db source. Without
      # it the source returns no CVEs (only EOL warnings) — silently.
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy
          trivy --version

      # Cache the Trivy vulnerability DB. First run downloads ~1 GB; cached
      # runs skip the download (DB rotates ~every 6 h, so we key by day to
      # avoid serving truly stale data while still benefitting from cache.).
      - name: Cache Trivy DB
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: state/trivy_cache
          key: trivy-db-${{ runner.os }}-${{ steps.week.outputs.value }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - run: ./dragnet validate --module all

      # API keys passed through env so sources can opt into authenticated
      # endpoints: NVD raises rate limit from 5 to 50 req/30s + extends
      # backfill from 1y to 2y; malware_bazaar unlocks the get_recent API
      # (returns 401 without); attackerkb enables PoC tracking.
      - run: ./dragnet sync --module supply
        env:
          NVD_API_KEY:               ${{ secrets.NVD_API_KEY }}
          MALWARE_BAZAAR_AUTH_KEY:   ${{ secrets.MALWARE_BAZAAR_AUTH_KEY }}
          ATTACKERKB_API_KEY:        ${{ secrets.ATTACKERKB_API_KEY }}
      - run: ./dragnet sync --module malware
        env:
          NVD_API_KEY:               ${{ secrets.NVD_API_KEY }}
          MALWARE_BAZAAR_AUTH_KEY:   ${{ secrets.MALWARE_BAZAAR_AUTH_KEY }}
          ATTACKERKB_API_KEY:        ${{ secrets.ATTACKERKB_API_KEY }}
      - run: ./dragnet sync --module ransomware
        env:
          NVD_API_KEY:               ${{ secrets.NVD_API_KEY }}
          MALWARE_BAZAAR_AUTH_KEY:   ${{ secrets.MALWARE_BAZAAR_AUTH_KEY }}
          ATTACKERKB_API_KEY:        ${{ secrets.ATTACKERKB_API_KEY }}
      - run: ./dragnet sync --module cve
        env:
          NVD_API_KEY:               ${{ secrets.NVD_API_KEY }}
          MALWARE_BAZAAR_AUTH_KEY:   ${{ secrets.MALWARE_BAZAAR_AUTH_KEY }}
          ATTACKERKB_API_KEY:        ${{ secrets.ATTACKERKB_API_KEY }}
      - run: ./dragnet sync --module container
        env:
          NVD_API_KEY:               ${{ secrets.NVD_API_KEY }}
          MALWARE_BAZAAR_AUTH_KEY:   ${{ secrets.MALWARE_BAZAAR_AUTH_KEY }}
          ATTACKERKB_API_KEY:        ${{ secrets.ATTACKERKB_API_KEY }}

      - run: ./dragnet enrich --cross-domain

      - run: ./dragnet generate --module all --backends all --layers all

      - name: Commit
        run: |
          git config user.name "dragnet-bot"
          git config user.email "dragnet-bot@users.noreply.github.com"
          git add supply/ malware/ ransomware/ cve/ container/ feeds/ state/ actors/
          # Unstage draft incidents — they belong on their own branches, not main.
          git restore --staged -- '*/incidents/drafts/' 2>/dev/null || true
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "[dragnet-bot] sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Open draft PRs
        run: |
          for module in supply malware ransomware cve container; do
            for draft in "${module}/incidents/drafts/"*.yaml; do
              [ -f "$draft" ] || continue
              incident_name="$(basename "$draft" .yaml | tr -cd "[:alnum:]-")"
              branch="draft-${incident_name}"

              if git ls-remote --exit-code --heads origin "$branch" > /dev/null 2>&1; then
                echo "Branch $branch already exists — skipping"
                continue
              fi

              if gh pr list --head "$branch" --state open --json number --jq '.[0].number' 2>/dev/null | grep -q '^[0-9]'; then
                echo "Open PR for $branch already exists — skipping"
                continue
              fi

              git checkout -b "$branch"
              git add "$draft"
              git commit -m "[dragnet-bot] draft: ${incident_name}"
              git push origin "$branch"
              pr_body="$(./dragnet pr-body "$draft" 2>/dev/null || echo 'Auto-generated from blog intel. Review IOCs before merging.')"
              gh pr create \
                --title "Draft [${module}]: ${incident_name}" \
                --body "$pr_body" \
                --label "pending-triage,${module}" \
                --base main
              git checkout main
            done
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
