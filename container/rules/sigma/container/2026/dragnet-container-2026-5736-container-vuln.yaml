title: 'Dragnet [Container]: dragnet-container-2026-5736 — Vulnerable Base Image Pull'
id: 3135f64a-1a17-5ebd-9299-8ed9a9160ab7
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2026-5736 (Tier 2, CVSS 9.8)
  Two buffer overflow vulnerabilities existed in the wolfSSL CRL parser when parsing CRL numbers: a heap-based buffer overflow could occur when improperly storing the CRL number as a hexadecimal string, and a stack-based overflow for sufficiently sized CRL numbers. With appropriately crafted CRLs, either of these out of bound writes could be triggered. Note this only affects builds that specifically enable CRL support, and the user would need to load a CRL from an untrusted source.
references:
