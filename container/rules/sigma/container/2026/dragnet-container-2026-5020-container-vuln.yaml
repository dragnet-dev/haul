detection:
  selection:
    Image|contains:
      - 'photon os:3.0'
      - 'photon os:4.0'
      - 'photon os:5.0'
  condition: selection
falsepositives:
  - Cached images pulled before the vulnerability was published
  - Internal image mirrors that have not been updated
level: critical
