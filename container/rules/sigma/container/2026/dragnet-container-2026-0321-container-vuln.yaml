title: 'Dragnet [Container]: dragnet-container-2026-0321 — Vulnerable Base Image Pull'
id: 72dcec10-a57c-5551-8b64-d2b58a5e0f62
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2026-0321 (Tier 2, CVSS 9.3)
  Off-by-one error in the ReadBlobString function in blob.c in ImageMagick before 6.3.5-9 allows context-dependent attackers to execute arbitrary code via a crafted image file, which triggers the writing of a '\0' character to an out-of-bounds address.
