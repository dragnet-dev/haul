title: 'Dragnet [Container]: dragnet-container-2016-0003 — End-of-Life Base Image'
id: ef8b5eb0-e35e-550c-9122-fecc1090daaf
status: deprecated
description: |
  Detects deployment of a container image based on an end-of-life product cycle.
  EOL images receive no further security patches regardless of new CVEs.
  Incident: dragnet-container-2016-0003
  php 5.5 reached end-of-life on 2016-07-21. All images based on this cycle are permanently unpatched.
  First observed: 2016-07-21.
references:
  - https://endoflife.date/php
author: dragnet-bot
date: 2026-05-17
tags:
  - attack.t1610
logsource:
  category: container_image_pull
detection:
  selection:
    Image|startswith:
      - 'php:5.5.'
      - 'php:5.5-'
  condition: selection
falsepositives:
  - Internal base images that pin to EOL cycles intentionally
level: high
